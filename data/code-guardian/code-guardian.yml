name: Code Guardian
description: "Code Guardian is a local-deployable MCP server acting as an
  AI-powered code refactor engine, equipped with 80+ tools for analysis, hotspot
  detection, complexity metrics, persistent memory, and automated refactoring.
  Key features: multi-tool code analysis, refactoring plan generation,
  persistent context memory, hotspot/complexity detection, local execution.
  Primary use cases: AI agent code optimization and dev workflows for legacy
  maintenance; vs tools like SonarQube, offers LLM-orchestrated dynamic
  refactoring."
