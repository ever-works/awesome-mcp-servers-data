markdown: >-
  ## Overview


  An MCP server that connects to Anki through AnkiConnect, allowing AI
  assistants to interact with the popular spaced repetition flashcard system.


  ## Features


  - Anki flashcard management via AnkiConnect

  - Deck and card querying

  - Spaced repetition system integration

  - AI-assisted flashcard workflows
