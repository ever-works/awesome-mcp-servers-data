name: Vercel MCP
description: Official MCP server for direct AI access to Vercel projects,
  enabling monitoring of deployments, management of environment variables, build
  log retrieval, and project creation. Streamlines deployment cycles for Next.js
  and full-stack teams.
source_url: https://vercel.com/docs/mcp
category: DevOps
tags:
  - official
  - deployments
  - ci-cd
markdown: |-
  ## Features

  - List and inspect deployments (production/preview)
  - Fetch build logs for failed deployments
  - Create/update environment variables
  - Trigger deployments
  - Manage domain configuration

  ## Use Cases

  - Fetch build logs for failed production deployment and diagnose
  - Add NEXT_PUBLIC_STRIPE_KEY to staging environment
  - List preview deployments for branch

  ## Pricing

  Included with Vercel account.
