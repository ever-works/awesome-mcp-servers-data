name: Vercel MCP
description: Official Vercel MCP server for direct AI access to Vercel projects,
  including deployments, environment variables, build logs, and domain
  management. Streamlines deployment monitoring and fixes for Next.js teams
  without leaving the editor. Reduces context switching in deployment cycles.
source_url: https://vercel.com/docs/mcp
