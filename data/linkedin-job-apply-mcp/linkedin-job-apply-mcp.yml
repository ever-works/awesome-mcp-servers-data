markdown: >-
  ## Overview


  An MCP server that integrates with LinkedIn's platform to enable AI assistants
  to search for job listings and facilitate job applications through Claude and
  other MCP-compatible clients.


  ## Features


  - LinkedIn job search functionality

  - AI-assisted job application workflow

  - Seamless integration with Claude Desktop

  - Natural language job search queries

  - Automated application assistance
