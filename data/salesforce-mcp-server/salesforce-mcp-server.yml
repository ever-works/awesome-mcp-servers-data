markdown: >-
  ## Overview


  Salesforce’s MCP integration enables CRM data (accounts, leads, conversations)
  to be injected into LLM workflows. It supports AI use cases in marketing,
  sales enablement, and service automation.


  ## Features


  - CRM entity access (leads, opportunities, tasks)

  - Role-based context customization

  - Integration with Service Cloud AI

  - Secure, enterprise-grade deployment


  ## Pricing


  Commercial cloud service.
