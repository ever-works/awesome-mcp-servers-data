markdown: >-
  ## Overview


  The Composer MCP Server gives LLMs the power to backtest investment ideas and
  execute automated trading strategies.


  ## Features


  - Trade creation and execution

  - Investment strategy backtesting

  - Support for stocks, ETFs, and crypto

  - Integrated chat-based trading

  - Automated trading strategies


  ## Use Cases


  - AI-assisted investment research

  - Automated trading strategy development

  - Portfolio management
