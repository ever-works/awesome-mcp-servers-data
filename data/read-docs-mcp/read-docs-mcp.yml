name: read-docs-mcp
description: "Read-Docs-MCP is an MCP server specialized in reading
  documentation from Git repositories. It allows AI agents to fetch, parse, and
  query repo docs like READMEs, wikis, and code comments via natural language.
  Key features: git integration, markdown rendering, semantic search over docs;
  use cases: code research, onboarding, troubleshooting without cloning repos.
  Compared to general repo MCPs like GitHub MCP, it focuses purely on
  documentation extraction."
