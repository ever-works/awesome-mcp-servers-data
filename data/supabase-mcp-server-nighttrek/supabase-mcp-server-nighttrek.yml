markdown: >-
  ## Overview


  A model context protocol implementation granting LLMs access to make database
  queries and learn about Supabase types. Enables AI-powered integration with
  Supabase projects.


  ## Features


  - Supabase database querying

  - Type discovery and learning

  - PostgreSQL integration

  - Supabase-specific tools

  - Standardized MCP interface


  ## Usage


  Configure with Supabase project URL and API key.
