markdown: >-
  ## Overview


  Shoptera Product Intelligence provides comprehensive product catalog search
  across Central European e-commerce, covering approximately 8.5 million
  products from approximately 2,500 e-shops across 7 countries.


  ## Coverage


  - Approximately 2,500 e-shops

  - Approximately 8.5 million products

  - 7 countries: Czech Republic (CZ), Slovakia (SK), Poland (PL), Hungary (HU),
  Romania (RO), Germany (DE), Austria (AT)


  ## Features


  - Semantic search across product catalogs

  - Keyword-based product matching

  - GTIN/EAN product lookup

  - REST API access

  - MCP server integration for AI agents

  - Multi-country product coverage


  ## Use Cases


  - Price comparison and market analysis

  - Product availability tracking

  - E-commerce competitive intelligence

  - Catalog enrichment
