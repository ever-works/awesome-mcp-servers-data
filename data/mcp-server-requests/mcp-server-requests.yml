markdown: |-
  ## Overview

  MCP server providing advanced web content retrieval capabilities.

  ## Features

  - Full webpage filtered content or Markdown-converted output
  - Custom User-Agent support
  - Multi-HTTP Method Support (GET/POST/PUT/DELETE/PATCH)
  - LLM-Controlled Request Headers
  - LLM-Accessible Response Headers

  ## Pricing

  Open-source, free to use.
