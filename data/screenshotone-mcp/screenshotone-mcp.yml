markdown: >-
  ## Overview


  screenshotone-mcp provides Model Context Protocol integration for
  ScreenshotOne's website screenshot API. It enables AI assistants to capture
  full-page screenshots of any URL on demand.


  ## Features


  - Capture website screenshots via MCP tools

  - Full-page screenshot support

  - Supports various viewport sizes

  - Integration with ScreenshotOne API

  - Simple and reliable screenshot capture
