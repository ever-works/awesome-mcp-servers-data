name: Translate Server
description: A simple translation MCP Server that can translate single files or
  entire directories. Supports only JSON data (JSON, JS, TS formats), and
  automatically detects the target language from filenames for automated
  processing.
source_url: https://github.com/vlinr/translate-server
category: Developer Tools
tags:
