markdown: >-
  ## Overview


  A simple translation MCP Server designed for translating JSON-based files. It
  supports single-file and directory-level translation, automatically extracting
  target languages from file names.


  ## Features


  - Single file or directory translation

  - Supports JSON, JS, TS formats

  - Auto-detects target language from filename

  - Automated translation workflow

  - JSON data processing only
