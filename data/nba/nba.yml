name: NBA
description: A Python server utilizing MCP to provide comprehensive access to
  NBA statistics and live game data through the NBA API. It enables AI agents to
  query player stats, game schedules, and real-time updates via natural language
  interactions.
source_url: https://github.com/henryco23/NBA
category: Sports & Entertainment
tags:
