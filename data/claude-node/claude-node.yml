name: claude-node
description: "claude-node serves as a Python subprocess bridge to Claude Code
  CLI, allowing Python applications to leverage Claude's native coding features
  via MCP and stream-json protocol. Key features: subprocess bridging,
  stream-json comms, native Claude access, Python integration. Primary use
  cases: AI agent scripting in Python dev workflows; vs direct CLI, enables
  embedded programmatic access."
