name: A11yance MCP
description: MCP server providing programmatic access to ARIA specification for
  AI-assisted accessibility compliance in development workflows. Enables
  querying ARIA roles, states, properties, and relationships directly from IDEs.
  Ideal for ensuring WCAG standards during code reviews; unlike general VSCode
  MCP servers focused on syntax, this specializes in a11y validation and
  remediation suggestions.
source_url: https://github.com/A11yance/aria-query
category: Developer Tools "Developer Tools MCP Servers"amp; IDE MCP Servers
tags:
  - accessibility
  - aria
  - wcag
  - IDE
  - Coding
markdown: >-
  ## Overview


  Programmatic access to the ARIA specification through an MCP server, enabling
  AI assistants to understand accessibility standards.


  ## Features


  - ARIA specification access

  - Accessibility reference for AI models

  - ARIA roles, states, and properties information

  - Compliance checking during development


  ## Use Cases


  - IDE integration for real-time a11y feedback

  - Automated accessibility audits

  - Code review assistance for WCAG compliance


  ## Pricing


  Free and open-source.
