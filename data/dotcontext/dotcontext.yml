markdown: >-
  ## Overview


  AI coding has evolved from simple file-level completions to sophisticated
  project-wide assistance. As these tools become more capable, they need more
  context - not just about individual files, but about project architecture,
  history, and design decisions.


  ## Features


  - Project-wide context provision

  - Architecture awareness

  - Project history tracking

  - Design decision documentation

  - Enhanced AI coding assistant support
