markdown: >-
  ## Overview


  Glama.ai extends the awesome-mcp-servers GitHub repo into a dynamic directory
  with automation for MCP server discovery and validation.


  ## Features


  - Automatic introspection of servers for tools, resources, prompts

  - Infers required configurations

  - Checks dependencies for vulnerabilities

  - Centralized channel for security issues and support


