name: Glama MCP Server Directory
description: Glama MCP Server Directory is an automated web-based registry that
  introspects MCP servers to catalog tools, resources, prompts, configurations,
  and scans for vulnerabilities. Key features include dynamic discovery,
  security analysis, filtering by metadata, and centralized support channels.
  Useful for discovering secure MCP servers, comparing implementations, and
  building trust for production use, differing from static lists like
  mcpservers.org by adding automation and vuln scanning.
