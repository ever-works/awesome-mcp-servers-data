name: Kno2gether MCP Servers
description: Kno2gether MCP Servers aggregates multiple MCP endpoints into a
  single unified interface, acting as a multi-server proxy for seamless access
  to various tools. It simplifies tool calling for AI agents by providing a
  consolidated endpoint, supporting agent chaining and model switching. Compared
  to meta-servers like Pipedream, it offers lighter-weight MCP-specific
  aggregation without general workflow overhead.
source_url: https://github.com/avijeett007/kno2gether-mcp-servers
category: Aggregators
tags:
  - aggregator
  - multi-mcp
  - proxy
markdown: >-
  ## Overview


  Kno2gether MCP Servers is an open-source aggregator that combines multiple MCP
  endpoints into one, enabling unified access for AI agents and LLMs.


  ## Features


  - Unified access to multiple MCP servers

  - Multi-server proxy functionality

  - Supports agent chaining and model switching

  - Compatible with Anthropic Claude and OpenAI-like tool calling


  ## Use Cases


  - Simplify tool calls in multi-agent setups

  - Development and testing of agent workflows

  - Integration with Claude Desktop for local AI development


  ## Comparisons


  Lighter and more focused than general meta-servers like Pipedream or GitHub
  MCP integrations; outperforms LangChain in MCP-standard tool calling
  efficiency.


  ## Pricing


  Free and open-source.
