markdown: >-
  ## Overview


  ActivityWatch MCP Server bridges ActivityWatch time tracking data with AI
  assistants through the Model Context Protocol. It enables querying and
  analyzing user activity logs and productivity patterns.


  ## Features


  - Access ActivityWatch time tracking data

  - Query activity logs and events

  - Analyze productivity patterns

  - Retrieve time usage statistics across applications and websites

  - Natural language querying of time tracking data
