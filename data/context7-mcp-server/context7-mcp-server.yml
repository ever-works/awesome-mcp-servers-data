  ## Overview

  Context7 retrieves live library docs pinned to versions.

  ## Features

  - Fetch docs for any library at specific versions
  - Returns actual API references
  - No API key required

  ## Use Cases

  - Next.js 15 middleware configuration
  - Pydantic v1 vs v2 changes

  ## Pricing

  Free to use.
