markdown: >-
  ## Overview


  NS MCP Server is a Model Context Protocol server that provides access to NS
  (Dutch Railways) travel information. It enables Claude AI to fetch real-time
  train travel information and disruptions using the official Dutch NS API.


  ## Features


  - Real-time train travel information retrieval

  - Access to disruption data

  - Integration with Claude AI via MCP protocol

  - Uses official Dutch NS API
