markdown: >-
  ## Overview


  mcp-npx-fetch is a versatile MCP server for fetching web content and
  transforming it into multiple output formats. It supports HTML, JSON,
  Markdown, and Plain Text outputs.


  ## Features


  - Fetch web content from URLs

  - Transform to HTML, JSON, Markdown, or Plain Text

  - Flexible content extraction

  - Supports various content types

  - Easy integration with AI workflows
