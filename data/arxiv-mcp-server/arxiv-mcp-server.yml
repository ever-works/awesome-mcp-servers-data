markdown: >-
  ## Overview


  MCP server for arXiv.org that enables AI assistants and agents to interact
  with academic paper repositories.


  ## Features


  - Paper search and discovery

  - Citation analysis

  - Trend tracking

  - Multi-format paper export

  - Academic paper analysis

  - Advanced filtering capabilities


  ## Use Cases


  - Academic research assistance

  - Literature review automation

  - Paper recommendation systems
