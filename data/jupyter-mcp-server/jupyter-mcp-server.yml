markdown: >-
  ## Overview


  Jupyter MCP Server bridges Model Context Protocol with Jupyter ecosystems,
  enabling AI assistants to execute code cells, manage kernels, and interact
  with notebooks for data science and computational workflows.


  ## Features


  - Execute code cells via MCP

  - Kernel lifecycle management

  - Notebook cell reading and writing

  - Output retrieval from executions

  - Data science workflow support

  - JupyterLab and Notebook compatibility
