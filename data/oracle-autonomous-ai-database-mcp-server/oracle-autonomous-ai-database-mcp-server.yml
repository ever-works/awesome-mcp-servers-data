name: Oracle Autonomous AI Database MCP Server
description: Oracle Autonomous AI Database MCP Server is a built-in,
  multi-tenant MCP server in Oracle's Autonomous AI Database Serverless
  (19c/26ai), exposing endpoints for AI agents to invoke Select AI Agent tools.
  Key features include native integration, enterprise security (RBAC,
  encryption, VPD), and OCI console management without standalone
  infrastructure. Ideal for governed AI data access in enterprise environments;
  surpasses open-source PostgreSQL MCP with deep Oracle security and
  multi-tenancy.
