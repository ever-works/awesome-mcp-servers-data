markdown: >-
  ## Overview


  MCPSharp is a .NET library to build Model Context Protocol servers and clients
  for the standardized API protocol used by AI assistants.


  ## Features


  - Full .NET MCP implementation

  - Server and client SDK

  - Type-safe API definitions

  - Integration with .NET ecosystem
