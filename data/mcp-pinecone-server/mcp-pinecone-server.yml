markdown: >-
  ## Overview


  Model Context Protocol server to allow for reading and writing from Pinecone.
  Provides basic RAG capabilities for LLM applications.


  ## Features


  - Pinecone vector database read/write access

  - Basic RAG functionality

  - Vector embedding storage

  - Similarity search

  - Standardized MCP tools
