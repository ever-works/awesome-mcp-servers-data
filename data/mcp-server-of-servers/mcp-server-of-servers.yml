markdown: >-
  ## Overview


  MCP Server of Servers is a meta-MCP server that aggregates multiple MCP
  servers into a single interface. It simplifies MCP client configuration by
  allowing one connection to access many tool sources.


  ## Features


  - Aggregates multiple MCP servers into one

  - Single connection point for clients

  - Tool discovery across aggregated servers

  - Simplifies MCP infrastructure

  - Reduces client configuration complexity
