markdown: >-
  ## Overview


  Create professional draw.io (diagrams.net) diagrams in XML format (.drawio
  files) with integrated PMP/PMBOK methodologies, extensive visual asset
  libraries, and industry-standard professional templates.


  ## Supported Diagrams


  - Flowcharts, swimlane diagrams, cross-functional flowcharts

  - Org charts, network diagrams

  - UML diagrams, BPMN

  - Project management: WBS, Gantt, PERT, RACI

  - Risk matrices, stakeholder maps


  ## Features


  Custom shape libraries for icons, clipart, and professional symbols.
