name: Contextual Codebase Analysis MCP
description: "Contextual Codebase Analysis MCP leverages Gemini's large context
  window to enable IDEs like Cursor and Windsurf to deeply analyze extensive
  codebases for AI-driven insights. Key features: large-scale codebase parsing,
  IDE integration (Cursor/Windsurf), Gemini-powered analysis, contextual
  understanding, architecture mapping. Primary use cases: AI agent codebase
  navigation and dev workflows for onboarding/refactoring; vs traditional static
  analyzers, provides semantic LLM understanding."
