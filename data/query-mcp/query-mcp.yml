markdown: >-
  ## Overview


  Query MCP is an MCP server that enables end-to-end management of Supabase via
  chat interface. It provides a comprehensive set of tools for interacting with
  Supabase databases through AI assistants.


  ## Features


  - Read and write query executions

  - Management API support

  - Automatic migration versioning

  - Access to logs

  - Full Supabase database management through natural language
