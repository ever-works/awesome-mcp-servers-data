markdown: |-
  ## Overview

  Google Workspace MCP supports multiple tools under one OAuth.

  ## Features

  - Summarize Docs
  - List updated Sheets/Drive files
  - Draft emails, manage calendar/tasks
  - Multi-user support

  ## Best For

  Google Workspace heavy users.

  ## Pricing

  Tied to Google Workspace plans.
