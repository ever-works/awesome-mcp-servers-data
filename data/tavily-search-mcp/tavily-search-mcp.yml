markdown: >-
  ## Overview


  Tavily Search is a specialized search engine optimized for AI applications,
  focusing on delivering factual, well-cited information while filtering out
  hallucination-prone sources and low-quality content.


  ## Features


  - **AI-Optimized Results**: Search results specifically formatted for LLM
  consumption

  - **Citation Support**: Strong source attribution for all results

  - **Noise Filtering**: Automatic removal of low-quality and unreliable sources

  - **Hallucination Prevention**: Curated results that minimize false
  information

  - **Fact-Focused**: Optimized for factual queries and research tasks

  - **Clean Output**: Structured data format ideal for AI processing


  ## Use Cases


  - Retrieval Augmented Generation (RAG) applications

  - Fact-checking and verification workflows

  - Research assistance with citation requirements

  - AI chatbots requiring reliable information sources


  ## Integration


  Available as a standalone API and MCP server for integration with AI
  assistants like Claude, ChatGPT, and other MCP-compatible clients.


  ## Pricing


  API-based pricing with free tier available. Contact Tavily for enterprise
  pricing.
