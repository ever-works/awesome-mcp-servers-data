markdown: >-
  ## Overview


  kintone MCP Server integrates kintone's no-code database and workflow platform
  with AI assistants. It enables LLMs to query records, update data, and manage
  workflows in kintone.


  ## Features


  - Query kintone records through MCP

  - Create, update, and delete kintone data

  - Workflow automation capabilities

  - AI-powered kintone interaction

  - Supports kintone app management
