markdown: >-
  ## Overview


  The Exa MCP Server provides AI models with access to Exa AI's neural semantic
  search capabilities, enabling advanced search across academic papers, company
  data, professional networks, and code repositories with superior semantic
  understanding.


  ## Features


  - **Neural Semantic Search**: Advanced AI-powered search understanding query
  intent and context

  - **Research Specialization**: Optimized for research-style queries and
  academic content

  - **Diverse Data Sources**: Search across academic papers, LinkedIn profiles,
  Wikipedia, GitHub repositories, and company data

  - **Semantic Understanding**: Goes beyond keyword matching to understand
  meaning and context

  - **High-Quality Results**: Focused on authoritative and reliable sources


  ## Use Cases


  - Academic and technical research

  - Competitive intelligence and company research

  - Developer tool and library discovery

  - Professional network analysis

  - Literature reviews and citation research


  ## Pricing


  API-based pricing model. Free tier available for developers. Contact Exa AI
  for enterprise pricing.
