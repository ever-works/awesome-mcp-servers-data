markdown: >-
  ## Overview


  mcpagentai is a Python SDK that simplifies interactions with MCP servers. It
  provides a developer-friendly interface for connecting to MCP servers, reading
  resources, listing tools, and executing tool calls.


  ## Features


  - Easy-to-use Python SDK for MCP

  - Connect to MCP servers programmatically

  - Read resources and list tools

  - Execute tool calls with simple interfaces

  - Designed for Python developers integrating with MCP
