name: mcp-agentai
description: mcp-agentai is an open-source MCP server for AI agent
  orchestration, enabling multi-agent workflows via Model Context Protocol. It
  provides key features including agent communication, task delegation, and
  state management. Ideal for building complex AI systems and integrating with
  LLMs, it serves as an MCP-focused alternative to LangGraph.
source_url: https://github.com/mcpagents-ai/mcpagentai
category: AI Agents MCP Servers
