markdown: |-
  ## Overview

  Official MCP for Atlassian suite including Jira and Confluence.

  ## Features

  - Query project boards and sprints
  - Update tickets
  - Summarize blockers
  - Integrates with Slack MCP and GitHub MCP

  ## Use Cases

  - Sprint progress tracking
  - Ticket creation from threads

  ## Pricing

  Tied to Atlassian Cloud subscriptions; OAuth authentication.
