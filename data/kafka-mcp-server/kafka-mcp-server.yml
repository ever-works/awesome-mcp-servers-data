markdown: >-
  ## Overview


  A Model Context Protocol server to perform Kafka client operations. Enables
  LLMs to interact with Apache Kafka for message streaming and event-driven
  architectures.


  ## Features


  - Apache Kafka client operations

  - Topic management

  - Message production and consumption

  - Consumer group interaction

  - Standardized MCP tools
