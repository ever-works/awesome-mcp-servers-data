markdown: >-
  ## Overview


  OpenAPI-MCP is a proxy that automatically translates OpenAPI specifications
  into MCP tools. It enables AI agents to access any external API described by
  an OpenAPI spec without requiring custom wrapper code.


  ## Features


  - Automatic OpenAPI to MCP tool conversion

  - No custom wrappers needed for API access

  - Supports any OpenAPI-compliant API

  - Dynamic tool generation from specs

  - Enables seamless API integration for AI agents
