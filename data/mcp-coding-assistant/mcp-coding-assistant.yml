  MCP server that detects hallucinations, identifies repetitive bug fixes (AKA.
  bottomless pit), and helps AI coders with access to documentation and
  suggested fixes.


  ## Features


  - Hallucination detection in AI-generated code

  - Repetitive bug fix identification

  - Documentation access for code fixes

  - AI coding assistant enhancement

  - Code quality improvement tools
