name: Agentset AI MCP Server
description: MCP server enabling multi-agent orchestration and LLM tool calling
  on private corpora for RAG workflows. Features model switching, tool chaining,
  and stateful task delegation. Use cases include agent workflows for research
  and automation; MCP-native integration outperforms LangChain abstractions.
