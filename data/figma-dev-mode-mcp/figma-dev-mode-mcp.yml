name: Figma Dev Mode MCP
description: Official Figma Dev Mode MCP server exposes live structure of
  selected Figma layers, design tokens, variants, auto-layout, and components to
  AI assistants. Enables accurate design-to-code generation without screenshots.
  Bridges design-to-code gap for frontend developers.
source_url: https://www.figma.com/blog/dev-mode-mcp-server/
