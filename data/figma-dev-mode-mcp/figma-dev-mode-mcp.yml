name: Figma Dev Mode MCP
description: Official Figma Dev Mode MCP server that provides AI assistants with
  live structural details of selected Figma designs, including hierarchy,
  auto-layout rules, variants, text styles, spacing tokens, and component
  references. Enables precise design-to-code translation without relying on
  screenshots. Essential for frontend developers to accurately implement design
  systems.
