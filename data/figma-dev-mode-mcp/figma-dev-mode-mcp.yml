featured: false
markdown: >-
  ## Features


  - Expose selected layers with hierarchy, auto-layout rules, variants, text
  styles, spacing tokens.

  - Surface design tokens, colors, typography.

  - Provide component properties and constraints.


  ## Use Cases


  - Generate React/Tailwind components from designs.

  - Extract spacing/color tokens.

  - Match CSS to Figma typography.
