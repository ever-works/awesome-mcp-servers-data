name: Figma Dev Mode MCP
description: Official MCP server exposing live structure of selected Figma
  designs to AI assistants, including hierarchy, auto-layout rules, variants,
  text styles, spacing tokens, and component references. Enables precise code
  generation from actual design specs, bridging the design-to-code gap. Used for
  frontend development to avoid guessing from screenshots.
