name: Figma Dev Mode MCP
description: Official MCP server from Figma that exposes the live structure of
  selected Figma layers to AI assistants, including hierarchy, auto-layout
  rules, variants, text styles, spacing tokens, and component references. Allows
  AI to generate accurate code from real design specs rather than screenshots.
  Essential for reducing the design-to-code gap in frontend development
  workflows.
source_url: https://www.figma.com/dev-mode-mcp-server/
category: Design Tools
tags:
  - official
  - design-to-code
  - ui-components
featured: false
markdown: |-
  ## Features

  - Expose selected Figma layers with full structural detail
  - Surface design tokens, color styles, and typography definitions
  - Provide component variants and their properties
  - Return auto-layout constraints and spacing rules

  ## Use Cases

  - Generate React components from Figma designs using Tailwind
  - Extract spacing tokens and color variables from designs
  - Create CSS files matching Figma typography styles
brand: Figma
