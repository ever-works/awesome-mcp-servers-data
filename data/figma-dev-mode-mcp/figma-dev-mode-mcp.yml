name: Figma Dev Mode MCP
description: Official MCP server from Figma that exposes live structure of
  selected designs to AI assistants, including hierarchy, auto-layout rules,
  variants, text styles, spacing tokens, and component references. Allows AI to
  generate accurate code from real design specs rather than screenshots,
  reducing friction in frontend development.
source_url: https://www.figma.com/dev-mode-mcp-server
category: Design Tools
tags:
  - official
  - design-to-code
  - frontend
markdown: >-
  ## Features


  - Expose selected Figma layers with full structural detail, not just pixel
  dimensions

  - Surface design tokens, color styles, and typography definitions

  - Provide component variants and their properties

  - Return auto-layout constraints and spacing rules


  ## Use Cases


  - Implement selected Figma component as React component using Tailwind

  - Extract spacing tokens and color variables from design

  - Generate CSS file matching typography styles from Figma frame


  ## Pricing


  Included with Figma Dev Mode access.
