name: Figma Dev Mode MCP
description: Figma's official Dev Mode MCP server exposes the live structure of
  selected Figma designs directly to AI assistants, including hierarchy,
  auto-layout rules, variants, text styles, spacing tokens, and component
  references. It allows AI to generate accurate code from real design specs
  rather than screenshots. Essential for reducing friction in design-to-code
  workflows.
