featured: false
markdown: >-
  ## Overview


  Privacy-focused MCP for Bear notes.


  ## Features


  - Search and retrieve notes

  - Create and update notes

  - Local-only access


  ## Use Cases


  - Personal agent knowledge bases

  - RAG on private notes

  - Note management automation


  ## Comparisons


  Local structured notes vs cloud vector DBs; emphasizes privacy and
  editability.


  ## Pricing


  Free and open-source.
