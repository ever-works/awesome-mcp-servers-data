name: Bear Notes MCP
description: Local MCP server for Bear app notes, offering privacy-focused RAG
  access to personal notes. Supports search, read, create, update operations on
  Markdown notes. Great for individual agent knowledge bases.
source_url: https://github.com/vasylenko/bear-notes-mcp
category: Knowledge Management & Documentation MCP Servers
