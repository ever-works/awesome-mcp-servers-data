markdown: >-
  ## Overview


  A gateway tool that enables running Fiberflow MCP SSE Server over stdio
  transport, bridging the communication gap between SSE and stdio-based MCP
  clients.


  ## Features


  - SSE-to-stdio transport bridge

  - Fiberflow MCP server compatibility

  - Seamless integration with stdio-only MCP clients
