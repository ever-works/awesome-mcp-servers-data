markdown: >-
  ## Overview


  The Salesforce DX MCP Server is in Developer Preview, enabling developers to
  perform common Salesforce development tasks through natural language commands.
  It represents Salesforce's integration with the Model Context Protocol
  ecosystem.


  ## Features


  - **Code Deployment**: Deploy code to Salesforce orgs via natural language

  - **Scratch Org Management**: Create and manage scratch orgs for development

  - **Test Execution**: Run Apex tests and view results

  - **Natural Language Interface**: Execute development tasks conversationally

  - **Developer Workflow Integration**: Streamlines common Salesforce DX
  operations


  ## Status


  Currently in Developer Preview. Salesforce has introduced MCP support across
  its platform, though general-purpose CRM MCP access remains restricted to
  Agentforce (Salesforce's AI agent framework) as of 2026.


  ## Agentforce Integration


  As of Agentforce 3.0 (July 2025), a native MCP client is in pilot. These
  integrations are premium-tier and largely limited to early access customers.


  ## Use Cases


  - AI-assisted Salesforce development

  - Automated org setup and configuration

  - Development workflow automation

  - Testing and deployment pipelines


  ## Pricing


  Developer Preview access. Salesforce subscription required.
