  ## Overview


  An MCP server that integrates YARA, a pattern matching tool widely used in
  malware research and detection, with AI assistants for automated security
  analysis.


  ## Features


  - YARA rule-based scanning

  - Malware pattern detection

  - Security analysis via AI

  - File scanning capabilities

  - Threat identification support
