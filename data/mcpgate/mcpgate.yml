markdown: >-
  ## Overview


  MCPGate provides a simple stdio-to-HTTP tunnel for MCP communication, enabling
  JSON-RPC requests to be relayed to SSE endpoints.


  ## Features


  - Stdio-to-HTTP tunneling

  - JSON-RPC to SSE bridging

  - Protocol translation for MCP servers
