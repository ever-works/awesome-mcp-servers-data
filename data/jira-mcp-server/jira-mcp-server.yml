name: Jira MCP Server
description: MCP servers for Jira including Atlassian Rovo (cloud-hosted) and
  open-source self-hosted versions. Supports JQL-based issue search, details
  retrieval, comments management, and write operations like creating/updating
  issues. Ideal for agile teams managing tickets with AI.
source_url: https://marketplace.atlassian.com/search?q=mcp
category: Project Management
tags:
  - agile
  - issue-tracking
  - jql
markdown: |-
  ## Features

  - JQL issue search
  - Retrieve issue details and manage comments
  - Create or bulk-update issues (with Rovo)

  ## Best For

  Agile teams for ticket management and triage.

  ## Pricing

  Depends on Atlassian plans; open-source option available.
