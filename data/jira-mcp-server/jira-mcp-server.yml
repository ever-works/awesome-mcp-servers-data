name: Jira MCP Server
description: MCP servers for Jira including Atlassian Rovo (cloud-hosted) and
  open-source self-hosted versions. Allows AI to query issues, sprints, epics,
  blockers using JQL, retrieve details, manage comments, and perform write
  operations like creating or updating issues.
source_url: https://developer.atlassian.com/cloud/jira/platform/rest/v3/intro/#mcp
category: Project Management
tags:
  - agile
  - issue-tracking
  - jql
featured: false
markdown: |-
  ## Overview
  Jira MCP Server connects AI to Jira for agile project management.

  ## Features
  - JQL-based search and issue details
  - Sprint status summaries
  - Create/update issues, comments
  - Supports Rovo for write operations

  ## Best For
  Agile teams managing tickets and priorities with AI.

  ## Pricing
  Included with Jira subscription.
