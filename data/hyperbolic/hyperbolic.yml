markdown: >-
  ## Overview


  Hyperbolic's MCP server provides AI agents and LLMs with the ability to
  interact with Hyperbolic's GPU cloud infrastructure programmatically.


  ## Features


  - View available GPU instances and pricing

  - Rent GPUs for AI/ML workloads

  - SSH access to rented GPU instances

  - Run GPU-powered workloads autonomously

  - Agent-driven compute resource management
