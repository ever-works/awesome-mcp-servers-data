markdown: >-
  ## Overview


  Query MCP enables end-to-end management of Supabase via chat interface
  including read and write query executions, management API support, automatic
  migration versioning, access to logs and much more.


  ## Features


  - Read and write query execution

  - Supabase management API integration

  - Automatic migration versioning

  - Log access and monitoring

  - Chat interface interaction

  - Full database management capabilities
