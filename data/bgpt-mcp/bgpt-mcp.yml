markdown: >-
  ## Overview


  bgpt-mcp is an MCP server for querying scientific literature with structured
  experimental data from full-text papers.


  ## Features


  - Search scientific papers

  - Structured data extraction (methods, results, sample sizes, quality scores)

  - 25+ fields per paper


  ## Pricing


  Free and open-source.
