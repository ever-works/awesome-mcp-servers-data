markdown: >-
  ## Overview


  Metoro MCP server integrates Metoro's Kubernetes observability platform with
  AI assistants via the Model Context Protocol. It enables querying
  observability data, logs, and traces through natural language interactions.


  ## Features


  - Query Metoro observability data via MCP

  - Access Kubernetes monitoring and tracing

  - Logs and metrics integration

  - Natural language observability queries

  - Built by the Metoro team
