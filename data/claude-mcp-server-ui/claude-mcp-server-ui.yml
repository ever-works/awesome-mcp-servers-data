name: Claude MCP Server UI
description: "Claude MCP Server UI is a web-based interface for managing MCP
  servers within the Claude app, simplifying configuration, monitoring, and
  control of server connections. Key features: visual server management, easy
  setup, Claude integration, connection controls. Primary use cases: AI agent
  server orchestration and dev workflows; vs CLI tools, provides intuitive GUI
  for non-technical users."
