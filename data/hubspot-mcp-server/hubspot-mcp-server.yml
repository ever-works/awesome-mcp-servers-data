name: HubSpot MCP Server
description: Read-only MCP server for accessing HubSpot CRM data, enabling AI to
  analyze deals, summarize tickets, trends, associations, and pipeline snapshots
  without modifying data or exposing sensitive fields. Available in remote and
  local developer versions, requiring a HubSpot Developer account.
