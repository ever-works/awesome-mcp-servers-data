name: HubSpot MCP Server
description: Provides read-only access to HubSpot CRM data for AI-driven
  insights, reporting, summaries, trends, and pipeline snapshots without
  exposing sensitive information. Available as remote or local developer server,
  requiring a HubSpot Developer account.
source_url: https://developers.hubspot.com/docs/api/mcp
category: business-commerce-mcp-servers
tags:
  - crm
