name: HubSpot MCP Server
description: Secure MCP server offering read-only access to HubSpot CRM data,
  enabling AI to retrieve summaries, trends, associations, and pipeline
  snapshots without exposing sensitive fields. Available in remote and local
  developer flavors, ideal for reporting and analysis in HubSpot-reliant teams.
source_url: https://developers.hubspot.com/docs/api/mcp-servers
category: CRM
