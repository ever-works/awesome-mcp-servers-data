name: HubSpot MCP Server
description: HubSpot MCP Server provides read-only access to CRM data for
  AI-powered insights, reporting, summaries, trends, associations, and pipeline
  snapshots. Available in remote and local developer versions, it requires a
  HubSpot Developer account and excludes sensitive information. Ideal for teams
  using HubSpot for analysis without modification needs.
source_url: https://developers.hubspot.com/docs/api/crm
category: CRM
tags:
  - read-only
  - crm
  - marketing
markdown: |-
  ## Features

  - Clean, live CRM data access
  - Natural language queries for deals, tickets, summaries
  - Read-only to prevent modifications
  - Supports remote and local setups

  ## Best For

  Teams relying on HubSpot CRM for AI analysis and reporting.

  ## Pricing

  Free with HubSpot Developer account; subject to HubSpot subscription plans.
