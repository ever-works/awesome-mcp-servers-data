name: HubSpot MCP Server
description: Secure read-only MCP server providing AI with clean access to
  HubSpot CRM data for insights, reporting, summaries, trends, and pipeline
  snapshots without exposing sensitive fields. Available in remote and local
  developer versions requiring a HubSpot Developer account. Best for teams
  analyzing CRM data without needing write capabilities.
source_url: https://developers.hubspot.com/docs/api/mcp
category: CRM
tags:
