  - marketing
featured: false
markdown: >-
  ## Features


  - Natural language queries for deals, tickets, and CRM objects like 'show me
  all deals closing this week' or 'summarize tickets for a contact'.

  - Read-only access to prevent data modifications.

  - Filters sensitive information such as personal health data.


  ## Best For


  Teams relying on HubSpot for CRM insights and reporting.
