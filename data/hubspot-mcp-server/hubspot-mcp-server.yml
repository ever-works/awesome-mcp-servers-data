name: HubSpot MCP Server
description: Provides read-only access to HubSpot CRM data for AI-driven
  insights, reporting, summaries, trends, and pipeline snapshots. Available in
  remote and local developer versions, requiring a HubSpot Developer account.
  Ideal for teams analyzing CRM data without modification risks.
