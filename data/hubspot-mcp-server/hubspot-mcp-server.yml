name: HubSpot MCP Server
description: Provides clean, read-only access to HubSpot CRM data for AI
  analysis, summaries, trends, associations, and pipeline snapshots without
  exposing sensitive custom fields. Available in remote and local developer
  versions requiring a HubSpot Developer account. Ideal for teams relying on
  HubSpot for reporting and insights.
