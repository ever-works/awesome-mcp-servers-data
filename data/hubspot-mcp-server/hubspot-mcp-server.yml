markdown: >-
  ## Overview


  HubSpot MCP Server enables AI chatbots to query live CRM data such as deals
  closing this week or ticket summaries.


  ## Features


  - Read-only access to CRM data excluding sensitive information

  - Supports summaries, trends, associations, and pipeline snapshots

  - Two flavors: remote and local developer server

  - Requires HubSpot Developer account


  ## Best For


  Teams relying on HubSpot for AI to analyze and reference CRM data without
  modifications.
