markdown: >-
  ## Overview


  The Kit MCP server (formerly ConvertKit) connects AI assistants like Claude to
  the Kit.com email marketing platform, enabling management of email marketing
  workflows and audience engagement for creators.


  ## Features


  - **Subscriber Management**: Add, update, and segment subscribers

  - **Tag Management**: Efficiently handle subscriber tags and organization

  - **Email Sequences**: Create and manage automated email sequences

  - **Broadcast Creation**: Design and send email broadcasts

  - **Analytics**: Analyze subscriber data and campaign performance


  ## Platform Integration


  The ConvertKit MCP Server allows MCP-compatible clients to connect to
  ConvertKit and manage email marketing workflows through natural language
  interactions.


  ## Use Cases


  - Automate subscriber onboarding and segmentation

  - Manage email campaigns through conversational AI

  - Analyze audience engagement and metrics

  - Create and schedule email sequences

  - Handle subscriber lifecycle management


  ## Target Audience


  Designed for content creators, bloggers, podcasters, and online entrepreneurs
  who use email marketing to build and engage their audience.


  ## Benefits


  Streamlines email marketing operations by enabling natural language management
  of complex workflows, reducing manual tasks and improving creator
  productivity.
