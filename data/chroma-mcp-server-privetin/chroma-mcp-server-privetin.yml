markdown: >-
  ## Overview


  A Model Context Protocol (MCP) server implementation that provides vector
  database capabilities through Chroma. Enables LLMs to store, query, and manage
  vector embeddings.


  ## Features


  - Chroma vector database integration

  - Embedding storage and retrieval

  - Similarity search operations

  - Collection management

  - Standardized MCP tools

  - RAG workflow support
