name: MCP Discovery
description: MCP Discovery is a lightweight Rust-based CLI service for
  decentralized discovery and registration of MCP servers, allowing AI agents to
  dynamically find available tools and resources. It introspects server
  capabilities without relying on central registries, promoting a distributed
  ecosystem. Unlike centralized registries, it enables peer-to-peer agent tool
  discovery for more resilient operations.
source_url: https://github.com/modelcontextprotocol/servers/tree/main/src/discovery
category: Developer Tools
tags:
