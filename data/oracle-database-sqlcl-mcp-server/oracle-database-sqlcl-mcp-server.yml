markdown: >-
  ## Overview


  Oracle provides official Oracle Database MCP server integration through SQLcl,
  enabling native MCP support for accessing any Oracle Database. This
  integration allows AI assistants to query, analyze, and manage Oracle
  databases using natural language through the Model Context Protocol.


  ## Features


  ### Database Access

  - **SQL Queries**: Execute SELECT, INSERT, UPDATE, DELETE statements

  - **Schema Exploration**: Browse tables, views, and database objects

  - **Data Analysis**: Perform complex analytical queries

  - **Transaction Management**: Handle commits and rollbacks


  ### SQLcl Integration

  - **Native MCP**: Built-in MCP support in SQLcl

  - **Command Line**: Familiar SQL*Plus compatible interface

  - **Scripting**: Run SQL scripts and PL/SQL blocks

  - **Formatting**: Advanced output formatting options


  ### Oracle Database Features

  - **Enterprise Performance**: Optimized for large-scale data

  - **ACID Compliance**: Full transaction support

  - **Advanced Security**: Encryption, auditing, and access control

  - **High Availability**: RAC, Data Guard, and failover


  ## Oracle Database Capabilities


  ### Data Types

  - Relational tables and views

  - JSON and XML documents

  - Spatial and graph data

  - Time-series data


  ### Advanced Features

  - PL/SQL stored procedures and functions

  - Triggers and packages

  - Partitioning and indexes

  - Materialized views


  ### Analytics

  - Built-in analytical functions

  - OLAP cubes and dimensions

  - Data mining algorithms

  - Machine learning (Oracle ML)


  ## Use Cases


  ### Database Administration

  - Query database metadata and statistics

  - Monitor performance and resource usage

  - Manage users and permissions

  - Backup and recovery operations


  ### Data Analysis

  - Run complex analytical queries

  - Generate reports and insights

  - Explore data relationships

  - Validate data quality


  ### Application Development

  - Test SQL queries during development

  - Prototype database designs

  - Debug PL/SQL procedures

  - Optimize query performance


  ### Business Intelligence

  - Ad-hoc data exploration

  - Build and test reports

  - Data transformation and ETL

  - Generate business insights


  ## SQLcl Features


  ### Modern CLI

  - Colored output and syntax highlighting

  - Command history and auto-completion

  - Inline editing

  - Script execution


  ### Format Options

  - JSON, CSV, XML, HTML output

  - Custom formatting

  - Result pagination

  - Export capabilities


  ### Developer Tools

  - JDBC thin driver

  - Liquibase integration

  - REST API support

  - SQL tuning advisor


  ## Integration


  Works with AI assistants supporting MCP. Requires Oracle Database connection
  and SQLcl installation. Compatible with Oracle Database 12c and higher.


  ## Pricing


  Oracle Database offers multiple editions:

  - **Express Edition (XE)**: Free for development and small deployments

  - **Standard Edition**: Per-processor licensing

  - **Enterprise Edition**: Advanced features and support


  SQLcl is free to download and use with any Oracle Database edition.
