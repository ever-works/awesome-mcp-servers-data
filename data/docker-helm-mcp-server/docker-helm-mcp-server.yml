name: Docker Helm MCP Server
description: Docker Helm MCP Server enables Infrastructure as Code (IaC) via MCP
  for Kubernetes application deployments using Helm charts. It provides secure
  authentication for repositories, chart operations (install/upgrade/list),
  release management, and real-time ops via SSE, with OCI registry support.
  Ideal for agentic DevOps workflows automating deployments and management
  conversationally, unlike verbose CLI tools requiring scripting and manual
  auth.
