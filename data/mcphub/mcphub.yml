markdown: >-
  ## Overview


  MCPHub is a cross-platform GUI application that serves as a package manager
  for Model Context Protocol servers. Think of it as apt/pip but for MCP
  servers, enabling users to discover, install, and manage MCP servers through
  an intuitive graphical interface.


  ## Features


  - Discover available MCP servers through built-in catalog

  - Install and uninstall MCP servers with a click

  - Manage server configurations

  - Cross-platform support (Windows, macOS, Linux)

  - Package-manager-like experience for MCP ecosystem

  - Graphical user interface for easy management
