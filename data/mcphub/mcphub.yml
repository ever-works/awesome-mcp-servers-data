name: MCPHub
description: MCPHub is a centralized directory and registry for Model Context
  Protocol (MCP) servers, allowing users to discover, install, and manage MCP
  servers easily. Key features include search, ratings, installation guides, and
  community contributions. It excels in use cases like finding specialized MCP
  servers for AI agents, comparing alternatives such as mcpservers.org, and
  provides dynamic updates with user reviews unlike static GitHub lists.
source_url: https://mcphub.io
category: mcp-server-directories-lists
tags:
