featured: true
markdown: |-
  ## Overview

  MCPHub provides a platform to search, discover, and collect MCP servers.

  ## Features

  - Search and filtering capabilities
  - User collections for favorites
  - Comprehensive MCP server listings

  ## Pricing

  Free to use.
