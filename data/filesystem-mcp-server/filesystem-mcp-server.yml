name: Filesystem MCP Server
description: Platform-agnostic MCP server enabling secure AI file operations
  including read/write/search/replace files. Features directory tree traversal
  and advanced search capabilities. Ideal for local file automation, code
  editing, and AI development environments; enhances basic filesystem MCP
  servers with replace and tree traversal support.
source_url: https://github.com/modelcontextprotocol/servers/tree/main/servers/filesystem
category: Filesystem & Storage MCP Servers
tags:
