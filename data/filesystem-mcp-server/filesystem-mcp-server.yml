name: Filesystem MCP Server
description: "Official Model Context Protocol Filesystem MCP server enables AI
  agents to interact with local filesystems securely. Supports
  read/write/search/replace/list operations with permissions; features:
  directory tree traversal, path protection; use cases: local file automation,
  code editing, AI dev environments; basic secure impl vs advanced with
  streaming/large file support."
