name: CometAPI MCP Server
description: TypeScript implementation of a Model Context Protocol (MCP) server
  that integrates with CometAPI's media generation capabilities, enabling
  generation of content with Midjourney, Flux, Kling, LumaLabs, Udio, and Chirp
  directly from Claude or other MCP-compatible apps.
