name: Applescript MCP
description: Executes AppleScript on macOS for native system automation and GUI
  control, accessible via MCP for AI-driven scripting. Integrates with IDEs for
  automating macOS-specific dev tasks like app testing. Complements VSCode MCP
  by adding OS-level automation beyond editor functions.
source_url: https://github.com/joshrutkowski/applescript-mcp
category: Developer Tools MCP Servers
tags:
  - applescript
  - macos
  - automation
  - IDE
