markdown: >-
  ## Overview


  MCP Compass is a discovery and recommendation service for the Model Context
  Protocol ecosystem. It helps users navigate the growing landscape of MCP
  servers and find the ones best suited to their needs.


  ## Features


  - MCP server search and discovery

  - Recommendations based on use case

  - Categorization of available servers

  - Helps navigate the MCP ecosystem
