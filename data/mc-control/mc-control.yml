markdown: |-
  ## Overview

  mc-control is a command-line tool for managing MCP servers.

  ## Features

  - Spawn and stop servers
  - Script commands
  - Automate experiments

  ## Usage

  mc-control start my-test-server
  mc-control exec my-test-server "say Hello from bot!"

  ## Pricing

  Free and open-source.
