name: CCXT MCP Server
description: MCP server providing unified access to 100+ cryptocurrency
  exchanges for on-chain data querying, real-time prices, order books, and
  trading execution via CCXT library. Key features include wallet balances, DEX
  APIs, and multi-exchange support. Ideal for AI trading bots and DeFi analysis;
  vs raw CCXT, adds LLM-compatible natural language interfaces.
