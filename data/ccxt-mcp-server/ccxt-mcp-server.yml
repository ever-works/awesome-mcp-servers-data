name: CCXT MCP Server
description: MCP server leveraging CCXT library for unified access to 100+
  cryptocurrency exchanges, providing real-time quotes, order books, trades, and
  transaction execution. Enables fetching market data and placing orders across
  exchanges like Binance, Coinbase. Perfect for multi-exchange agent trading;
  core CCXT functionality wrapped in MCP.
source_url: https://github.com/Nayshins/mcp-server-ccxt
category: Finance & Blockchain MCP Servers
tags:
  - trading
  - crypto
  - stocks
markdown: |-
  ## Overview

  CCXT-based MCP server for crypto exchange data and trading.

  ## Features

  - Real-time tickers, OHLCV
  - Order management
  - Multi-exchange support
  - Balances and positions

  ## Use Cases

  - Cross-exchange arbitrage agents
  - Trading bots

  ## Comparisons

  Direct CCXT wrapper; standardized MCP interface.

  ## Pricing

  Free; exchange APIs may have fees.
