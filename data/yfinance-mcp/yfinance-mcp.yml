name: YFinance MCP
description: MCP server using yfinance library for Yahoo Finance data, offering
  real-time stock quotes, historical prices, financial statements, analyst
  recommendations. Supports US/international stocks, ETFs, crypto for
  agent-driven analysis. Great for retail trading agents; free alternative to
  paid APIs like Alpha Vantage or CCXT.
