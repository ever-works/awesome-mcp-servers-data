markdown: >-
  ## Overview


  An MCP server that bridges GitHub issues with LLM task management
  capabilities, allowing AI assistants to query, create, and manage GitHub
  issues as actionable tasks.


  ## Features


  - GitHub issues integration

  - Task management via LLMs

  - Issue creation and updates

  - Project workflow automation

  - Natural language issue interaction
