name: AWS MCP Server
description: Official AWS MCP Server exposes AWS SDK capabilities for AI agents
  to perform resource inspection, management, and automation in cloud operations
  and CI/CD pipelines. Supports Docker self-hosting and remote deployment for
  seamless integration into DevOps workflows, handling services like EC2
  provisioning, S3 storage, and Lambda deployments. Compared to Azure MCP
  Server, it offers native AWS SDK integration for superior ecosystem
  compatibility versus Azure's ARM API approach.
