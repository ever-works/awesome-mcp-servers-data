name: AWS MCP Server
description: Official AWS MCP Server integrates AWS SDK with Kubernetes and
  cloud services for resource provisioning, EC2 scaling, S3 management, and
  Lambda deployments. Supports agentic automation in CI/CD pipelines with Docker
