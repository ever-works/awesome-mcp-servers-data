markdown: >-
  ## Overview


  Convex MCP server provides AI-powered access to reactive backend capabilities,
  combining real-time database, serverless functions, and automatic API
  generation.


  ## Features


  - **Real-Time Database**: Reactive queries that update automatically

  - **Serverless Functions**: Deploy backend logic without servers

  - **Automatic APIs**: TypeScript functions become API endpoints

  - **File Storage**: Built-in file and image handling

  - **ACID Transactions**: Strong consistency guarantees


  ## Platform Capabilities


  Convex is a reactive backend platform that replaces traditional backends with
  a fully managed service optimized for modern web applications.


  ## Use Cases


  - Real-time collaborative applications

  - Chat and messaging platforms

  - Live dashboards and analytics

  - Multiplayer games

  - Social applications


  ## Key Benefits


  - Zero backend infrastructure

  - Type-safe APIs with TypeScript

  - Real-time updates out of the box

  - Built-in authentication

  - Optimistic updates and caching


  ## MCP Integration


  Enables AI assistants to create database schemas, write serverless functions,
  configure authentication, and manage data through conversational interfaces.


  ## Developer Experience


  Provides excellent TypeScript integration with end-to-end type safety from
  database to frontend, making development fast and error-free.


  ## Real-Time Architecture


  Built for real-time applications with reactive queries that automatically
  update the UI when data changes.
