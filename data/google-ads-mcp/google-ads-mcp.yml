markdown: >-
  ## Overview


  Google's MCP server provides direct API access to Google Ads data without
  navigating the UI.


  ## Features


  - Full GAQL support for granular queries on campaigns, ad groups, keywords,
  search terms

  - Account-level visibility for budgets, bids, assets

  - Open source on GitHub


  ## Pricing


  Free and open source.
