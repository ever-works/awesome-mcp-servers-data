markdown: >-
  ## Overview


  Google's MCP server for direct API access to Google Ads data without UI
  navigation.


  ## Key Capabilities


  - Full GAQL support for complex queries on campaigns, ad groups, keywords,
  search terms, devices, time segments

  - Account-level visibility: budget status, bid strategies, asset performance

  - Open source on GitHub


  ## Strengths


  - Official and reliable data source

  - Free


  ## Limitations


  - Read-only only

  - Requires developer setup (Python, developer token, Google Cloud project)

  - Single-platform (Google Ads only)


  ## Pricing


  Free (open source).
