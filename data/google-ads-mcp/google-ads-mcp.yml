name: Google Ads MCP
description: Official open-source MCP server for Google Ads API providing
  read-only access to campaign performance, budget pacing, keyword metrics, and
  account structure via natural language queries. Supports full GAQL for
  granular data extraction. Suitable for marketers integrating Google Ads data
  into AI workflows.
