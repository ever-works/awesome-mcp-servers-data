name: Google Ads MCP
description: Official open-source MCP server for the Google Ads API, enabling AI
  assistants to query campaign performance, budget status, keywords, and account
  structure via natural language using GAQL. Provides read-only access to
  granular Google Ads data. Designed for integration with Claude, Gemini, and
  other MCP clients.
source_url: https://developers.google.com/google-ads/api/docs/mcp
category: Marketing
tags:
