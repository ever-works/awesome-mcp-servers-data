markdown: >-
  ## Overview


  Google's MCP server provides direct API access to Google Ads data without
  navigating the UI.


  ## Key Capabilities


  - Full GAQL support for granular data extraction: campaigns, ad groups,
  keywords, search terms, devices, time segments.

  - Account-level visibility: budget status, bid strategies, asset performance.


  ## Strengths


  - Official and free.

  - Complex queries simplified.


  ## Limitations


  - Read-only; no modifications.

  - Developer setup required.

  - Single-platform.


  ## Pricing


  Free (open source).
