name: Google Ads MCP
description: Official open-source MCP server for Google Ads API, enabling AI to
  query campaign performance, budget pacing, keyword metrics, and account
  structure via natural language. Supports full GAQL for granular data
  extraction. Read-only access to Google Ads data.
