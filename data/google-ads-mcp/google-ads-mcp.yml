  - read-only
  - google-ads
featured: false
markdown: >-
  ## Overview


  Google's MCP server for direct API access to Google Ads data without UI
  navigation.


  ## Features


  - Full GAQL support for complex queries on campaigns, ad groups, keywords,
  search terms

  - Account-level visibility: budgets, bids, assets, device breakdowns

  - Time segments and performance metrics


  ## Pricing


  Free and open-source.
