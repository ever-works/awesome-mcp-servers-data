featured: false
markdown: >-
  ## Overview


  PostgreSQL MCP server by CrystalDBA enables LLMs to interact directly with
  PostgreSQL databases.


  ## Deployment


  - Docker (self-hosted)


  ## Features


  - Schema inspection

  - Direct SQL execution (SELECT statements)

  - Natural language query translation


  ## Use Cases


  - Answering data questions without manual query copying


  ## Pricing


  Open-source (assumed free).
