markdown: >-
  ## Overview


  PostgreSQL MCP server enables LLMs to interact directly with PostgreSQL
  databases.


  ## Features


  - Schema inspection

  - Direct SQL execution (e.g., SELECT statements)

  - Natural language to SQL translation


  ## Deployment


  Docker (self-hosted)


  ## Pricing


  Open-source, free.
