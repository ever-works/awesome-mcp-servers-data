name: PostgreSQL MCP Server
description: MCP server for PostgreSQL databases enabling natural language
  querying and schema exploration. Translates plain English into SQL queries,
  caches database schemas for context-aware responses, and supports complex
  schema management. Prioritizes security with SSL/TLS, read-only defaults, and
  SQL injection prevention.
source_url: https://www.npmjs.com/package/@hthuong09/postgres-mcp
category: Database MCP Servers
tags:
