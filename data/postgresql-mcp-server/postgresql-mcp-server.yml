name: PostgreSQL MCP Server
description: MCP server providing direct execution access to PostgreSQL
  databases for AI agents. Agents can inspect schemas and run SELECT statements
  to answer natural language questions about data instantly. Supports Docker for
  self-hosting; Neon PostgreSQL users can use the official Neon Remote MCP as an
  alternative remote option.
source_url: https://github.com/crystaldba/postgres-mcp
