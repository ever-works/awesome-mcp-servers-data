name: PostgreSQL MCP Server
description: MCP server that provides agents with direct execution access to
  PostgreSQL databases. Agents can inspect schemas and run SELECT statements to
  answer data questions instantly. Supports Docker deployment for self-hosting.
source_url: https://github.com/crystaldba/postgres-mcp
