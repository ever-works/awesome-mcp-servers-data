markdown: |-
  ## Overview

  Local MCP server for Anki integration via AnkiConnect.

  ## Features

  - Creating cards and decks
  - Updating existing cards
  - Searching and filtering cards and decks
  - Mass update operations
  - Advanced card management tools
  - Requires local Anki installation with AnkiConnect add-on
