markdown: >-
  ## Overview


  Kong Konnect MCP Server enables AI assistants to interact with Kong Konnect
  APIs through the Model Context Protocol. It allows querying and analyzing Kong
  Gateway configurations, traffic patterns, and analytics.


  ## Features


  - Query Kong Gateway configurations

  - Analyze API traffic patterns

  - Access Kong analytics data

  - Gateway management through natural language

  - Built by the Kong team
