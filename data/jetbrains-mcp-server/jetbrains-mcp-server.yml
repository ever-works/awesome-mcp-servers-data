markdown: >-
  ## Overview


  Official JetBrains MCP server that works with JetBrains IDEs including
  IntelliJ, PyCharm, WebStorm, and Android Studio. Enables AI assistants to
  interact with the IDE programmatically.


  ## Features


  - Full JetBrains IDE integration

  - IntelliJ IDEA, PyCharm, WebStorm support

  - Android Studio compatibility

  - Programmatic IDE interaction

  - Code analysis and navigation

  - Standardized MCP tools


  ## Pricing


  Free and open-source under Apache 2.0 license.
