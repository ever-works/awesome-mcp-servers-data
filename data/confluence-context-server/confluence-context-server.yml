markdown: >-
  ## Overview


  An MCP server that connects to Confluence workspaces, providing page contents
  as context to AI assistants through slash commands in editors like Zed.


  ## Features


  - Confluence page content retrieval

  - Slash command prompts for AI assistants

  - Zed Editor integration

  - Context injection from Confluence documentation

  - Workspace knowledge access for AI
