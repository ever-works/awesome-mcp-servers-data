markdown: >-
  ## Overview


  PlanetScale MCP server provides AI-powered access to serverless MySQL
  capabilities with database branching and non-blocking schema changes powered
  by Vitess.


  ## Features


  - **Database Branching**: Create branches for development and testing

  - **Non-Blocking Schema Changes**: Deploy schema updates without downtime

  - **Horizontal Scaling**: Scale MySQL horizontally with Vitess

  - **Connection Pooling**: Built-in connection management

  - **Deploy Requests**: Review and approve schema changes


  ## Platform Capabilities


  PlanetScale is a MySQL-compatible serverless database platform built on
  Vitess, the same technology that powers YouTube's MySQL infrastructure.


  ## Use Cases


  - Modern application development

  - Safe schema migrations

  - Preview environments per PR

  - High-scale MySQL workloads

  - Multi-tenant SaaS applications


  ## Key Benefits


  - MySQL compatibility with modern workflows

  - Branching for safe schema changes

  - Horizontal scalability

  - Serverless pricing model

  - Production-grade reliability


  ## MCP Integration


  Enables AI assistants to create database branches, propose schema changes,
  manage deployments, and execute queries through conversational interfaces.


  ## Technology


  Built on Vitess, the open-source database clustering system that powers
  massive MySQL deployments at YouTube, Slack, and GitHub.
