name: AccuWeather Forecast MCP
description: MCP proxy/gateway for AccuWeather API enabling OpenAI/Claude models
  to access hourly and daily weather forecasts via standardized MCP protocol.
  Features authentication proxy and rate limiting for secure, reliable access.
  Supports unified agent API calls for weather data; provides protocol
  standardization versus direct SDKs.
