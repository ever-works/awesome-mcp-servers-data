markdown: >-
  ## Overview


  ![logo](https://github.com/TimLukaHorstmann/mcp-weather/assets/logo.png)


  AccuWeather Forecast MCP server acts as a gateway for LLMs to query weather
  data. 


  ## Features


  - Auth proxy

  - Rate limiting

  - Hourly/daily forecasts


  ## Use Cases


  - Unified weather API calls in AI agents


  ## Pricing


  Free tier available.
