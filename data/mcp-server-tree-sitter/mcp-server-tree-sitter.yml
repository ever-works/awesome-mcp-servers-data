  - ast
  - syntax-highlighting
markdown: >-
  ## Overview


  MCP Server built on Tree-sitter that provides structured code parsing and
  analysis capabilities, enabling AI assistants to understand code structure and
  navigate projects more effectively.


  ## Features


  - Tree-sitter based code parsing

  - Structured code analysis

  - Enhanced code navigation for AI assistants
