name: MCP Server Tree-sitter
description: Tree-sitter MCP Server enables code parsing and syntax analysis for
  100+ languages via MCP, powering AI code understanding. It supports AST
  generation, query-based extraction, and incremental parsing. Use cases include
  code review agents, refactoring tools, and documentation generation. It serves
  as an alternative to LSP servers with native MCP integration.
source_url: https://github.com/wrale/mcp-server-tree-sitter
category: Code Analysis MCP Servers
tags:
