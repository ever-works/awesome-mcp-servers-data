markdown: >-
  ## Overview


  Tree-sitter based MCP Server for code parsing and syntax analysis across
  numerous programming languages.


  ## Features


  - Multi-language syntax parsing (100+)

  - AST generation and traversal

  - Query language for code extraction

  - Incremental parsing for efficiency


  ## Use Cases


  - AI code review and analysis

  - Refactoring assistance

  - Documentation from code structure


  ## Pricing


  Free and open-source.
