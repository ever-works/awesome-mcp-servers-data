name: Brave Search MCP Server
description: Privacy-focused MCP server providing web and local search
  capabilities via Brave Search API. Supports flexible search parameters for
  technical documentation retrieval, pagination, freshness controls, and
  filtering. Integrates with development environments like Claude Desktop using
  stdio or SSE transport, offering 2,000 free queries per month.
