markdown: |-
  ## Features

  - Execute Python and JavaScript in isolated cloud sandboxes.
  - Run shell commands and capture stdout/stderr.
  - Install packages and manage dependencies dynamically.
  - Persist sandboxes across tool calls for multi-step sessions.

  ## Pricing

  Usage-based pricing with free tier.
