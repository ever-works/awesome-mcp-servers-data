markdown: >-
  ## Overview


  ebpfExecDB is an MCP service that enables LLMs to retrieve and execute eBPF
  commands through an eBPF Agent.


  ## Features


  - eBPF command retrieval via MCP

  - Agent-based execution

  - Linux network and systems observability
