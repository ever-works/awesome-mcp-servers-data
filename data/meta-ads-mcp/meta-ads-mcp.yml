markdown: >-
  ## Overview


  Popular implementations include pipeboard/meta-ads-mcp and brijr/meta-mcp for
  production use.


  ## Key Capabilities


  - Campaign management: create, budgets, pause/activate ad sets, targeting.

  - Creative analysis: performance, variations, fatigue.

  - Audience insights: segments, overlap.


  ## Strengths


  - Read-write execution.

  - Deep Meta API coverage.


  ## Limitations


  - Community-maintained.

  - Meta-only data.

  - Developer setup.


  ## Pricing


  Free (open source, self-hosted).
