name: Meta Ads MCP
description: Community-built open-source MCP servers for Meta Ads (Facebook,
  Instagram) enabling read-write access to campaign management, creative
  analysis, and audience insights. Popular implementations include Pipeboard's
  meta-ads-mcp and brijr/meta-mcp. Allows AI to create, modify, pause campaigns
  for Meta-focused marketers.
source_url: https://github.com/pipeboard/meta-ads-mcp
category: Marketing
tags:
  - read-write
  - meta
  - open-source
  - community
featured: false
markdown: >-
  ## Overview


  Community MCP for Meta Marketing API with read-write capabilities.


  ## Key Capabilities


  - Campaign management: create, modify budgets, pause/activate ad sets,
  targeting

  - Creative analysis and audience insights


  ## Strengths


  - Read-write execution

  - Free and open source


  ## Limitations


  - Community-maintained

  - Meta-only data

  - Developer setup required


  ## Pricing


  Free (open source, self-hosted).
