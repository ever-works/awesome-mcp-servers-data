name: Blender MCP Server
description: MCP server for Blender enabling interactive 3D modeling, scene
  creation, object manipulation, material control, scene inspection, and Python
  code execution via Claude AI.
source_url: https://github.com/ahujasid/blender-mcp
category: Media Processing MCP Servers
tags:
  - blender
  - 3d-modeling
  - open-source
markdown: |-
  ## Features

  - Two-way communication with Claude AI
  - Create/modify/delete 3D objects
  - Apply/modify materials and colors
  - Scene inspection
  - Run Python code in Blender

  ## Requirements

  - Blender 3.0+
  - Python 3.10+
  - uv package manager

  ## Setup for Claude Desktop

  Add to claude_desktop_config.json:
  ```json
  {
    "mcpServers": {
      "blender": {
        "command": "uvx",
        "args": ["blender-mcp"]
      }
    }
  }
  ```
  For Cursor: `uvx blender-mcp`

  ## Pricing

  Free and open-source.
