name: Linear MCP
description: MCP server connecting AI to Linear issue tracker for reading,
  creating, updating issues, managing labels, assignees, and statuses. Reduces
  context switching by handling common tracker tasks via prompts.
source_url: https://linear.app/mcp
category: Project Management MCP Servers
tags:
  - issue-tracking
  - official
markdown: |-
  ## Features

  - Read, create, update issues and sub-issues
  - Manage labels, priorities, assignees, statuses
  - Search projects/teams by keyword/filter
  - Check cycle/sprint status

  ## Use Cases

  - Create bug report in Backend project for API issue
  - List assigned tickets in sprint
  - Mark ticket as done with comment

  ## Pricing

  Included with Linear.
