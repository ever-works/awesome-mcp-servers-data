markdown: >-
  ## Overview


  mcp-server-docker is a Model Context Protocol server that provides Docker
  management capabilities to AI assistants like Claude. It exposes Docker engine
  operations as MCP tools.


  ## Features


  - Manage Docker containers (start, stop, restart, remove)

  - List and inspect containers, images, and volumes

  - Execute commands inside running containers

  - View container logs

  - Network management

  - Image pull and removal operations
