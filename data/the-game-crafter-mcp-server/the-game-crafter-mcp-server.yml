name: The Game Crafter MCP Server
description: MCP server for designing, managing, and pricing tabletop games on
  The Game Crafter platform. Supports catalog browsing, project creation,
  artwork uploads, and production management.
source_url: https://github.com/alex-gon/thegamecrafter-mcp-server
category: Gaming MCP Servers
tags:
  - open-source
  - tabletop-games
  - game-design
  - print-on-demand
markdown: >-
  ## Overview


  Integrates The Game Crafter's print-on-demand service for tabletop games into
  MCP workflows, allowing AI agents to handle game design and production tasks.


  ## Features


  - Browse product catalogs and components

  - Create and manage print projects

  - Calculate pricing and shipping

  - Upload artwork and proofs

  - Order prototypes and full runs


  ## Use Cases


  - AI-assisted tabletop game prototyping

  - Automated game component sourcing


  ## Pricing


  Free and open-source. Platform fees apply for production.
