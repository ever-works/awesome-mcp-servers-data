markdown: >-
  ## Overview


  Eagle MCP provides Model Context Protocol integration for Eagle, a popular
  design asset management application. It enables AI assistants to search,
  browse, and manage design resources.


  ## Features


  - Search Eagle asset library via MCP

  - Query images and media resources

  - Access asset metadata and tags

  - Manage design asset collections

  - AI-powered design asset discovery
