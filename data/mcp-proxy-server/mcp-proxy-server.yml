markdown: >-
  ## Overview


  MCP Proxy Server acts as a central hub that aggregates multiple MCP resource
  servers and presents them through a unified interface. This simplifies client
  configuration and enables load balancing across MCP servers.


  ## Features


  - Aggregates multiple MCP resource servers

  - Single unified interface for clients

  - Simplifies distributed MCP architecture

  - Enables centralized server management

  - Supports resource hub integration
