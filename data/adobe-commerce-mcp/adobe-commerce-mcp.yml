markdown: >-
  ## Overview


  Adobe Commerce MCP server enables AI agents to interact with Adobe Commerce
  GraphQL API for e-commerce operations, functioning as CRM/ERP for business
  productivity.


  ## Features


  - Product catalog CRUD

  - Order management and fulfillment

  - Customer data access and segmentation


  ## Use Cases


  - Agent sales automation: AI can process orders, update inventory, handle
  customer inquiries automatically.


  ## Comparisons


  | Feature | Adobe Commerce MCP | Direct GraphQL |

  |---------|---------------------|---------------|

  | AI Integration | Native MCP support | Manual queries |

  | Automation | Agent workflows | Custom scripts |


  ## Pricing


  Open-source; Adobe Commerce licensing applies.
