markdown: >-
  ## Overview


  A CLI tool and MCP server for managing MCP server JSON configuration files
  with advanced features including version control, profile management, and
  multi-client support.


  ## Features


  - MCP server configuration management

  - Version control for config files

  - Profile management

  - Multi-client support (Claude and others)

  - JSON configuration validation
