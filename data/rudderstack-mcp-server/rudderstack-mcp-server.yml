markdown: >-
  ## Overview


  RudderStack MCP server provides AI-powered access to warehouse-first customer
  data platform capabilities, enabling management of event collection, reverse
  ETL, and data activation workflows.


  ## Features


  - **Event Streaming**: Collect and route customer event data

  - **Reverse ETL**: Sync warehouse data to business tools

  - **Warehouse First**: Built for modern data stack architectures

  - **200+ Integrations**: Connect to analytics, marketing, and data tools

  - **Data Governance**: Privacy and compliance controls


  ## Platform Capabilities


  RudderStack is an open-source alternative to Segment, designed for
  warehouse-first architectures where the data warehouse is the single source of
  truth.


  ## Use Cases


  - Building warehouse-native CDP

  - Implementing reverse ETL pipelines

  - Collecting product analytics events

  - Syncing customer data to marketing tools

  - Managing cross-platform identity


  ## Key Differentiators


  - Open-source core with self-hosted option

  - Warehouse-first architecture

  - Lower cost than Segment

  - Full data ownership and control

  - Active community support


  ## MCP Integration


  Enables AI assistants to configure event pipelines, manage reverse ETL syncs,
  query transformation logic, and troubleshoot data flows through natural
  language.


  ## Modern Data Stack


  Designed for the modern data stack with native support for Snowflake,
  BigQuery, Databricks, and other cloud data warehouses.
