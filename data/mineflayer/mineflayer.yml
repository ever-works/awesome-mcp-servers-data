name: Mineflayer
description: Mineflayer is a JavaScript bot framework for Minecraft server
  control via MCP, enabling automation of navigation, crafting, block
  interaction, combat, and chat parsing. It supports AI integration for creating
  autonomous agents in game environments. Use cases include developing game AI
  agents, automated farming, and server testing; unlike vanilla Minecraft, it
  provides programmatic bot control without requiring human players.
