name: Mineflayer
description: "JavaScript MCP server framework for Minecraft bot automation,
  supporting navigation, crafting, combat, chat parsing, and player management
  via RCON protocol. Enables AI agents to act as autonomous players in game
  environments. Use cases: game AI development, automated farming, server
  testing; vs raw RCON, provides high-level MCP tools for LLMs."
