name: Notion MCP Server
description: Official MCP server maintained by Notion for integrating AI agents
  with Notion workspaces. Supports database operations, page management, and
  workspace access, providing reliable and up-to-date tool access via
  vendor-hosted endpoints.
source_url: https://mcp.notion.com/mcp
