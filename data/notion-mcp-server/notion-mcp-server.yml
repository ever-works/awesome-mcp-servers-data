name: Notion MCP Server
description: MCP server providing AI agents access to Notion workspaces for RAG
  pipelines, enabling search, retrieval, and updates on structured pages and
  databases. Supports hierarchical note organization for effective knowledge
  retrieval. Ideal for building agent knowledge bases with familiar note-taking
  interfaces.
