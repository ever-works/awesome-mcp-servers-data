markdown: >-
  ## Overview


  SegmentStream MCP turns AI assistants into agentic marketing analysts by
  exposing nine core measurement technologies built over seven years, managing
  $100M+ in ad spend.


  ## Features


  - Identity Graph for cross-device user profiles

  - Cross-Channel Attribution for accurate ROAS and CPA

  - Marketing Mix Optimization for automated budget reallocation

  - Incrementality Testing with geo holdout experiments

  - Signal Quality with synthetic conversions via CAPI

  - Visit Scoring and Predictive Lead Scoring using ML

  - Customer LTV Prediction

  - Continuous Optimization Loop for agentic execution

  - 30+ turnkey integrations with ad platforms like Google, Meta, TikTok

  - 100+ pre-built measurement skills


  ## Pricing


  Subscription required.
