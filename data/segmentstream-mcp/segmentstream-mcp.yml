markdown: >-
  ## Overview


  SegmentStream MCP exposes a full measurement engine with nine core
  technologies: Identity Graph, Cross-Channel Attribution, Self-Reported
  Reattribution, Marketing Mix Optimization, Incrementality Testing, Signal
  Quality, Visit Scoring, Predictive Lead Scoring, and Customer LTV Prediction.


  ## Features


  - AI-powered budget execution with Continuous Optimization Loop

  - 100+ pre-built measurement skills for performance analysis, anomaly
  detection, and optimization

  - Data stitched from 30+ platforms including Google, Meta, TikTok, LinkedIn

  - Unified attribution correcting platform biases

  - Shareable reports with live links and PDF exports

  - Full SQL access to data in BigQuery


  ## Pricing


  Subscription required.
