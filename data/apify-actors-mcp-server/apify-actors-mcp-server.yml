markdown: >-
  ## Overview


  The Apify Actors MCP Server integrates Apify's platform of pre-built web
  scraping and automation Actors with AI assistants via the Model Context
  Protocol. It enables LLMs to discover, configure, and run Actors for data
  extraction tasks.


  ## Features


  - Access to thousands of pre-built Actors on Apify platform

  - Configure and run Actors through natural language

  - Retrieve results from Actor runs

  - Seamless integration with MCP-compatible AI clients

  - Supports data scraping, extraction, and automation tasks
