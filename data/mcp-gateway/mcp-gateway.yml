name: MCP Gateway
description: Microsoft's official MCP Gateway is a reverse proxy and management
  layer for MCP servers, enabling scalable, session-aware routing, lifecycle
  management, and integration with Microsoft Entra ID for authentication. Key
  features include dynamic server discovery, observability tools, and secure
  multi-tenant deployments. Ideal for enterprise AI agent tool calling and
  orchestration, it offers production-grade reliability compared to basic
  community proxies.
