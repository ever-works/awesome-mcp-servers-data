name: NihFix.Postgres.Mcp
description: NihFix.Postgres.Mcp enables real-time interactions between AI
  agents and PostgreSQL databases using SSE and STDIO protocols via MCP. Key
  features include live query execution and streaming responses. Use cases
  involve dynamic AI agent data access; similar to other PostgreSQL MCP servers
  but emphasizes real-time SSE connectivity.
