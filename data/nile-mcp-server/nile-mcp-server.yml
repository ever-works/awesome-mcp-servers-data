markdown: >-
  ## Overview


  MCP server for Nile Database that enables LLMs to manage and query databases,
  tenants, users, and authentication through MCP tools.


  ## Features


  - Multi-tenant database management

  - Tenant CRUD operations

  - User management

  - Authentication handling

  - Database querying

  - Standardized MCP interface


  ## Pricing


  Nile offers a multi-tenant database-as-a-service with free tier available.
