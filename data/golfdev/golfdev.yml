markdown: >-
  ## Overview


  Golf.dev specializes in secure deployment of organization-owned MCP servers
  via a single master MCP server.


  ## Key Features


  - Role-based access controls (RBAC)

  - Identity management and authentication

  - End-to-end logging

  - Reports and visualizations

  - MCP-aware rate limiting

  - Mitigations against prompt injection attacks

  - Session replay detection
