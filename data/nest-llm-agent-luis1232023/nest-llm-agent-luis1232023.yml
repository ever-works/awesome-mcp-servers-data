markdown: >-
  ## Overview


  A NestJS-based tool that converts stdio-based MCP servers to RESTful
  endpoints, making it easy to deploy MCP servers as web services.


  ## Features


  - Stdio to RESTful conversion

  - Web service integration

  - MCP gateway functionality

  - NestJS-based architecture
