markdown: |-
  ## Overview

  MintMCP centralizes MCP connections and provides essential security features.

  ## Key Features

  - MCP Server Inventory
  - Easy deployment via virtual servers for Managed and remote MCPs
  - End-to-end logging
  - Reporting and dashboards
  - Essential guardrails including blocking dangerous commands
  - MCP server registry
  - LLM monitoring
