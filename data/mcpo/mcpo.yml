markdown: >-
  ## Overview


  Developed by the Open WebUI team, MCPO is a simple, secure proxy server that
  bridges MCP with OpenAPI specifications, making any OpenAPI endpoint
  accessible as MCP tools.


  ## Features


  - MCP-to-OpenAPI proxy

  - Secure endpoint bridging

  - Simple configuration

  - Open WebUI team project
