name: 1mcppapp Agent
description: Unified MCP server aggregating multiple MCP servers into a single
  endpoint, integrating with IDEs like VSCode and JetBrains to provide seamless
  access to diverse tools during coding. Key features include tool discovery,
  unified API, and simplified management. Use cases encompass code completion
  for AI agents and debugging workflows; surpasses native LSP by supporting
  multi-server tool aggregation.
source_url: https://github.com/1mcp-app/agent
category: Developer Tools & IDE MCP Servers
