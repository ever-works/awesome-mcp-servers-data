name: Minecraft MCP Server
description: "Minecraft MCP Server powered by Mineflayer enables AI agents to
  control Minecraft bots via MCP, handling building, exploration, and
  interactions through natural language. Features automation of player-like
  actions with AI integration. Use cases: game AI agents, educational tools,
  automated world building; compared to vanilla Minecraft, adds an intelligent
  control layer for non-player entities."
