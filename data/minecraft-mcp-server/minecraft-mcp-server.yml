name: Minecraft MCP Server
description: "MCP server for Minecraft bot control using Mineflayer, allowing AI
  agents to handle building, exploration, chat, and player interactions via
  standardized protocol over RCON. Features include real-time navigation,
  crafting, block management, and mod compatibility. Use cases: AI game bots,
  server administration, automated testing; vs raw RCON, MCP standardizes tools
  for LLM integration."
source_url: https://github.com/yuniko-software/minecraft-mcp-server
category: Gaming & Entertainment MCP Servers
tags:
  - Minecraft
  - RCON
  - Game AI
markdown: >-
  ## Overview


  Minecraft MCP Server powered by Mineflayer enables AI agents to control
  Minecraft bots via MCP for building, exploration, and interactions.


  ## Features


  - Natural language interaction

  - Structure building and world exploration

  - Chat and player management

  - AI agent control with mod support


  ## Use Cases


  - Deploying AI bots in games

  - Automated server admin tasks

  - Educational game AI tools


  ## Pricing


  Free and open-source.
