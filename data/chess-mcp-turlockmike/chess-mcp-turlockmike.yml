name: Chess MCP (turlockmike)
description: "Chess MCP (turlockmike) is an MCP server providing full chess
  functionality including game creation, move execution, position evaluation,
  and integration with analysis engines. It supports standard FEN notation,
  legal move generation, best move computation, and game history review for
  single or multiplayer scenarios. Use cases: AI chess bots for opponents or
  training, puzzle solving, opening preparation; unlike API-only tools like
  chess-mcp for Chess.com, this offers local server control and extensible
  engine support."
source_url: https://github.com/turlockmike/chess-mcp
