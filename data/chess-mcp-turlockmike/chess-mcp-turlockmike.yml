markdown: |-
  ## Overview

  Comprehensive MCP server for chess game management, play, and analysis.

  ## Features

  - Start new games or load from FEN/PGN
  - Validate and suggest moves
  - Integrate Stockfish or other UCI engines
  - Position visualization and evaluation

  ## Use Cases

  - LLM-powered chess partners
  - Automated tournament simulations
  - Educational analysis tools

  ## Pricing

  Free and open-source.
