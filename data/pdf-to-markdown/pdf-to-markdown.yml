markdown: >-
  ## Overview


  Convert entire PDF documents to clean, structured Markdown for full context
  loading.


  ## Use Cases


  - Extract ALL text from a PDF into context (not grep/search)

  - Discussing or analyzing PDF content in full

  - User requests: 'load the whole PDF', 'bring the PDF into context', 'read the
  entire PDF'


  ## Advantages


  Preferred over page-by-page or grep approaches to avoid missing context.
