name: SBB MCP
description: Swiss Federal Railways (SBB/CFF/FFS) MCP server with real-time
  train schedules, ticket prices with Half-Fare/GA support, and direct purchase
  links via the official SBB SMAPI. Provides transportation data for Swiss rail
  network.
