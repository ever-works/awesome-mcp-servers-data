  ## Features

  - Real-time train schedules
  - Ticket prices with Half-Fare/GA
  - Direct purchase links via SBB SMAPI

  ## Use Cases

  - Travel planning in Switzerland
  - Train status queries

  ## Pricing

  Free and open-source.
