markdown: >-
  ## Overview


  An MCP server that provides npm package search capabilities to AI assistants,
  enabling natural language queries about Node.js packages, their versions, and
  metadata.


  ## Features


  - npm registry search

  - Package metadata retrieval

  - Version information queries

  - Claude Desktop compatibility

  - Natural language package discovery
