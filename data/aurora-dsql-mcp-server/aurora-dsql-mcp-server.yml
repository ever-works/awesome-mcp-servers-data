markdown: |-
  ## Overview

  Provides direct SQL access to Amazon Aurora databases via MCP.

  ## Installation

  ```bash
  claude mcp add aurora-dsql uvx awslabs.aurora-dsql-mcp-server@latest
  ```

  ## Pricing

  Free and open-source under the Apache 2.0 license.
