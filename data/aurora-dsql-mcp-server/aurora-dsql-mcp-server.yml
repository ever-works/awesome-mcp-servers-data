name: Aurora DSQL MCP Server
description: Aurora DSQL MCP Server provides AI agents with direct SQL query
  access to Amazon Aurora databases via MCP. Key features include open-source
  implementation by AWS Labs, easy installation via uvx, and support for direct
  SQL execution. Use cases encompass AI-driven data retrieval and analysis;
  compared to general PostgreSQL MCP, it offers native AWS Aurora optimization
  and serverless compatibility.
