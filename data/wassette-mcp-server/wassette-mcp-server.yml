name: Wassette MCP Server
description: Wassette MCP Server offers a secure runtime for executing
  WebAssembly (WASM) components via MCP, enabling safe code execution for AI
  agents. Features sandboxed environments, component model support, and
  enterprise-grade isolation. Use cases include secure plugin execution for
  LLMs; differentiates from wasmtime or WASM runtimes by native MCP tooling
  compatibility.
