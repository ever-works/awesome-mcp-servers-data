name: CMR-MCP NASA Earthdata Search
description: NASA PO.DAAC server connecting AI assistants to Earth science data
  catalogs via Common Metadata Repository (CMR). Enables keyword, date range,
  and filter-based dataset searches for climate and oceanographic research.
