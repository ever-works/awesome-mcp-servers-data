markdown: >-
  ## Overview


  A Model Context Protocol server that provides read-only access to MySQL
  databases. Enables LLMs to inspect database schemas and execute read-only
  queries safely.


  ## Features


  - Read-only MySQL database access

  - Database schema inspection

  - Safe query execution

  - Prevents destructive operations

  - Standardized MCP tools


  ## Usage


  Configure with MySQL connection credentials. The server only allows read
  operations.
