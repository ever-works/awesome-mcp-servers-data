markdown: >-
  ## Overview


  MCP REST API Tester is a TypeScript-based MCP server that enables developers
  to test and interact with any REST API endpoints directly through Cline and
  similar AI development tools.


  ## Features


  - Test REST API endpoints through MCP

  - Full HTTP method support (GET, POST, PUT, DELETE, etc.)

  - Direct integration with Cline IDE

  - Works with any REST API

  - Eliminates need for external API testing tools
