name: wanaku
description: SSE-based MCP router for orchestrating multiple servers, supporting
  tool chaining and state via extensible routing. Lightweight alternative to
  LangGraph for MCP proxying.
source_url: https://github.com/wanaku-ai/wanaku
category: Workflow & Orchestration MCP Servers
tags:
  - Workflow
  - Orchestration
  - router
markdown: |-
  ## Features

  - Extensible routing engine for chaining
  - SSE transport for stateful streams
  - Multi-server aggregation

  ## Use Cases

  - Agent flows across distributed MCP servers
  - Middleware for tool orchestration

  ## Comparison to LangGraph

  MCP-specific routing; LangGraph for LLM graphs.

  ## Pricing

  Free open-source (Apache-2).
