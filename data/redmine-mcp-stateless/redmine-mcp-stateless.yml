name: Redmine MCP Stateless
description: Stateless Redmine MCP server where credentials are passed
  per-request via HTTP headers and never stored on the server. Supports listing,
  creating, updating issues, full-text search across subjects, descriptions and
  comments, and editing journals for Redmine 5.0+. Deployable on RHEL with
  systemd or Docker.
source_url: https://github.com/daiji-sshr/redmine-mcp-stateless
