markdown: |-
  ## Overview

  Stateless Redmine MCP server.

  ## Features

  - Credentials passed per-request via HTTP headers, never stored
  - List, create, update issues
  - Full-text search across subjects, descriptions, comments
  - Edit journals (Redmine 5.0+)
  - Deployable on RHEL (systemd) or Docker

  ## Pricing

  Open-source, free.
