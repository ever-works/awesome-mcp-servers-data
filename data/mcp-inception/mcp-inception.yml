markdown: >-
  ## Overview


  mcp-inception provides a meta-MCP capability where MCP clients can call other
  MCP clients, enabling powerful patterns like context window offloading, task
  delegation, and splitting work across different AI models.


  ## Features


  - Recursive MCP client calls

  - Context window offloading

  - Task delegation between AI models

  - Split work between different model types

  - Enables complex multi-agent workflows
