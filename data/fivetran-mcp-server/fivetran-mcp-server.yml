markdown: >-
  ## Overview


  The Fivetran MCP Server provides a seamless way for AI assistants to interact
  with the Fivetran API to manage your Fivetran account. Built by Infinite
  Lambda and community partners, this tool allows AI assistants to interact with
  Fivetran through natural language, enabling connection management and user
  operations without opening the Fivetran UI or writing API calls.


  ## Features


  - **25+ Fivetran Tools**: Comprehensive toolset for Fivetran operations

  - **Connection Management**: List, view, and manage data connectors

  - **Sync Control**: Pause, resume, and monitor sync operations

  - **User Management**: Invite and manage Fivetran users

  - **Natural Language Interface**: Interact with Fivetran using conversational
  commands

  - **API Abstraction**: No need to write manual API calls

  - **Multi-Account Support**: Manage multiple Fivetran accounts


  ## Key Operations


  - List all connections and their status

  - View connector configurations and settings

  - Pause syncs for maintenance or troubleshooting

  - Resume paused syncs

  - Invite new users to the organization

  - Check sync history and logs

  - Monitor data pipeline health


  ## Use Cases


  - Operational data pipeline management

  - AI-assisted troubleshooting of sync issues

  - Automated user provisioning

  - Sync schedule management

  - Data pipeline health monitoring

  - Connection configuration via natural language

  - Team collaboration on data operations


  ## Composability


  Can be combined with other MCP servers like Snowflake MCP Server for
  end-to-end data stack management, enabling complex workflows across multiple
  data tools.


  ## Integration Benefits


  - No context switching to Fivetran UI

  - Natural language data pipeline management

  - Faster operational responses

  - Reduced learning curve for team members

  - AI-assisted troubleshooting

  - Automated routine operations


  ## Implementation


  Built by Infinite Lambda, a Fivetran partner, providing deep integration
  knowledge and best practices.


  ## Compatibility


  Works with Claude Desktop and any MCP-compatible AI assistant including Cursor
  and Windsurf.


  ## Pricing


  MCP server is open-source. Fivetran subscription pricing applies for the data
  pipeline service.
