name: azure-mcp
description: Official Microsoft MCP server for Azure services including Storage,
  Cosmos DB, and Azure Monitor, supporting cloud operations and CI/CD automation
  via MCP. Enables resource management in DevOps workflows. Complements Azure
  MCP Server with focused service tools, differing from AWS MCP's broader SDK
  scope.
