markdown: |-
  ## Overview

  Mobile companion MCP server for Antigravity IDE.

  ## Features

  - Mirror AI chat sessions on phone
  - Send messages, upload files
  - Stop AI generation
  - 9 MCP tools and local OpenAPI API
  - Cross-device workflow automation

  ## Use Cases

  - Mobile code review and collaboration
  - Remote IDE access
  - On-the-go AI assistance

  ## Pricing

  Free and open-source.
