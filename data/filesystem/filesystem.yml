name: Filesystem
description: The Filesystem MCP server provides secure access to local
  filesystems for read/write operations, directory listing, metadata retrieval,
  and file management, incorporating security measures like sandboxing,
  configurable access controls, and permission enforcement. Key features include
  multi-format file support and efficient IO operations suitable for diverse use
  cases. Ideal for AI agent file management such as backups, content generation,
  and local data handling; offers direct local access unlike cloud-centric
  alternatives like AWS S3 MCP servers.
