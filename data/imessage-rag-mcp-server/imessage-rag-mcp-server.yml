markdown: >-
  ## Overview


  An iMessage RAG server built at the Anthropic MCP Hackathon (NYC) that enables
  AI assistants to search and contextually retrieve information from iMessage
  conversation history.


  ## Features


  - iMessage conversation indexing

  - Retrieval augmented generation

  - Semantic message search

  - Context retrieval from chat history

  - Anthropic MCP Hackathon project
