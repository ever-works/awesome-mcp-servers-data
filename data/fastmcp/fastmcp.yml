markdown: >-
  ## Overview


  FastMCP is a TypeScript framework designed for building MCP servers with an
  intuitive, expressive API. It reduces boilerplate and provides a
  developer-friendly interface for defining tools, resources, and prompts.


  ## Features


  - Expressive TypeScript API

  - Minimal boilerplate code

  - Tool, resource, and prompt definitions

  - Type-safe server implementations

  - Quick server setup
