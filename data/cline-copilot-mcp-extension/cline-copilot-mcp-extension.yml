  - devops
markdown: >-
  ## Overview


  A VSCode extension enabling MCP server integration with GitHub Copilot,
  extending Copilot's capabilities through MCP tools and resources.


  ## Features


  - Copilot integration with MCP servers

  - Access to MCP tools from Copilot

  - Resource and prompt management

  - Enhanced AI development experience
