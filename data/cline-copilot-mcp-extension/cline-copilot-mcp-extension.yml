name: Cline Copilot MCP Extension
description: "Cline Copilot MCP Extension is a VSCode extension that enables
  GitHub Copilot to utilize MCP servers, providing access to external tools,
  resources, and custom prompts for superior AI-assisted coding. Key features:
  MCP tool integration in Copilot, resource/prompt management, VSCode seamless
  embedding, enhanced AI capabilities. Primary use cases: AI agent enhancement
  in IDEs, dev workflows for complex projects; vs standard Copilot Chat, unlocks
  full MCP ecosystem without API wrappers."
source_url: https://github.com/VikashLoomba/copilot-mcp
category: Agent Orchestration MCP Servers
tags:
