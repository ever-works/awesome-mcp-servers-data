  ## Overview

  PostgreSQL MCP server enables agents to interact directly with PostgreSQL
  databases.


  ## Features

  - Schema inspection

  - Execute SELECT statements

  - Natural language to SQL translation


  ## Deployment

  Docker (self-hosted)


  ## Pricing

  Open-source (free)
