markdown: >-
  ## Overview


  MCP server for Bitnovo Pay integration with AI agents, providing
  cryptocurrency payment capabilities through the Bitnovo Pay API.


  ## Features


  - Payment creation and management

  - Payment status checking

  - QR code generation

  - Webhook management

  - Support for multiple tunnel providers (ngrok, zrok, manual)

  - Multi-cryptocurrency support


  ## Use Cases


  - AI agent cryptocurrency payments

  - Crypto checkout integration

  - Payment status monitoring
