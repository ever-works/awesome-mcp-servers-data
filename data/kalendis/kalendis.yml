  ## Overview


  Kalendis MCP server generates TypeScript clients and API route handlers for
  the Kalendis scheduling API, supporting multiple frameworks.


  ## Features


  - TypeScript client generation

  - API route handler generation

  - Multi-framework support (Next.js, Express, Fastify, NestJS)

  - Availability management integration

  - Booking functionality streamlining
