markdown: >-
  ## Overview


  Google Maps MCP Server was a reference implementation that demonstrated
  geolocation and mapping capabilities through the Model Context Protocol. It
  has been archived and can be found in the servers-archived branch.


  ## Features


  - Location search and geocoding

  - Turn-by-turn directions

  - Place details and information

  - Distance and duration calculations


  ## Status


  This server is now archived and maintained as a reference example in the
  servers-archived branch of the modelcontextprotocol/servers repository.


  ## Purpose


  As a reference server, it demonstrated how MCP can be used to give LLMs access
  to mapping and location services securely and efficiently.


  ## Pricing


  Free and open-source reference implementation.
