name: Sentry MCP
description: MCP server providing direct AI access to Sentry error monitoring,
  fetching full issue context, stack traces, breadcrumbs, and performance data.
  Improves debugging accuracy with complete error context.
source_url: https://sentry.io/mcp
category: Monitoring
tags:
  - error-tracking
  - observability
  - official
markdown: |-
  ## Features

  - Fetch full error context, stack traces, breadcrumbs, events
  - Correlate errors with releases/deployments
  - Search issues by tag, environment, time, message
  - Inspect performance data and traces

  ## Use Cases

  - Pull unresolved production issues tagged 'payment'
  - Fetch context for error FRONTEND-4821 and suggest fix
  - Check error spike after deploy

  ## Pricing

  Included with Sentry.
