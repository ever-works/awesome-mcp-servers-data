name: Sentry MCP
description: Official Sentry MCP server providing AI direct access to error
  monitoring data, including stack traces, breadcrumbs, related events, and
  performance traces. Enables accurate debugging suggestions from full issue
  context without manual copying. Improves debugging efficiency for production
  issues.
source_url: https://docs.sentry.io/platforms/javascript/guides/mcp/
category: Monitoring
tags:
  - official
  - error-tracking
  - observability
featured: false
markdown: |-
  ## Features

  - Fetch full error context, stack traces, breadcrumbs
  - Correlate errors with releases/deployments
  - Search issues by tag, environment, time
  - Inspect performance data and traces

  ## Use Cases

  - Retrieve unresolved production issues and rank by frequency
  - Analyze specific error context for fix suggestions
  - Check error spikes post-deployment
