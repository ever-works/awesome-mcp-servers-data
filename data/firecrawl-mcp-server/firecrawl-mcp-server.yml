name: Firecrawl MCP Server
description: Firecrawl MCP server turns websites into clean, LLM-ready data by
  scraping URLs into markdown or structured JSON, crawling sites, searching the
  web, extracting structured data, and providing browser interaction tools. It
  offers 13+ tools including scraping, crawling, mapping, extraction,
  agent-based research, and persistent browser sessions for multi-step
  automation. Widely used for web research, competitor audits, and data
  gathering directly in AI coding environments.
source_url: https://github.com/mendableai/firecrawl
