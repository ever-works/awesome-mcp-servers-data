name: Firecrawl MCP Server
description: MCP server that turns websites into clean, LLM-ready data by
  stripping ads, navigation, and markup. Exposes 13+ tools for scraping,
  crawling, searching, structured extraction, autonomous agents, and browser
  interactions. Widely adopted with over 85,000 GitHub stars for production AI
  workflows.
