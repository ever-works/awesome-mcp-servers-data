name: Firecrawl MCP Server
description: MCP server that turns websites into clean, LLM-ready data by
  scraping, crawling, searching, and extracting structured content from the web.
  Provides 13+ tools for scraping URLs to markdown/JSON, site crawling, web
  search, structured extraction, autonomous research agents, browser
  interactions, and persistent browser sessions. Widely used in AI workflows for
  competitor analysis, changelog extraction, and research tasks without leaving
  the editor.
source_url: https://www.firecrawl.dev
category: Content Extraction
