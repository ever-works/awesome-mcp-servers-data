name: Firecrawl MCP Server
description: Firecrawl MCP server provides tools to scrape websites into clean
  markdown or JSON, search the web, crawl sites asynchronously, extract
  structured data using LLMs, and control browser sessions for interactive
  automation. It supports 13+ tools including autonomous research agents and
  page interactions, making it ideal for web data extraction in AI workflows.
  Widely adopted with over 85,000 GitHub stars.
source_url: https://www.firecrawl.dev/docs/mcp
