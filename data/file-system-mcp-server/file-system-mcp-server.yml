name: File System MCP Server
description: MCP server for file operations and local storage access via
  standardized protocol, enabling AI agents to upload, query, sync, read/write
  files, manage directories, and retrieve metadata, unlike direct APIs like S3
  SDK. Features secure access with gitignore patterns and least privilege
  directory controls. Ideal for agent file handling in local AI workflows
  requiring persistent storage.
