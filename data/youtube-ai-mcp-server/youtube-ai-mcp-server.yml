markdown: >-
  ## Overview


  An AI-powered YouTube MCP server that works without the official API, using
  vector databases for semantic search over video transcripts and content.


  ## Features


  - YouTube video search

  - Detailed transcript retrieval

  - Semantic search over video content

  - No official API dependency

  - Vector database integration

  - Content discovery via AI
