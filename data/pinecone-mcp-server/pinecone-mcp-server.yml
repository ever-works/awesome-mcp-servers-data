markdown: >-
  ## Overview


  Built on Pinecone’s vector database, this MCP server supports fast,
  similarity-based context retrieval. It’s optimized for applications that
  require LLMs to recall semantically relevant facts or documents.


  ## Features


  - Fast vector search, optimized for similarity

  - Scalable retrieval

  - Embedding-based document indexing

  - Production-grade latency and reliability


  ## Pricing


  Cloud service with open-source reference.
