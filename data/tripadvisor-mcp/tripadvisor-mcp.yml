markdown: >-
  ## Overview


  TripAdvisor MCP is a Model Context Protocol server that integrates with the
  Tripadvisor Content API. It provides standardized MCP interfaces for accessing
  travel destination data, reviews, and photos.


  ## Features


  - Access to Tripadvisor location data

  - Search for travel destinations and experiences

  - Retrieve reviews and ratings

  - Access location photos

  - Standardized MCP interface for AI assistants
