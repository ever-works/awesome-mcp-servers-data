markdown: >-
  ## Overview


  SQLite MCP Server was a reference implementation that demonstrated database
  interaction and business intelligence capabilities through the Model Context
  Protocol. It has been archived and can be found in the servers-archived
  branch.


  ## Features


  - SQLite database access and querying

  - Schema inspection capabilities

  - Business intelligence queries

  - Demonstrates database integration patterns


  ## Status


  This server is now archived and maintained as a reference example in the
  servers-archived branch of the modelcontextprotocol/servers repository.


  ## Purpose


  As a reference server, it demonstrated how MCP can enable LLMs to interact
  with SQLite databases securely for data analysis and business intelligence use
  cases.


  ## Pricing


  Free and open-source reference implementation.
