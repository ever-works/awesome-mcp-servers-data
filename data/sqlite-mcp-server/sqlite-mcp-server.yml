name: SQLite MCP Server
description: SQLite MCP Server offers safe, read-only access to SQLite databases
  for LLMs via the Model Context Protocol, using FastMCP with query validation.
  Key features emphasize security and exploration without write risks. Perfect
  for lightweight AI agent data retrieval; lighter alternative to PostgreSQL MCP
  for embedded, file-based databases.
