markdown: >-
  ## Overview


  Zapier’s MCP server enables LLMs to interact with thousands of apps, ranging
  from Google Sheets to simple CRMs. It exposes Zapier workflows, triggers, and
  automations to GenAI systems.


  ## Features


  - Access to 6,000+ integrated apps

  - Trigger actions by MCP clients

  - No-code automation builder

  - Hosted cloud-based context delivery


  ## Pricing


  Commercial cloud service.
