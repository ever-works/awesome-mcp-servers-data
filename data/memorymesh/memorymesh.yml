markdown: >-
  ## Overview


  A knowledge graph server that uses the Model Context Protocol (MCP) to provide
  structured memory persistence for AI models, enabling them to maintain rich,
  interconnected contextual relationships.


  ## Features


  - Knowledge graph storage for AI memory

  - Structured memory persistence across sessions

  - Interconnected relationship management

  - Multi-model LLM support
