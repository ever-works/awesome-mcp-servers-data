markdown: >-
  ## Overview


  Markitdown is a Python tool that converts files and office documents to
  Markdown. It serves as an official MCP server for file system access in local
  environments.


  ## Features


  - Converts various files and office documents to Markdown format

  - Local deployment


  ## Pricing


  Free and open-source.
