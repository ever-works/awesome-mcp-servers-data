name: Redoc
description: Open-source tool for generating beautiful, interactive API
  reference documentation from OpenAPI (Swagger) specifications. Supports
  OpenAPI 3.0 and Swagger 2.0, with customizable UI and standalone bundling
  capabilities.
source_url: https://github.com/Redocly/redoc
category: Documentation & Knowledge MCP Servers
tags:
