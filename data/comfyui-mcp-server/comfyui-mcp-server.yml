markdown: >-
  ## Overview


  ComfyUI MCP Server bridges the Model Context Protocol with ComfyUI's powerful
  node-based image generation workflow. It enables AI assistants to trigger
  image generation and manipulation through MCP tools.


  ## Features


  - Image generation via ComfyUI workflows

  - Node-based workflow execution through MCP

  - Integration with stable diffusion pipelines

  - Programmatic access to ComfyUI capabilities
