markdown: >-
  ## Overview


  An MCP server that implements finite state machines as dynamic resources,
  enabling multiple clients to subscribe and receive real-time updates when
  state changes occur.


  ## Features


  - Finite state machine hosting

  - Multi-client subscription support

  - Real-time state change notifications

  - Dynamic resource management

  - MCP-compliant state machine interface
