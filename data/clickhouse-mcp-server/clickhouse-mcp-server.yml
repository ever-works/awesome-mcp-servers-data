name: ClickHouse MCP Server
description: Columnar database MCP server for real-time analytics on massive
  datasets. Features SQL queries with high ingestion rates and efficient
  compression. Use cases include logs and metrics analysis; contrasts with
  PostgreSQL MCP's row-based relational model suited for OLAP over transactional
  workloads.
