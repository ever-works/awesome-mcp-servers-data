markdown: >-
  ## Overview


  ScrapeGraphAI is an AI-powered web scraping library that creates scraping
  pipelines using natural language input. It allows developers to define
  scraping tasks conversationally rather than writing complex parsers.


  ## Features


  - Natural language-based scraping pipeline creation

  - AI-powered web data extraction

  - Automated parsing and data structuring

  - Supports complex multi-step scraping workflows
