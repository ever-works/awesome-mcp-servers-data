markdown: >-
  ## Overview


  OTEL MCP Server connects AI assistants with OpenTelemetry Collector, providing
  access to telemetry data including traces, metrics, and logs through the Model
  Context Protocol.


  ## Features


  - Query OpenTelemetry telemetry data

  - Access traces, metrics, and logs

  - Integration with OTel Collector pipeline

  - Standardized MCP interface for observability data
