name: Agoda APIAgent
description: Universal MCP proxy/gateway converting any REST/GraphQL API to MCP
  server for OpenAI/Claude access, with zero code/deployments via schema
  introspection and DuckDB SQL processing. Includes auth proxy, rate limiting
  features. Enables unified agent API calls; standardizes protocol vs direct
  SDKs.
