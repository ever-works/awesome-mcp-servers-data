markdown: |-
  ## Overview

  ![logo](https://github.com/agoda-com/api-agent/assets/logo.png)

  Agoda APIAgent MCP proxy converts REST/GraphQL APIs to MCP.

  ## Features

  - Auth proxy
  - Rate limiting
  - Zero code conversion
  - DuckDB post-processing

  ## Use Cases

  - Unified API calls for agents

  ## Pricing

  Free and open-source.
