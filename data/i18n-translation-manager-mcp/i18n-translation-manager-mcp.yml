markdown: >-
  ## Overview


  i18n Translation Manager MCP is a specialized Model Context Protocol server
  designed for managing internationalization (i18n) translation files. It
  enables LLMs to intelligently manage translations, analyze code for hardcoded
  strings, and maintain consistency across multiple language files with
  real-time file watching and advanced search capabilities.


  ## Features


  - **Translation File Management**: Read, write, and update translation files
  across multiple languages

  - **Hardcoded String Detection**: Automatically scan code for hardcoded
  strings that should be translated

  - **Consistency Checking**: Ensure translation keys are consistent across all
  language files

  - **Real-time File Watching**: Monitor translation files for changes and
  updates

  - **Advanced Search**: Find specific translations or missing keys quickly

  - **Multi-format Support**: Work with JSON, YAML, and other i18n file formats

  - **Key Generation**: Automatically generate translation keys from text

  - **Gap Analysis**: Identify missing translations across language sets


  ## Use Cases


  - Automate the translation workflow for multilingual applications

  - Identify and extract hardcoded strings for localization

  - Maintain translation file consistency across large codebases

  - Generate reports on translation coverage and gaps

  - Streamline the localization process with AI assistance

  - Refactor legacy code to support internationalization


  ## Pricing


  Free and open-source under the MIT license.
