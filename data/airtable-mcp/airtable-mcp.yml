name: Airtable MCP
description: Airtable MCP Server enables AI agents to interact with Airtable
  databases through natural language commands via the Model Context Protocol. It
  supports key features like CRUD operations (listing, fetching, creating,
  updating, deleting records) and seamless integration with AI models. Ideal for
  AI agent data access and management in no-code databases; unlike SQL-focused
  PostgreSQL MCP servers, it excels with spreadsheet-like structured data
  without requiring SQL syntax.
