markdown: >-
  ## Overview


  A central gateway that manages multiple MCP servers, connecting LLM clients to
  a single gateway-client endpoint to access tools from all managed MCP servers.


  ## Features


  - Central gateway for multiple MCP servers

  - Eliminates duplicate server processes

  - Single endpoint for LLM clients

  - Supports Cline, Cursor, and other clients
