name: McGravity
description: McGravity is a proxy tool that composes multiple MCP servers into
  one unified endpoint, featuring load balancing, failover, and health checks.
  It simplifies aggregating tools with minimal overhead and easy configuration.
  Ideal for scaling AI agent tool calling across distributed servers; a
  lightweight alternative to comprehensive management layers like Microsoft MCP
  Gateway.
source_url: https://github.com/tigranbs/mcgravity
