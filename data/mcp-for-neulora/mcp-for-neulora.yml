markdown: >-
  ## Overview


  MCP Neulora is an intelligent server that helps AI assistants collect and
  document code from project directories. It provides automated tools for code
  analysis and documentation generation.


  ## Features


  - Automated code collection from directories

  - Documentation generation tools

  - Code structure analysis

  - Supports multiple programming languages

  - AI-powered code documentation
