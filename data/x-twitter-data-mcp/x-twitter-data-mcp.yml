markdown: >-
  ## Overview


  X (Twitter) Data MCP provides comprehensive access to Twitter/X data including
  profiles, tweets, trends, and communities via various APIs. It enables social
  listening, content analysis, and audience engagement through AI interfaces
  with full Twitter ecosystem integration.


  ## Features


  - **Tweet Management**: Post, read, and delete tweets

  - **Profile Access**: View and analyze user profiles

  - **Timeline Operations**: Access and filter timelines

  - **Trend Monitoring**: Track trending topics and hashtags

  - **Community Features**: Interact with Twitter Communities

  - **Search Capabilities**: Advanced tweet and user search

  - **Analytics Access**: Engagement and impression metrics

  - **Media Handling**: Upload and manage images and videos


  ## Tweet Operations


  - Post tweets with text, images, and videos

  - Reply to tweets

  - Retweet and quote tweets

  - Like and bookmark tweets

  - Delete tweets

  - Thread creation

  - Poll creation

  - Scheduled tweets


  ## Profile Features


  - View profile information

  - Follow/unfollow users

  - Mute and block operations

  - Profile updates

  - Follower/following lists

  - Bio and banner management


  ## Search and Discovery


  - Tweet search by keywords

  - User search

  - Hashtag tracking

  - Advanced search filters

  - Trending topics by location

  - Real-time search

  - Search within conversations


  ## Analytics


  - Tweet impressions

  - Engagement metrics (likes, retweets, replies)

  - Profile visit analytics

  - Follower growth tracking

  - Tweet performance analysis

  - Best posting times

  - Audience demographics


  ## Communities


  - Join and leave communities

  - Post to communities

  - Moderate community content

  - View community members

  - Community analytics


  ## Direct Messages


  - Send and receive DMs

  - Group conversations

  - Media sharing in DMs

  - Message search

  - Conversation management


  ## Use Cases


  - Monitor brand mentions and sentiment

  - Automate social media responses

  - Track competitive intelligence

  - Conduct social listening campaigns

  - Manage customer service on Twitter

  - Build Twitter bots and automation

  - Analyze trending topics for content strategy

  - Grow Twitter audience systematically


  ## API Access


  - Twitter API v2 support

  - OAuth 1.0a and 2.0

  - Rate limit handling

  - Webhook integration

  - Streaming API support


  ## Pricing


  Free and open-source server. Twitter API access requires:

  - **Free Tier**: Basic access with limits

  - **Basic**: $100/month

  - **Pro**: $5,000/month

  - **Enterprise**: Custom pricing
