markdown: >-
  ## Overview


  FullStory MCP server provides AI-powered access to digital experience
  analytics, enabling teams to analyze user sessions, identify friction points,
  and optimize experiences through natural language.


  ## Features


  - **Session Replay**: Watch recordings of user sessions

  - **Heatmaps**: Visualize user interaction patterns

  - **Rage Clicks**: Identify frustration points

  - **Conversion Funnels**: Analyze drop-off points

  - **Auto-Capture**: Track all user interactions automatically


  ## Platform Capabilities


  FullStory combines session replay, product analytics, and user experience
  insights to help teams understand and improve digital experiences.


  ## Use Cases


  - Debugging user experience issues

  - Understanding conversion blockers

  - Identifying usability problems

  - Analyzing customer support issues

  - Optimizing checkout flows


  ## Key Benefits


  - Complete user session visibility

  - No manual event instrumentation

  - AI-powered insights and alerts

  - Privacy controls and data governance

  - Integration with support and analytics tools


  ## MCP Integration


  Enables AI assistants to query session data, identify user friction, analyze
  conversion paths, and surface UX insights through conversational interfaces.


  ## Use Case Focus


  Particularly valuable for e-commerce, SaaS, and customer-facing applications
  where understanding user experience is critical to conversion and retention.
