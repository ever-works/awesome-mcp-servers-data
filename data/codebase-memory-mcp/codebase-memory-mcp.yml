name: codebase-memory-mcp
description: Fastest code intelligence MCP server that indexes the Linux kernel
  (28M LOC) in 3 minutes and answers structural queries in under 1ms. Builds a
  persistent knowledge graph with call chains, HTTP routes, and cross-service
  links across 66 languages. Offers 120x fewer tokens usage and deploys as a
  single static binary compatible with 10 coding agents.
