markdown: >-
  ## Features


  - Indexes large codebases like Linux kernel (28M LOC) in 3 minutes

  - Structural queries answered in <1ms

  - Persistent knowledge graph including call chains, HTTP routes, cross-service
  links

  - Supports 66 languages

  - Single static binary

  - Plug-and-play with 10 coding agents

  - 120x fewer tokens


  ## Pricing


  Free and open-source.
