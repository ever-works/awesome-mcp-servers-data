markdown: >-
  ## Overview


  Code intelligence MCP server optimized for large codebases.


  ## Features


  - Indexes Linux kernel (28M LOC) in 3 minutes

  - Structural queries answered in <1ms

  - Persistent knowledge graph with call chains, HTTP routes, cross-service
  links

  - Supports 66 languages

  - 120x fewer tokens

  - Single static binary, plug-and-play with 10 coding agents
