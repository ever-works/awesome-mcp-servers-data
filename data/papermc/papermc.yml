markdown: |-
  ## Overview

  PaperMC is a fast, modifiable MCP server software.

  ## Features

  - Blazing-fast performance
  - Plugin support (e.g., Denizen, Skript)
  - Server-side scripting

  ## Usage

  java -Xmx2G -jar paper.jar nogui
  /reload

  ## Pricing

  Free and open-source.
