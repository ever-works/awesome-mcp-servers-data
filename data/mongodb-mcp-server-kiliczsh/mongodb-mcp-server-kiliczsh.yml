markdown: >-
  ## Overview


  A Model Context Protocol server for MongoDB that provides database interaction
  capabilities. Enables LLMs to query and manage MongoDB collections through
  standardized MCP tools.


  ## Features


  - MongoDB database connectivity

  - Collection query capabilities

  - Document CRUD operations

  - Schema inspection tools

  - Standardized MCP interface


  ## Usage


  Configure with MongoDB connection URI. The server exposes MCP tools for
  database operations.
