name: AlloyDB for PostgreSQL MCP Server
description: Provides MCP access to AlloyDB for PostgreSQL, enabling AI agents
  to query and manage fully managed, PostgreSQL-compatible databases with
  columnar engine for high-performance transactional and analytical workloads.
  Features serverless scaling, IAM authentication, full SQL operations, and
  integration with Google Cloud services. Ideal for AI-driven database
  operations and agent querying; as an official Google-managed GA server, it
  surpasses generic self-hosted DB MCPs in reliability, maintenance, and
  scalability.
