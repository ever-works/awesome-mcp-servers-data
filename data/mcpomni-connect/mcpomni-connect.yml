markdown: >-
  ## Overview


  MCPOmni Connect is a command-line interface client that aggregates and
  connects to multiple MCP servers via stdio transport, with support for OpenAI
  models and dynamic tool management.


  ## Features


  - Connects to multiple MCP servers via stdio

  - OpenAI model integration

  - Dynamic tool and resource management

  - Versatile CLI interface
