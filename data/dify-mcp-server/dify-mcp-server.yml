name: Dify MCP Server
description: MCP server for Dify AI platform, enabling agent access to
  workflows, models, and chaining. Supports standardized prompting for
  multi-step agent orchestration vs. custom LangChain setups.
source_url: https://github.com/AI-FEA/dify-mcp-server
category: AI Agents MCP Servers
tags:
  - ai-workflow
  - agent-orchestration
  - llm-chaining
markdown: >-
  ## Overview


  Integrates Dify's no-code AI app builder with MCP for agent-compatible
  workflows.


  ## Features


  - Execute Dify apps/workflows via MCP tools

  - Model prompting and response handling

  - Workflow chaining for complex agents

  - Resource listing for app discovery


  ## Use Cases


  - Agentic RAG pipelines

  - Multi-model agent routing


  ## Pricing


  Open-source core; Dify cloud plans from free tier.
