markdown: >-
  ## Overview


  PiAPI MCP Server integrates multiple AI media generation models through a
  unified MCP interface, supporting image, video, and audio generation from
  leading AI models.


  ## Features


  - Midjourney image generation

  - Flux model support

  - Kling video generation

  - LumaLabs 3D generation

  - Udio music generation

  - Chirp and Trellis models

  - Unified API for all multimodal AI models
