name: Ateam MCP
description: MCP server providing access to multi-agent AI models and tools via
  the ADAS platform for standardized integration. Features prompting, skill
  chaining, and lifecycle management for building agent workflows. Suited for
  complex AI agent development and deployment; offers protocol-based access
  differing from LangChain's framework abstractions.
