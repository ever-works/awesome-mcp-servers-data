rkdown: >-
  ## Overview


  Box MCP Server provides Model Context Protocol integration for the Box cloud
  storage platform. It enables AI assistants to manage files, folders, and
  collaboration features through natural language.


  ## Features


  - File and folder management via MCP

  - Upload and download operations

  - Search Box content

  - Collaboration and sharing controls

  - Metadata management
