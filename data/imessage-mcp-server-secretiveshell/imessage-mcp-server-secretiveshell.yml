name: iMessage MCP Server (SecretiveShell)
description: An MCP server that securely interfaces with your iMessage database
  via the Model Context Protocol (MCP), allowing LLMs to query and analyze
  iMessage conversations. Includes robust phone number validation, attachment
  processing, contact management, group chat handling, and full support for
  sending and receiving messages.
