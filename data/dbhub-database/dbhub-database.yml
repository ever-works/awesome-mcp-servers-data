name: DBHub Database
description: DBHub Database is a universal MCP server connecting AI assistants
  to multiple databases including MySQL, PostgreSQL, and SQLite for querying and
  management. It supports broad database compatibility and direct query
  execution. Perfect for AI agent data access across heterogeneous databases;
  stands out from single-DB MCP servers like PostgreSQL MCP by offering multi-DB
  support in one server.
