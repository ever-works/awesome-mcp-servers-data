markdown: >-
  ## Overview


  An MCP server that connects to Oura's API, providing AI assistants with access
  to health and wellness data from Oura Ring devices including sleep tracking,
  activity monitoring, and readiness scores.


  ## Features


  - Oura API integration

  - Sleep data queries

  - Activity metrics access

  - Readiness score retrieval

  - Health data analysis via AI
