name: apple-notes-mcp
description: MCP server for reading and writing Apple Notes with bidirectional
  Markdown conversion. Supports fast SQLite queries for listing and searching,
  AppleScript + native import for full CRUD operations. Compatible with stdio
  and Streamable HTTP transports.
source_url: https://github.com/ailenshen/apple-notes-mcp
category: Knowledge Management & Memory
tags:
  - apple-notes
  - markdown
  - local
featured: false
markdown: |-
  ## Features

  - Bidirectional Markdown conversion
  - SQLite queries for list/search
  - Full CRUD via AppleScript and native import
  - Stdio and Streamable HTTP support

  ## Pricing

  Open-source, free.
