markdown: >-
  ## Overview


  Unified's MCP server connects Cohere to customer integrations through
  tool-calling, allowing Cohere to connect intelligence to structured SaaS data
  and authorized actions. Cohere provides state-of-the-art embedding models and
  reranking capabilities optimized for RAG (Retrieval Augmented Generation)
  pipelines.


  ## Features


  ### Embed Models (Embeddings)


  **Embed v4** - Latest multimodal embedding model:

  - Converts text and images into numerical representations

  - Captures semantic meaning for sophisticated applications

  - **Pricing**: Embed v3 at $0.10/1M tokens

  - Enables semantic search, clustering, and classification


  ### Rerank Models


  **Rerank 4.0** - Newest and most performant foundational model:

  - Sorts text inputs by semantic relevance to a specified query

  - **Pricing**: Rerank 3.5 at $2/1K searches

  - Dramatically improves RAG accuracy by filtering irrelevant documents

  - Often used to sort search results from existing search solutions


  ### Command Models


  Command R+ for production-grade LLM capabilities:

  - Tool-calling integration

  - Multi-language support

  - Enterprise features


  ## Use Cases


  ### RAG Pipelines


  Cohere's sweet spot is RAG (Retrieval Augmented Generation):

  - Embed v3 for creating embeddings

  - Rerank 3.5 for improving search results

  - Best-in-class combination at competitive prices


  ### Applications


  - Semantic search systems

  - Document retrieval and ranking

  - Knowledge base question answering

  - Enterprise search optimization

  - Multi-lingual applications


  ## Free Tier


  Cohere offers a free Trial API key with:

  - 1,000 API calls per month

  - Access to all models including Command R+, Rerank, and Embed


  ## Integration


  Integrate through:

  - Unified's MCP server for tool-calling

  - Direct Cohere API

  - LangChain and other AI frameworks

  - Platform SDKs (Python, TypeScript, Java, Go)


  ## Technical Specifications


  - Multiple embedding dimensions available

  - Support for batch processing

  - Real-time API endpoints

  - Enterprise SLA options


  ## Pricing


  - **Embed v3**: $0.10/1M tokens

  - **Rerank 3.5**: $2/1K searches

  - **Free Trial**: 1,000 API calls/month

  - Enterprise pricing available
