markdown: >-
  ## Overview


  Multimodal MCP Client extends MCP capabilities to support voice-powered
  agentic workflows, enabling AI agents to process multiple media types
  including audio, text, and visual inputs.


  ## Features


  - Multi-modal input processing

  - Voice-powered agentic workflows

  - Support for various media types

  - MCP client implementation for multimodal tasks

  - Extensible architecture for new modalities
