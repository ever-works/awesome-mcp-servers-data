name: Nano Banana Prog
description: MCP server for generating and editing images using Google's Nano
  Banana Pro (Gemini 3 Pro Image) API. Handles text-to-image generation and
  image-to-image editing with configurable resolutions up to 4K. Use directly
  for image modification requests without pre-reading files.
source_url: https://mcp.directory/nano-banana-prog
category: Multimedia
tags:
  - image-generation
  - ai
  - editing
featured: false
markdown: |-
  ## Overview

  Image generation and editing via Gemini 3 Pro API.

  ## Features

  - Text-to-image generation
  - Image-to-image editing
  - Resolutions: 1K (default), 2K, 4K
  - Supports --input-image parameter for modifications
  - Direct use for generate, edit, modify requests
