  ## Overview


  Needle MCP integrates Needle's search and retrieval capabilities into the
  Model Context Protocol ecosystem, enabling AI assistants to leverage Needle's
  advanced search infrastructure.


  ## Features


  - Search integration with Needle platform

  - Retrieval capabilities for MCP clients

  - Seamless integration with MCP-compatible AI assistants

  - Leverages Needle's search infrastructure
