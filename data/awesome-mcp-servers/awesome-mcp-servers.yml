name: Awesome MCP Servers
description: Awesome MCP Servers is a community-curated GitHub repository
  providing a comprehensive directory of MCP servers, libraries, and tools,
  organized into categories such as filesystems, APIs, and more. It enables
  developers and AI agents to easily discover, contribute to, and stay updated
  on the latest MCP resources through features like search, filtering, and
  star-based leaderboards. Compared to tools like Firecrawl for web extraction
  or Composio for integrations, it offers broader coverage specifically for MCP
  ecosystems with community-driven maintenance.
