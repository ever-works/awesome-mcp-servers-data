markdown: >-
  ## Overview


  A curated list of awesome Model Context Protocol (MCP) servers. MCP is an open
  protocol that enables AI models to securely interact with local and remote
  resources through standardized server implementations.


  ## Categories


  - 📂 File Systems

  - ☁️ Cloud Storage

  - 🗄️ Databases

  - 🔍 Search & Web

  - 💻 Development Tools

  - 🔗 Aggregators

  - 🔒 Security

  - And more (Location Services, Marketing, Note Taking, etc.)


  ## Legend


  - ⭐ Official protocol implementation

  - 1 First implementation


  ## Security Best Practices


  - Use official implementations

  - Run in VMs or isolated environments

  - Review code before installation

  - Limit permissions


  ## Supported Clients


  Claude Desktop, Zed Editor, Sourcegraph Cody, Continue, Cursor, VS Code, and
  more.


  ## Tools & Utilities


  - mcp-get: CLI for installing NPM-based servers

  - mxcp: Framework for building MCP tools

  - Remote MCP: Centralized management

  - yamcp: Workspace manager

  - ToolHive: Containerized deployment
