name: Figma Dev Mode MCP Server
description: Official Figma MCP server exposing live structure of selected
  designs to AI, including layers, hierarchy, auto-layout, variants, tokens, and
  styles for accurate design-to-code generation. Enables AI to read exact design
  specs directly, bridging the design-to-code gap without screenshots or manual
  inspection.
source_url: https://www.figma.com/dev-mode-mcp/
category: Design Tools
tags:
