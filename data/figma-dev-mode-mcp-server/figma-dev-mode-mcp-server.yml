name: Figma Dev Mode MCP Server
description: Official MCP server for Figma's Dev Mode that provides AI
  assistants with live structural details of selected Figma layers, including
  hierarchy, auto-layout rules, variants, text styles, spacing tokens, and
  component references. Enables accurate design-to-code generation by surfacing
  design tokens, color styles, typography definitions, and constraints directly.
  Reduces friction in frontend development by eliminating manual extraction from
  inspect panels or guessing from screenshots.
source_url: https://www.figma.com/dev-mode-mcp/
category: design-tools
tags:
  - official
  - design-to-code
  - figma
markdown: >-
  ## Features


  - Expose selected Figma layers with full structural detail, not just pixel
  dimensions

  - Surface design tokens, color styles, and typography definitions

  - Provide component variants and their properties

  - Return auto-layout constraints and spacing rules


  ## Use Cases


  - Implement the selected Figma component as a React component using Tailwind

  - Extract spacing tokens and color variables from designs

  - Generate CSS matching Figma typography styles


  ## Pricing


  Free with Figma Dev Mode access.
