name: Figma Dev Mode MCP Server
description: Figma's official Dev Mode MCP server exposes the live structure of
  selected Figma designs to AI assistants, including hierarchy, auto-layout
  rules, variants, text styles, spacing tokens, and component references.
  Enables accurate code generation from real design specs, eliminating guesswork
  from screenshots. Primarily used to bridge design-to-code workflows in
  frontend development.
source_url: https://www.figma.com/dev-mode-mcp-server/
category: Design Tools
tags:
