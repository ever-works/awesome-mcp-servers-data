markdown: >-
  ## Overview


  Taiwan AQI MCP Server provides air quality monitoring data for Taiwan through
  the MCP protocol, allowing AI assistants to retrieve current and historical
  (past 24 hours) air quality station readings.


  ## Features


  - Current air quality data from Taiwan monitoring stations

  - Historical 24-hour AQI data

  - Station-level granularity for air quality metrics

  - Natural language querying of environmental data
