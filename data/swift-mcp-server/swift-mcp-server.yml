markdown: >-
  ## Overview


  A Swift-based implementation of the Model Context Protocol (MCP) server that
  leverages Swift's distributed actor model for building robust, type-safe AI
  integrations.


  ## Features


  - Type-safe remote invocation of tools, resources, and prompts

  - Asynchronous operations powered by Swift's distributed actor model

  - Native Swift concurrency support

  - Strong type safety for all MCP operations
