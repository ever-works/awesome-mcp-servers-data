name: Supabase Query MCP
description: Supabase Query MCP enables comprehensive management of Supabase
  databases via chat interfaces, supporting read/write queries, management APIs,
  migrations, and logs. Key features include end-to-end operations for AI
  agents. Use cases cover full-stack Postgres management; builds on PostgreSQL
  MCP with Supabase-specific APIs and versioning.
