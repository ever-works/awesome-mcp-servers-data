name: Playwright MCP
description: Microsoft's Playwright MCP server gives AI control over real
  browsers for navigation, interactions, screenshots, and E2E testing using
  Playwright's accessibility tree. Supports multi-step scenarios reliably and
  faster than screenshot methods. Key for verifying UI behavior in development.
