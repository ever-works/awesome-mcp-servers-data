name: SchemaCrawler
description: SchemaCrawler MCP Server connects AI agents to relational databases
  for schema exploration and valid SQL generation via the Model Context
  Protocol. Key features include querying database structures and interpreting
  column meanings without direct access. Ideal for AI-assisted database analysis
  and documentation; complements PostgreSQL MCP by focusing on metadata over
  data querying.
