name: APIWeaver
description: An MCP server that dynamically creates MCP servers from web API
  configurations, allowing easy integration of any REST API, GraphQL endpoint,
  or web service into an MCP-compatible tool.
source_url: https://github.com/modelcontextprotocol/servers/tree/main/src/apiweaver
category: API Integration Mcp Servers
tags:
