markdown: |-
  ## Overview

  Dynamically creates MCP servers from web API configurations.

  ## Features

  - Integrates any REST API
  - GraphQL endpoint support
  - Web service integration
  - Auto-generates MCP-compatible tools
  - Configuration-based server creation
