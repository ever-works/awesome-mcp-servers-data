markdown: >-
  ## Overview


  Execute Automation Playwright MCP Server is a comprehensive Model Context
  Protocol implementation providing full browser automation capabilities through
  Playwright. It supports 143 device emulations with automatic browser
  installation and advanced testing features.


  ## Features


  ### Automatic Browser Management

  - Automatic browser binary installation (Chromium, Firefox, WebKit)

  - Zero manual setup required

  - Self-healing browser installations

  - Version management and updates


  ### Device Emulation

  - **143 Devices Supported**: iPhone, iPad, Pixel, Galaxy, desktop browsers

  - Proper viewport emulation

  - User-agent spoofing

  - Touch event simulation

  - Device pixel ratio support

  - Geolocation emulation

  - Timezone simulation


  ### Browser Automation

  - Full page navigation and interaction

  - Screenshot capture (full page or specific elements)

  - Form filling and submission

  - Click and keyboard event simulation

  - JavaScript execution in page context

  - Console log monitoring

  - Network request interception

  - Cookie and storage management


  ### Session Management

  - **Shared Sessions**: All clients interact with the same browser instance

  - Persistent browser contexts

  - Session state preservation

  - Multi-tab management


  ### Testing Capabilities

  - Configurable timeouts

  - Detailed error handling and reporting

  - Comprehensive logging

  - Screenshot on failure

  - Video recording support

  - Trace collection for debugging


  ## Use Cases


  - Automated UI testing

  - Web scraping and data extraction

  - Cross-browser compatibility testing

  - Mobile responsiveness testing

  - E2E test automation

  - Visual regression testing

  - Performance testing

  - Accessibility testing

  - Real-time monitoring and alerting

  - AI-driven exploratory testing


  ## Integration Scenarios


  - Distributed testing across machines

  - Real-time test monitoring

  - AI-driven automation with GitHub Copilot

  - Integration with CI/CD pipelines

  - Test parallelization


  ## Technical Implementation


  Built on Microsoft Playwright with full TypeScript support. Provides both
  stdio and HTTP transport modes for flexible deployment options.


  ## Integration


  Compatible with Claude Desktop, Cline, Cursor IDE, and other MCP clients.
  Supports both local and remote browser execution.
