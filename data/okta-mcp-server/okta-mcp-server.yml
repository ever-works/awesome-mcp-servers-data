markdown: >-
  ## Overview


  The Okta MCP Server acts as a structured bridge between AI agents and your
  Okta environment, enabling natural language control of identity tasks while
  ensuring API calls are strictly governed, scoped, and auditable. Manage users,
  groups, applications, and policies through AI assistants with enterprise-grade
  security.


  ## Features


  ### Identity Management

  - **User Operations**: Create, update, delete, and search users

  - **Group Management**: Organize users into groups and manage memberships

  - **Application Access**: View and configure user access to applications

  - **System Logs**: Retrieve and analyze audit logs for compliance


  ### Security & Governance

  - **Scoped Access**: AI only has access to specific scopes granted

  - **Audit Logging**: Every action is logged for compliance and review

  - **Credential Security**: Credentials managed via secure environment
  variables

  - **OAuth 2.0 Authentication**: Industry-standard security protocols


  ### Authentication Methods

  - **Interactive Login**: Device Authorization Grant for user-driven workflows

  - **Automated Login**: Private Key JWT for browserless, fully automated
  processes

  - **SSO Integration**: Connect with existing identity providers


  ## Use Cases


  ### User Provisioning

  - Automate user onboarding and offboarding

  - Bulk user creation and updates

  - Self-service password resets

  - Access request workflows


  ### Access Management

  - Grant and revoke application access

  - Manage group memberships

  - Review and update user permissions

  - Enforce least privilege policies


  ### Compliance & Reporting

  - Generate access reports

  - Audit user activities

  - Monitor authentication events

  - Track permission changes


  ### IT Automation

  - Automate routine identity tasks

  - Integrate with helpdesk workflows

  - Streamline access reviews

  - Manage application assignments


  ## Supported AI Platforms


  - Claude Desktop

  - Microsoft Copilot Studio

  - Fast-agent

  - Any MCP-compatible client


  ## Integration


  Works seamlessly with Okta's identity platform, supporting both Okta Workforce
  Identity and Customer Identity Cloud. Requires Okta API credentials and
  appropriate permissions.


  ## Pricing


  MCP server is available with all Okta plans. Okta offers free developer
  accounts and usage-based pricing for production deployments.
