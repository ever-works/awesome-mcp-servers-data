name: MCPcat
description: "Analytics and monitoring toolkit for MCP servers, featuring user
  tracking, session replay, and live debugging. Provides insights into tool
  invocations, errors, and performance. Similar to Sentry or PostHog but
  MCP-specific. Use cases: observing AI agent behaviors, debugging tool chains,
  and optimizing MCP performance in production."
source_url: https://github.com/mcpcat/mcpcat-ts
