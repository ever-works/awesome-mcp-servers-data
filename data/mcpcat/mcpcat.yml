markdown: |-
  ## Overview

  MCPcat offers specialized observability for MCP servers in TS/Python.

  ## Features

  - Session tracking
  - Live debugging
  - User analytics

  ## Use Cases

  - Production MCP monitoring
  - Agent interaction analysis

  ## Comparisons

  MCP-focused alternative to general APM tools.

  ## Pricing

  Free and open-source.
