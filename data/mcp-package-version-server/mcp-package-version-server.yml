markdown: >-
  ## Overview


  An MCP server that provides LLMs with the latest stable package versions when
  coding. Helps AI assistants suggest up-to-date dependencies rather than
  outdated ones.


  ## Features


  - Latest stable version lookup

  - Multiple package ecosystem support

  - Prevent outdated dependency suggestions

  - Real-time package metadata

  - Standardized MCP tools
