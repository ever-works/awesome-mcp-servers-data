markdown: >-
  ## Overview


  Prisma's MCP server gives AI agents the ability to manage Prisma Postgres
  databases, including spinning up new database instances and running schema
  migrations. Prisma Client can be used in any Node.js or TypeScript backend
  application including serverless applications and microservices.


  ## Features


  - **Database Instance Management**: Spin up new Prisma Postgres database
  instances

  - **Schema Migrations**: Run and manage database schema migrations

  - **Database Operations**: Execute database queries and operations

  - **Type Safety**: Full TypeScript support with type-safe database access

  - **ORM Integration**: Leverage Prisma's powerful ORM capabilities through AI


  ## Supported Backend Types


  Prisma Client works with:

  - REST APIs

  - GraphQL APIs

  - gRPC APIs

  - Serverless applications

  - Microservices

  - Any Node.js or TypeScript backend requiring a database


  ## Use Cases


  - Automated database provisioning

  - Schema migration management

  - Database query generation and execution

  - Development environment setup

  - Testing database operations

  - Rapid prototyping with database backends


  ## Technical Stack


  Built for Node.js and TypeScript environments, providing seamless integration
  with modern backend development workflows.


  ## Integration Benefits


  - Natural language database management

  - Simplified migration workflows

  - AI-assisted query generation

  - Rapid database setup for new projects

  - Type-safe database operations


  ## Compatibility


  Works with any MCP-compatible AI assistant including Claude Code, Cursor,
  Windsurf, and other MCP clients.


  ## Pricing


  Open-source ORM with commercial Prisma Accelerate and Prisma Pulse add-ons
  available. Prisma Postgres database pricing applies separately.
