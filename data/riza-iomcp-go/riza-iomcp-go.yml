markdown: >-
  ## Overview


  riza-io/mcp-go is a Go library developed by Riza for building Model Context
  Protocol servers. It provides Go developers with tools and abstractions to
  create MCP-compliant servers efficiently.


  ## Features


  - Native Go implementation for MCP servers

  - Tool definition and execution

  - Resource access patterns

  - Integration with LLM applications

  - Built by the Riza team
