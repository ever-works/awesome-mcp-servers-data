markdown: |-
  ## Overview

  Magg functions as a universal hub for LLMs to manage MCP servers autonomously.

  ## Features

  - Auto-discovery and installation
  - Orchestration without configs
  - Plugin extensions

  ## Use Cases

  - Evolving AI agent toolsets

