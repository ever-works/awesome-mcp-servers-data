name: Magg
description: Magg is a meta-MCP server acting as a universal hub that allows
  LLMs to autonomously discover, install, and orchestrate MCP servers without
  static configurations. Key features include self-managing server lifecycles,
  plugin-style extensions, and seamless dynamic integrations. Use cases include
  adaptive AI agent tool calling where toolsets evolve on-the-fly; contrasts
  with fixed gateways like Microsoft MCP Gateway by enabling LLM-driven
  ecosystems.
