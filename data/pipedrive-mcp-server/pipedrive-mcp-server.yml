markdown: >-
  ## Overview


  The Pipedrive MCP Server enables AI assistants to interface directly with
  Pipedrive's CRM platform, providing access to 16 tools spanning users, leads,
  pipelines, organizations, deals, and more. This integration allows you to
  manage your sales pipeline using natural language commands through AI-powered
  tools.


  ## Features


  - **Lead Management**: Access and manage leads with filtering and tracking
  capabilities

  - **Pipeline Operations**: View and manage sales pipelines, stages, and deal
  progression

  - **Organization Management**: Create, update, and search organizations in
  your CRM

  - **Deal Tracking**: Monitor deals, track revenue, and analyze sales
  performance

  - **User Management**: Manage team members and their CRM access

  - **Natural Language Queries**: Ask questions like "Show me all high-value
  deals in the negotiation stage"


  ## Use Cases


  ### Sales Intelligence

  - Analyze your sales pipeline and identify bottlenecks

  - Track deal performance and conversion rates

  - Generate insights about high-value opportunities


  ### Meeting Preparation

  - Quickly retrieve customer information before calls

  - Review deal history and previous interactions

  - Access organization details and contact information


  ### Pipeline Management

  - Update deal stages and status through conversational commands

  - Identify at-risk deals and drop-off points

  - Monitor team performance and individual quotas


  ## Integration


  Works with AI assistants like Claude, Cursor, and other MCP-compatible tools.
  Connect to your Pipedrive account to enable AI-powered CRM automation and
  analytics.
