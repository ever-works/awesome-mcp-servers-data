name: Azure MCP Server
description: Official Microsoft Azure MCP Server enables agentic management of
  Azure resources via ARM API, supporting cloud ops such as VM scaling, storage
  configuration, and monitoring in CI/CD pipelines. Features Docker self-hosting
  and remote access for DevOps automation. Provides broader multi-service Azure
  integration compared to AWS MCP Server's SDK-focused AWS-specific tools.
source_url: https://github.com/Azure/mcp-server
