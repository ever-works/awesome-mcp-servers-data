markdown: >-
  ## Overview


  MCP Manager is the leading MCP gateway designed for enterprise AI deployments
  requiring secure management of multiple MCP servers.


  ## Features


  - Provision MCP servers with scoped permissions

  - Monitor data flows between agents and tools in real time

  - Enforce approval workflows before new servers go live

  - Centralized visibility and control to mitigate risks such as overly broad
  access and unapproved deployments


  ## Pricing


  Free trial available. Contact for enterprise pricing.
