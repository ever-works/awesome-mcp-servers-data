markdown: >-
  ## Overview


  MCP Manager is a comprehensive MCP gateway and MCP server management platform
  providing control and visibility over MCP ecosystems.


  ## Key Capabilities


  ### Deployment

  - Easy server provisioning in Remote, Managed, and Workstation formats, hosted
  on organization infrastructure.


  ### Observability

  - End-to-end traceable monitoring of MCP traffic with logging, dashboards, and
  alerts.


  ### Security

  - Comprehensive protection against MCP-based threats like prompt injection and
  data exfiltration.

  - Granular role-based access controls for servers and tools.

  - SSO integrations and SCIM support.

  - Runtime guardrails and governance controls.

  - Configurable real-time reporting and dashboards.
