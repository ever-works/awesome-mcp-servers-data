markdown: >-
  ## Overview


  Zotero MCP provides Model Context Protocol integration for Zotero's research
  reference management platform. Built in Python, it enables AI assistants to
  search, read, and manage academic references and bibliographies.


  ## Features


  - Search Zotero library via MCP

  - Access academic references and metadata

  - Manage collections and tags

  - Bibliography management

  - Python-based implementation
