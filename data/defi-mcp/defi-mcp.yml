name: DeFi MCP
description: "DeFi MCP is a server for blockchain data querying via MCP,
  offering token prices, multi-chain wallet balances, gas prices, and DEX swap
  quotes across EVM and Solana. Key features: real-time prices from CoinGecko,
  balances on 6 EVM chains, gas estimation, swaps via 1inch/Jupiter. Use cases:
  crypto agents, DeFi bots; vs. raw RPCs: standardized MCP interface, no API key
  for basics."
source_url: https://github.com/OzorOwn/defi-mcp
category: Blockchain Crypto Mcp Servers
tags:
  - defi
  - open-source
  - multi-chain
  - blockchain-mcp
  - crypto-tools
  - web3
featured: false
markdown: |-
  ## Features

  - Token prices from CoinGecko
  - Multi-chain wallet balances across 6 EVM chains
  - Gas prices
  - DEX swap quotes via 1inch (EVM) and Jupiter (Solana)

  No API key required for basic usage. MIT license.

  ## Pricing

  Free for basic usage.
