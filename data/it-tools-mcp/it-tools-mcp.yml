markdown: >-
  ## Overview


  it-tools-mcp recreates the popular it-tools utility collection as an MCP
  server, giving AI agents access to common developer utilities.


  ## Features


  - Encoding and decoding utilities

  - Data conversion tools

  - Hash generation

  - Format conversion

  - Wide range of developer-focused utilities

  - Based on CorentinTh's it-tools project
