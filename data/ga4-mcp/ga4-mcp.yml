markdown: |-
  ## Overview

  Connects GA4 data directly to AI for conversational analytics queries.

  ## Key Capabilities

  - 200+ dimensions/metrics: sessions, events, conversions, sources.
  - Admin API for property config.
  - Custom report equivalents.

  ## Strengths

  - Broad data surface.
  - Free.

  ## Limitations

  - Read-only.
  - Siloed from ad data.
  - Setup required.

  ## Pricing

  Free.
