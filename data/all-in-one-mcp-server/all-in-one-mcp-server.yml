markdown: >-
  ## Overview


  An all-in-one MCP server combining AI search, RAG capabilities, and
  integrations with multiple services including GitLab, Jira, Confluence, and
  YouTube to provide a unified AI-enhanced development workflow tool.


  ## Features


  - AI-powered search across services

  - RAG (Retrieval Augmented Generation) support

  - GitLab integration

  - Jira integration

  - Confluence integration

  - YouTube integration

  - Unified development workflow support
