markdown: >-
  ## Overview


  An MCP server providing call graph analysis capabilities to LLMs through the
  nuanced library for understanding code dependencies and function call
  relationships.


  ## Features


  - Call graph generation

  - Code dependency analysis

  - Function call visualization

  - Nuanced library integration

  - LLM-accessible code analysis
