name: Call Graph Analysis MCP Server
description: "Call Graph Analysis MCP Server uses the nuanced library to provide
  LLMs with call graph generation and code dependency analysis for better code
  understanding. Key features: call graph generation, function call
  visualization, dependency mapping, LLM-accessible analysis, integration with
  codebases. Primary use cases: AI agent code exploration and dev workflows for
  debugging; vs standard APIs or tools like CodeQL, it delivers dynamic,
  LLM-integrated graphs."
