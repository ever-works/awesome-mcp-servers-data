name: Shopify MCP
description: Built-in MCP endpoint for every Shopify store, allowing AI access
  to product catalogs, inventory, pricing, cart management, and checkout
  initiation.
source_url: https://shopify.dev/docs/api/usage/mcp
category: E Commerce
