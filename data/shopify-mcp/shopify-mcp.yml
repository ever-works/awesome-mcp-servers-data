featured: false
markdown: |-
  ## Overview

  Enabled by default on all stores for AI-native commerce.

  ## Key Capabilities

  - Product catalog: details, images, variants.
  - Cart management and checkout.
  - Cross-store search.

  ## Strengths

  - Zero setup.
  - Real-time inventory.

  ## Limitations

  - Commerce-focused, not marketing analytics.

  ## Pricing

  Included with Shopify.
