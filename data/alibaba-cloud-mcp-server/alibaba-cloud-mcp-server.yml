name: Alibaba Cloud MCP Server
description: Alibaba Cloud MCP Server provides MCP-based cloud resource
  management for Alibaba Cloud services like ECS, VPC, RDS, OSS, and
  CloudMonitor, enabling provisioning, monitoring, and automation. Key features
  include instance management, metrics retrieval (CPU, memory, disk), and
  OOS-orchestrated operations. Perfect for DevOps automation with AI agents,
  serving as an Alibaba-specific IaC solution versus Terraform's multi-cloud MCP
  capabilities.
