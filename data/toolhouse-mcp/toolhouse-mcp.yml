markdown: >-
  ## Overview


  Toolhouse MCP integrates the Toolhouse platform's pre-built tools with the
  Model Context Protocol. It provides AI assistants with access to a curated
  collection of tools for various tasks.


  ## Features


  - Access to Toolhouse's tool library

  - Pre-built tools for common tasks

  - Unified MCP interface

  - Tool discovery and execution

  - Extensible tool integration
