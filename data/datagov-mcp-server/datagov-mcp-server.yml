name: Data.gov MCP Server
description: Server accessing U.S. government datasets via Data.gov CKAN API.
  Supports package search, details, groups, and tags for public policy and
  cross-agency research.
source_url: https://github.com/joaobondan/data-gov-mcp-server
category: Data Analysis & Exploration MCP Servers
tags:
  - government
  - open-data
  - open-source
featured: false
markdown: |-
  ## Tools
  - `package_search`: Search datasets
  - `package_show`: Get dataset details
  - `group_list`: List organizations
  - `tag_list`: List tags/categories

  ## External APIs
  Data.gov CKAN API, Axios, TypeScript

  ## Configuration
  No API keys

  ## Pricing
  Free and open-source.
