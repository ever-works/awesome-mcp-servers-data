name: FileSystem2
description: Golang-based MCP server for secure local filesystem operations,
  supporting read/write, directory navigation, file creation/deletion, and
  metadata handling with sandboxing and configurable permissions for secure AI
  model access. Features multi-format compatibility and high-performance file
  IO. Use cases include AI agent file management for tasks like data persistence
  and processing; provides faster, local operations compared to remote
  alternatives like AWS S3 MCP servers.
