markdown: >-
  ## Overview


  A Model Context Protocol (MCP) server that provides secure access to Azure
  Cosmos DB datasets. Enables LLMs to safely query and analyze data through a
  standardized interface.


  ## Features


  - Azure Cosmos DB integration

  - Secure data querying

  - Data analysis through LLM tools

  - Standardized MCP interface

  - Microsoft Azure ecosystem integration
