markdown: >-
  ## Overview


  Bright Data MCP server provides enterprise-grade web scraping capabilities
  through the Model Context Protocol, specializing in bypassing heavy anti-bot
  protections and extracting data from difficult-to-access websites.


  ## Features


  - **Anti-Bot Bypass**: Handle Cloudflare Enterprise and advanced bot
  protections

  - **Proxy Network**: Access to world's largest proxy network

  - **Data Collection**: Extract structured data from any website

  - **JavaScript Rendering**: Full browser automation for dynamic content

  - **CAPTCHA Solving**: Automated CAPTCHA resolution


  ## Use Cases


  - Scraping major e-commerce platforms

  - Collecting data from protected websites

  - Market research and price monitoring

  - Competitor analysis

  - Large-scale data aggregation


  ## When to Use Bright Data


  Use Bright Data MCP when targets use heavy anti-bot protection like Cloudflare
  Enterprise or major e-commerce sites. For simpler scraping needs, consider
  Firecrawl MCP (URL-to-Markdown) or Apify MCP (structured extraction).


  ## Enterprise Features


  - Residential and datacenter proxies

  - Compliance and legal support

  - Custom data delivery formats

  - API access and automation

  - Dedicated account management


  ## Reliability


  Provides enterprise-grade reliability and success rates for mission-critical
  web data collection needs where other solutions fail.
