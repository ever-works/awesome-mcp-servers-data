name: Pipedream MCP Server
description: Pipedream MCP Server integrates Pipedream's workflow automation
  platform into MCP, allowing AI agents to trigger workflows and access 2,500+
  APIs via prebuilt connectors. It enables serverless execution of complex
  automations directly from agent tool calls. Compares to native MCP servers by
  adding no-code workflow orchestration.
source_url: https://github.com/PipedreamHQ/pipedream/tree/master/mcp
category: Workflow & Orchestration MCP Servers
tags:
  - workflows
  - automation
  - no-code
markdown: >-
  ## Overview


  MCP server for Pipedream workflows and API integrations.


  ## Features


  - Access to 2,500+ APIs

  - 8,000+ prebuilt tools

  - Event-driven workflow automation

  - Serverless execution


  ## Use Cases


  - Automate multi-step agent tasks

  - Integrate external services in AI pipelines

  - Build dynamic workflows on-the-fly


  ## Comparisons


  Extends MCP with no-code workflows, unlike pure MCP proxies like Kno2gether or
  GitHub MCP; more scalable than custom scripts.


  ## Pricing


  Free tier available; usage-based pricing for workflows.
