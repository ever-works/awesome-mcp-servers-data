markdown: >-
  ## Overview


  PostgreSQL MCP server enables LLMs to interact directly with PostgreSQL
  databases via natural language.


  ## Features


  - Schema inspection

  - SQL query execution (SELECT statements)

  - Docker deployment for self-hosting


  ## Deployment


  Docker (self-hosted)


  ## Pricing


  Open-source (free).
