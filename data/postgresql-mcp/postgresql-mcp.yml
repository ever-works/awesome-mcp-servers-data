name: PostgreSQL MCP
description: MCP server providing LLMs with direct execution access to
  PostgreSQL databases. Enables agents to inspect schemas and run SELECT
  statements for instant natural language data queries. Supports Docker for
  self-hosting.
source_url: https://github.com/crystaldba/postgres-mcp
category: Database MCP Servers
tags:
  - docker
  - self-hosted
  - postgresql
  - sql
featured: false
markdown: |-
  ## Features
  - Direct SQL execution and schema inspection
  - Natural language to SQL translation

  ## Deployment
  Docker (self-hosted)

  ## Use Cases
  - Data exploration without manual query writing
  - RAG and agent memory with persistent storage

  Free and open-source.
