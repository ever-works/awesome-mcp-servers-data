markdown: |-
  ## Features

  - Comprehensive NBA statistics access via NBA API
  - Live game data retrieval
  - Python-based MCP server for easy integration with AI agents

  ## Use Cases

  - Sports analytics and predictions
  - Real-time game tracking
  - Player performance monitoring

  ## Pricing

  Free and open-source.
