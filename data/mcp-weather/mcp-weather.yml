markdown: >-
  ## Overview


  MCP Weather is a demonstration MCP server that showcases how to build MCP
  servers with weather API integration. It serves as a practical example
  following the official MCP quickstart tutorial.


  ## Features


  - Weather data retrieval via MCP tools

  - Demonstrates MCP server development patterns

  - Based on modelcontextprotocol.io/quickstart/server

  - Educational reference implementation

  - Simple and accessible example
