markdown: >-
  ## Overview


  Take and restore snapshots of your workspace files with ease. Local Snapshots
  provides a powerful way to create, manage, and restore file snapshots directly
  within VS Code, offering both manual and automatic snapshot capabilities.


  ## Features


  - File snapshot creation

  - Snapshot restoration

  - Manual and automatic modes

  - VS Code integration

  - Local storage
