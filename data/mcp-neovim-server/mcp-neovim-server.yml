markdown: >-
  ## Overview


  mcp-neovim-server provides Model Context Protocol integration for Neovim,
  allowing AI assistants to interact with the Neovim text editor for buffer
  manipulation, code navigation, and editor automation.


  ## Features


  - Buffer management through MCP

  - Code navigation tools

  - Editor automation capabilities

  - Integration with Neovim plugins

  - AI-assisted editing workflows
