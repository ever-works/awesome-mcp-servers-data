markdown: >-
  ## Overview


  Freepik MCP allows LLMs to access everything available through the Freepik API
  in an LLM-friendly format.


  ## Features


  - Image searching and retrieval

  - Icon and illustration access

  - Image generation tools

  - Video creation

  - Image enhancement tools


  ## Use Cases


  - AI-powered design asset retrieval

  - Content creation automation

  - Image generation workflows
