name: Blog publisher MCP server
description: Python MCP server for automating blog publishing workflows from
  Markdown to GitHub, supporting chaining and state for agent content flows.
  Simpler MCP deployment vs LangGraph for publishing pipelines.
source_url: https://mcp.so/server/blog_publisher_mcp_server
category: Workflow & Orchestration MCP Servers
tags:
  - Workflow
  - Orchestration
  - automation
markdown: |-
  ## Features

  - Chaining Markdown processing and Git pushes
  - State management for image links and files
  - CLI-triggered workflows

  ## Use Cases

  - Agent flows for content publishing
  - Automated blog updates from notes

  ## Comparison to LangGraph

  Direct Git integration via MCP; no graph runtime needed.

  ## Pricing

  Free.
