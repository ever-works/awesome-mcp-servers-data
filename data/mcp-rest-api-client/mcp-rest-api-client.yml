markdown: >-
  ## Overview


  An MCP server providing REST API call capabilities, serving as a flexible
  bridge for AI assistants to interact with any REST API endpoint.


  ## Features


  - Universal REST API access

  - HTTP method support (GET, POST, PUT, DELETE)

  - Header and parameter configuration

  - Response parsing

  - MCP-compliant API tools
