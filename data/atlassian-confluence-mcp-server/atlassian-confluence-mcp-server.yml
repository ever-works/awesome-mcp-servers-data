markdown: |-
  ## Overview

  MCP for Confluence Cloud documentation access.

  ## Features

  - Search spaces and pages
  - Update content
  - ADF to Markdown conversion

  ## Use Cases

  - Enterprise agent knowledge bases
  - RAG for team docs
  - Collaborative note updates

  ## Comparisons

  Provides structured enterprise docs vs unstructured vector embeddings in DBs.

  ## Pricing

  Open-source; Confluence licensing applies.
