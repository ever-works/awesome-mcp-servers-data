name: recallnest
description: Persistent memory MCP server for AI coding agents like Claude Code,
  Codex, and Gemini CLI. Features hybrid retrieval with vector + BM25,
  cross-encoder reranking, knowledge graph with PPR traversal, session
  checkpoint/resume, and multi-scope isolation. Local-first using LanceDB +
  SQLite with zero external dependencies.
source_url: https://github.com/AliceLJY/recallnest
