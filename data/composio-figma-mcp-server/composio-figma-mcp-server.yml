name: Composio Figma MCP Server
description: "Composio Figma MCP Server enables AI agents to access Figma design
  files for seamless design-to-code workflows. Features include retrieving
  designs and generating code directly in IDEs like Cursor. Use cases: automate
  design-to-code conversion, offering easier access than the native Figma API."
source_url: https://mcp.composio.dev/figma
category: Design Tools
tags:
