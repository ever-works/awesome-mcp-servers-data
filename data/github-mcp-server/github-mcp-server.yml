name: GitHub MCP Server
description: MCP server for interacting with GitHub repositories, issues, pull
  requests, and other features. Integrates with IDEs like VS Code, JetBrains,
  Eclipse, and AI clients like Claude Desktop. Supports read-only queries and
  controlled write access via scoped tokens.
