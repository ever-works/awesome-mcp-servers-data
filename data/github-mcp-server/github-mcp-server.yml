name: GitHub MCP Server
description: GitHub MCP Server is the official MCP implementation from GitHub,
  allowing AI agents to interact with GitHub repositories, issues, pull
  requests, and code via the MCP protocol. Key capabilities include reading
  issues, PRs, and code, enabling seamless automation of GitHub workflows. It
  compares favorably to Composio's GitHub integration by providing native,
  protocol-based access optimized for MCP agents.
source_url: https://github.com/github/github-mcp-server
category: Version Control
tags:
  - github
  - repo-management
  - official
featured: true
markdown: |-
  ## Overview

  Official GitHub MCP server for repository interactions via MCP protocol.

  ## Features

  - Read repository code
  - Access issues and pull requests
  - GitHub API integration
  - MCP protocol compliance
  - Supports code review automation

  ## Use Cases

  - Automating code reviews
  - Managing issues/PRs with AI agents
  - Repository analysis and querying

  ## Pricing

  MIT licensed, free.
