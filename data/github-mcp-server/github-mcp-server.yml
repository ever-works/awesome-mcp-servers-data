name: GitHub MCP Server
description: MCP server for interacting with GitHub repositories, issues, pull
  requests, and code via AI. Supports queries on open issues, code references,
  file changes; installable via VS Code extensions or other IDEs and clients
  like Claude Desktop. Scoped tokens for access control.
