markdown: >-
  ## Overview


  GitHub MCP Server allows AI agents to interact with GitHub repos including
  cloning, committing, and managing branches/PRs via MCP.


  ## Features


  - Repo cloning and commits

  - Branch management

  - PR creation and review

  - Issue tracking

  - Scoped access tokens


  ## Use Cases


  - Code review bots

  - Automated GitHub workflows in IDEs like VS Code


  ## Comparison to GitLab MCP


  GitHub-native with Copilot integration; GitLab offers similar for its
  platform.


  ## Pricing


  Free with GitHub account and API token.
