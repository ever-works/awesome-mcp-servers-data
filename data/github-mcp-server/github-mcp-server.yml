name: GitHub MCP Server
description: MCP server for interacting with GitHub repositories, issues, pull
  requests via AI clients like VSCode extensions or Claude Desktop. Supports
  queries on open issues, code references, file changes. Integrates with Copilot
  Chat in IDEs.
