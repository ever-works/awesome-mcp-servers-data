markdown: >
  # GitHub MCP Server


  ## Overview

  The GitHub MCP Server connects AI clients (such as Claude Desktop or
  IDE-integrated assistants) to GitHub data, allowing natural language queries
  about repositories, code, issues, and pull requests. It integrates with tools
  like GitHub Copilot Chat for enhanced developer productivity.


  ## Features

  - Repository interrogation: list files, search code, view commit history

  - Issue and pull request management: list open issues, filter by labels,
  summarize discussions

  - Code analysis: find functions referencing a symbol, identify frequently
  changed files

  - Integration with Copilot Chat in IDEs like Visual Studio Code, JetBrains,
  Eclipse

  - Push protection to prevent accidental secret exposure during AI interactions

  - Configurable access levels (read-only or scoped write permissions via
  tokens)


  ## Use Cases

  - Developers asking AI to "Show me all open bug issues from the last week"

  - Querying codebase: "Which files changed the most in the last month?"

  - Automating routine tasks like creating issue summaries or commenting on PRs


  ## Pricing

  The GitHub MCP Server is free to use; however, it requires a GitHub account
  and may depend on GitHub's API rate limits. Some features (like Copilot Chat)
  may require additional subscriptions.
