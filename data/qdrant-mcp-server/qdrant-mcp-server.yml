name: Qdrant MCP Server
description: Qdrant MCP Server integrates Qdrant's vector database with MCP for
  semantic search and similarity matching in AI workflows. It supports vector
  embeddings, collections management, and hybrid search combining dense and
  sparse vectors. Ideal for RAG pipelines, recommendation systems, and knowledge
  retrieval in agents; offers an open-source, self-hosted alternative to
  Pinecone MCP.
