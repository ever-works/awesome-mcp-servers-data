name: Claude MCP Data Explorer
description: Server for analyzing CSV data within Claude using Pandas, NumPy,
  Scikit-learn, and visualization libraries. Supports loading CSV and running
  scripts for exploratory data analysis.
source_url: https://github.com/tofunori/claude-mcp-data-explorer
category: Data Science MCP Servers
tags:
  - csv
  - pandas
  - open-source
featured: false
markdown: >-
  ## Tools

  - `load-csv`: Loads CSV into memory

  - `run-script`: Executes code for processing


  ## Technologies

  Pandas, NumPy, Scikit-learn, SciPy, Statsmodels, Matplotlib, Seaborn,
  PapaParser, Plotly.js


  ## Configuration

  LOG_LEVEL (optional)


  ## Pricing

  Free and open-source.
