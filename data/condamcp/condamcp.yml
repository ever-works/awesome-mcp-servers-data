markdown: >-
  ## Overview


  condamcp is an MCP server that provides tools for working with Conda
  environments through the Model Context Protocol.


  ## Features


  - Conda environment management via MCP

  - Package and environment operations

  - Integration with MCP-compatible LLM clients
