name: Agent
description: MCP aggregator uniting multiple servers into one interface with tag
  filtering and dynamic reload. Enables agent orchestration by proxying tools
  across servers, supports LLM tool calling with context passing for multi-turn
  interactions. Ideal for autonomous agents managing complex workflows, unlike
  single-server setups like Composio gateways.
source_url: https://github.com/1mcp-app/agent
category: AI Agents & LLM MCP Servers
tags:
  - ai-agents
  - llm
  - tool-calling
  - orchestration
  - multi-server
markdown: |-
  ## Overview

  Aggregates MCP servers into unified interface for optimized agent access.

  ## Agent Orchestration & LLM Features

  - Tag-based tool selection for orchestration
  - Dynamic reloading maintains context across turns
  - Multi-server tool calling

  ## Use Cases

  - Autonomous multi-tool agents
  - Complex workflow management

  ## Pricing

  Open-source; free.

  Provides lightweight alternative to managed gateways like Composio.
