markdown: >-
  ## Overview


  IO Aerospace MCP Server is a specialized .NET-based implementation providing
  comprehensive aerospace and astrodynamics capabilities through AI assistants,
  enabling space mission planning and orbital mechanics calculations.


  ## Features


  - **Ephemeris Calculations**: Precise celestial body position and motion data

  - **Orbital Conversions**: Transform between various orbital element systems

  - **Deep Space Station Tools**: DSS operations and communication planning

  - **Time Conversions**: Convert between different time scales (UTC, TDB, TT,
  etc.)

  - **Unit Conversions**: Aerospace-specific unit transformations

  - **Mathematical Utilities**: Specialized math functions for orbital mechanics


  ## Capabilities


  ### Orbital Mechanics

  - Keplerian orbital elements

  - State vector conversions

  - Orbital maneuver planning

  - Transfer orbit calculations

  - Rendezvous and proximity operations


  ### Mission Planning

  - Launch window calculations

  - Ground station visibility

  - Communication link analysis

  - Trajectory optimization


  ### Time Systems

  - UTC to TDB conversions

  - Julian Date calculations

  - Epoch transformations

  - Time zone handling for ground operations


  ## Use Cases


  - Space mission planning and analysis

  - Satellite orbit determination

  - Launch trajectory design

  - Ground station operations

  - Interplanetary mission design

  - Spacecraft navigation

  - Aerospace engineering education


  ## Target Audience


  - Aerospace engineers

  - Mission planners

  - Spacecraft operators

  - Astrodynamics researchers

  - Space technology companies

  - University aerospace programs


  ## Technical Implementation


  - Built on .NET platform

  - High-precision numerical algorithms

  - Standard astrodynamics libraries

  - Space mission planning tools


  ## Pricing


  Open-source for aerospace community and research.
