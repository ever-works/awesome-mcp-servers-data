markdown: >-
  ## Overview


  Postiz is an open-source social media scheduling tool that includes MCP server
  support. It is self-hosted, meaning you run it on your own infrastructure.
  Supports multiple platforms including Twitter/X, LinkedIn, Instagram,
  Facebook, and more.


  ## Features


  - Schedule posts across multiple platforms

  - AI-powered content generation built into the platform

  - Team collaboration features for multi-person teams

  - Calendar view for content planning

  - Analytics dashboard

  - Fully open-source with no vendor lock-in


  ## Setup


  Requires self-hosting via Docker setup. Estimated setup time: 10-15 minutes.
  Available from GitHub at github.com/postiz-app/postiz.


  ## Pricing


  Free and open-source (self-hosted). No subscription required.


  ## Considerations


  - Requires self-hosting (Docker setup)

  - More complex setup than cloud-based options

  - MCP support may be less polished than dedicated MCP-first servers


  ## Best For


  Teams that want full control over their social media stack and prefer
  self-hosted solutions.
