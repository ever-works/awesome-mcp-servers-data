name: MCP Proxy
description: MCP server that connects to MCP servers running on SSE transport,
  or exposes stdio servers as an SSE server using the MCP Proxy server. Acts as
  a transport layer bridge.
source_url: https://github.com/sparfenyuk/mcp-proxy
category: MCP Middleware & Orchestration
tags:
  - proxy
  - sse
  - transport
markdown: >-
  ## Overview


  MCP Proxy enables connection to MCP servers that run on SSE transport, and can
  expose stdio servers as an SSE server.


  ## Features


  - Connect to MCP servers on SSE transport

  - Expose stdio servers as SSE servers

  - Transport layer bridging

  - Server proxy capabilities
