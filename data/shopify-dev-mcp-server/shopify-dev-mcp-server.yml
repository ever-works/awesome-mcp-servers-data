markdown: >-
  ## Overview


  Connects AI to Shopify dev resources for natural language queries on APIs and
  code.


  ## Features


  - Documentation search with search_docs_chunks and fetch_full_docs.

  - GraphQL schema introspection and code validation.

  - Liquid and theme validation.

  - Support for Shopify Functions and Polaris.
