markdown: >-
  ## Overview


  Basic Memory by basicmachines-co is a knowledge management system allowing
  users to build a persistent semantic graph from AI assistant conversations.
  All knowledge is stored in standard Markdown files locally.


  ## Features


  - Persistent semantic graph from conversations

  - Local Markdown-based storage

  - Obsidian.md integration

  - Full data ownership and control
