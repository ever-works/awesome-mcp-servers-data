markdown: >-
  ## Overview


  mcp-language-server bridges the Language Server Protocol (LSP) with the Model
  Context Protocol, enabling AI assistants to access code intelligence
  capabilities such as diagnostics, code completions, go-to-definition, and
  symbol references.


  ## Features


  - LSP integration via MCP

  - Code diagnostics and linting access

  - Go-to-definition and references

  - Code completions for AI assistants

  - Symbol search and navigation
