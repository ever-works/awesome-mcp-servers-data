markdown: >-
  ## Overview


  An MCP server designed to analyze genetic test results from WeGene, a genetic
  testing service. It enables AI assistants to interpret and explain personal
  genetic data.


  ## Features


  - WeGene genetic test result analysis

  - Personal genomics interpretation

  - Integration with WeGene API

  - AI-powered genetic data explanation
