name: NuGet MCP Server
description: NuGet MCP Server empowers AI agents to search, resolve, and manage
  .NET packages via the NuGet ecosystem using MCP protocol. Key features
  encompass package discovery, dependency resolution, version management, and
  automation workflows. Essential for LLM-assisted .NET development, contrasting
  with direct NuGet CLI by enabling reasoned package selection in agentic flows.
