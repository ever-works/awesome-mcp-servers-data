markdown: >-
  ## Overview


  File Edit Check Server enforces safety checks and detailed documentation
  practices for file operations. It requires pre-read checks before edits and
  generates detailed commit documentation, promoting best practices in AI-driven
  development workflows.


  ## Features


  - Pre-read checks before file edits

  - Automatic commit documentation generation

  - Safety guardrails for AI file operations

  - Prevents accidental file corruption

  - Enforces documentation best practices
