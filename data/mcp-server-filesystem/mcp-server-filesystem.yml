name: MCP Server Filesystem
description: "Advanced MCP server for local, remote, and virtual filesystems,
  offering read/write operations, directory listing, metadata retrieval,
  advanced filtering, and search with robust security including auth controls
  and sandboxing. Key features: async operations, remote mounting, virtual FS,
  multi-format support. Perfect for AI agent use cases like backups, RAG
  pipelines, content generation; more versatile and scalable than basic FS
  servers or cloud options like AWS S3 MCP."
