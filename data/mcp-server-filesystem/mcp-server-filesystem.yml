markdown: >-
  ## Overview


  Provides MCP access to filesystems (local/remote/virtual) for directory
  listing, read/write, metadata retrieval with advanced filtering/search.


  ## Features


  - Async operations

  - Remote mounting

  - Virtual FS support

  - Auth controls


  ## Use Cases


  - AI agent backups

  - Content generation

  - RAG data pipelines


  ## Pricing


  Open-source, free.
