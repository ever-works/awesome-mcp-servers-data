markdown: >-
  ## Overview


  MCP Pandoc server provides document format conversion capabilities using
  Pandoc through the Model Context Protocol.


  ## Features


  - Convert between markdown, HTML, PDF, DOCX, and many other formats

  - Full Pandoc conversion pipeline access

  - Multiple input/output format support

  - AI-assisted document transformation
