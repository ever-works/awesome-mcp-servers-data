markdown: >-
  ## Overview


  A Playwright-based Node.js MCP server tool that bypasses search engine
  anti-scraping mechanisms to execute Google searches, providing a local
  alternative to SERP APIs.


  ## Features


  - Bypass search engine anti-scraping

  - Google search capability

  - Playwright-based

  - Local SERP alternative

  - MCP server integration
