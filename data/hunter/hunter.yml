markdown: >-
  ## Overview


  Hunter's MCP server allows AI agents and LLMs to interact with the Hunter API
  to retrieve B2B data using natural language queries.


  ## Features


  - Email address discovery and verification

  - Domain search and professional email pattern identification

  - B2B contact data enrichment

  - Natural language query interface for AI agents

  - Integration with AI assistants and development tools
