markdown: >-
  ## Overview


  ntopng MCP Server connects AI assistants to ntopng, a web-based network
  traffic monitoring and analysis tool. It provides structured access to network
  flow data, host statistics, and protocol distribution.


  ## Features


  - Query network traffic statistics

  - Access host-level network data

  - Retrieve protocol distribution information

  - Monitor network flows through ntopng API

  - Analyze bandwidth usage patterns
