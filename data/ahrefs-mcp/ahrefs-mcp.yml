  ## Overview

  Pulls Ahrefs data without dashboard switching.

  ## Key Capabilities

  - Keyword research: volume, difficulty, SERP.
  - Backlink analysis: DR, new/lost links.
  - Rank tracking.
  - Site audits.

  ## Strengths

  - OAuth remote server.
  - Full API surface.

  ## Limitations

  - Read-only.
  - Paid API plan.

  ## Pricing

  Requires Ahrefs API plan.
