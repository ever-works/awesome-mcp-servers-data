name: Pulumi Cloud MCP Server
description: MCP server enabling developers to provision and manage cloud
  infrastructure using Pulumi through natural language instructions. Allows AI
  assistants to execute Pulumi CLI commands for multi-cloud infrastructure
  deployment and management.
