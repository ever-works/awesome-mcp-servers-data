name: izTolkMcp
description: "izTolkMcp is an MCP server for the Tolk smart contract compiler on
  the TON blockchain, providing blockchain smart contract functionality via
  standardized MCP interface. It enables compilation, syntax checking, and
  deployment link generation for TON smart contracts from AI assistants. Key
  features: contract compilation, syntax validation, deployment links; use
  cases: crypto agents, DeFi bots on TON; vs. raw RPCs: standardized MCP for
  easier AI integration."
