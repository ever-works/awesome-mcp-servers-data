  ## Overview

  MCP interface for Valkey key-value store operations.

  ## Installation

  ```bash
  claude mcp add valkey uvx awslabs.valkey-mcp-server@latest
  ```

  ## Pricing

  Free and open-source under the Apache 2.0 license.
