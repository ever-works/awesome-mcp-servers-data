name: Valkey MCP Server
description: Valkey MCP Server provides MCP access to Valkey, a Redis-compatible
  in-memory key-value store, developed by AWS Labs for key operations and
  caching. Key features include uvx installation and high-performance queries.
  Ideal for AI agent caching and real-time data; contrasts PostgreSQL MCP with
  in-memory speed over persistent storage.
