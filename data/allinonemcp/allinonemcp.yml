markdown: >-
  ## Overview


  AllInOneMCP serves as a meta-MCP server, functioning as a central hub for
  discovering and managing other MCP servers.


  ## Features


  - Centralized discovery of available MCP servers

  - Installation guides and usage instructions

  - Remote server accessible via URL endpoint
