markdown: >-
  ## Overview


  The JDBC MCP server provides universal database connectivity through Java
  Database Connectivity, supporting all JDBC-compatible databases.


  ## Features


  - Universal JDBC database support

  - Query, insert, update, delete operations

  - Supports MySQL, PostgreSQL, Oracle, SQL Server, SQLite

  - Schema inspection

  - Configurable access controls
