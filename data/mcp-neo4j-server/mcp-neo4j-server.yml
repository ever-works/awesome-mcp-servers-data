name: MCP Neo4j Server
description: MCP Neo4j Server integrates AI agents with Neo4j graph databases
  via the Model Context Protocol, enabling Cypher queries and graph traversals.
  Key features include direct database interaction tools for LLMs. Suited for
  AI-driven graph data analysis and relationship mapping; contrasts with
  PostgreSQL MCP by focusing on graph structures rather than tabular data.
