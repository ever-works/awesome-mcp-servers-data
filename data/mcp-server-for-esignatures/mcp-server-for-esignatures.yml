markdown: >-
  ## Overview


  The eSignatures MCP Server integrates the eSignatures platform with AI
  assistants via the Model Context Protocol. It enables managing electronic
  signature workflows through natural language.


  ## Features


  - Send documents for electronic signature

  - Track signature status

  - Manage signing workflows

  - Document management integration

  - AI-powered signature management
