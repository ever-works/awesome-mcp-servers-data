name: Elastic MCP
description: Elastic MCP Server allows AI agents to interact with Elasticsearch
  databases through the Model Context Protocol. Key features include search and
  analytics query support tailored for Elastic. Suited for AI agent data
  retrieval in search-heavy use cases; differs from relational PostgreSQL MCP by
  focusing on full-text search and log analytics.
