name: Salesforce MCP Connector
description: Third-party MCP server that exposes Salesforce data and APIs
  through the MCP standard, supporting create, update, and delete operations on
  CRM records including custom objects. Uses user's Salesforce access rights and
  supports Enterprise, Unlimited, and Developer editions. Salesforce's own
  hosted MCP is in beta.
