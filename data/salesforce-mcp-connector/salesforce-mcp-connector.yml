name: Salesforce MCP Connector
description: Third-party MCP server exposing Salesforce data and APIs,
  supporting create, update, delete operations on CRM records including custom
  objects. Uses user's Salesforce access rights and supports Enterprise,
  Unlimited, Developer editions. Salesforce's own hosted MCP is in beta.
source_url: https://github.com/modelcontextprotocol/servers/tree/main/src/salesforce-mcp
