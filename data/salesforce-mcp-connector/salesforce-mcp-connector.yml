name: Salesforce MCP Connector
description: Third-party MCP server for Salesforce that exposes data and APIs
  via MCP standard, supporting create, update, delete operations on CRM records
  including custom objects. Uses user's Salesforce access rights for security.
  Supports Enterprise, Unlimited, and Developer editions with API access.
source_url: https://developer.salesforce.com/docs
category: CRM
tags:
  - read-write
  - crm
  - custom-objects
markdown: |-
  ## Features

  - Full CRUD operations on Salesforce records
  - Supports custom objects
  - Inherits Salesforce security privileges
  - Compatible with API-enabled editions

  ## Best For

  Salesforce teams needing AI for data analysis and updates.

  ## Pricing

  Third-party; pricing not specified, tied to Salesforce plans.
brand: Salesforce
