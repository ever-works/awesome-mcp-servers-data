name: Salesforce MCP Connector
description: Third-party MCP server for Salesforce CRM that exposes Salesforce
  data and APIs through the MCP standard. Supports create, update, delete
  operations on CRM records using the user's own Salesforce access rights and
  custom objects. Compatible with Enterprise, Unlimited, and Developer editions.
source_url: https://developer.salesforce.com/docs/apis/mcp
category: CRM
tags:
