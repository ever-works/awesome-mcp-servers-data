name: Salesforce MCP Connector
description: Third-party MCP server exposing Salesforce data and APIs,
  supporting create, update, delete operations on CRM records including custom
  objects. Uses user's Salesforce access rights for secure integration across
  Enterprise, Unlimited, and Developer editions.
source_url: https://developer.salesforce.com/docs/atlas.en-us.api.meta/api/intro_mcp.htm
