name: Salesforce MCP Connector
description: Third-party MCP server exposing Salesforce data and APIs via MCP
  standard, supporting create, update, delete on CRM records using user's
  Salesforce access rights. Supports all editions with API access, including
  custom objects. Uses existing Salesforce security privileges for safe
  operations.
