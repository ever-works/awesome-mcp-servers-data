markdown: >
  # Salesforce MCP Connector


  ## Overview

  The Salesforce MCP Connector enables AI models to interact with Salesforce CRM
  data via the Model Context Protocol. It leverages existing Salesforce user
  permissions and access rights, providing secure, live access to standard and
  custom objects.


  ## Features

  - Full CRUD operations (create, read, update, delete) on Salesforce CRM
  records

  - Respects Salesforce user permissions, profiles, and role hierarchies

  - Supports standard and custom objects

  - Compatible with Enterprise, Unlimited, and Developer Editions that have API
  access

  - Third-party MCP server implementation (Salesforce's native MCP server
  solutions are in beta)

  - Secure access using OAuth or existing Salesforce session


  ## Use Cases

  - Sales teams updating lead status or opportunity stages via AI chat

  - Service agents creating or modifying case records

  - Marketing specialists syncing campaign data or updating contact information


  ## Pricing

  The MCP Connector itself may be provided by third-party vendors; users need a
  valid Salesforce subscription with API access. Check with the specific
  connector provider for pricing details.
