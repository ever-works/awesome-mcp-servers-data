name: Salesforce MCP Connector
description: Third-party MCP server exposing Salesforce CRM data and APIs,
  supporting create, update, delete operations using user's own Salesforce
  access rights including custom objects. Compatible with Salesforce editions
  providing API access like Enterprise and Unlimited. Allows AI to perform data
  analysis and updates on Salesforce objects.
source_url: https://developer.salesforce.com/docs/atlas.en-us.api_mcp.meta/api_mcp/intro_mcp.htm
category: CRM
tags:
  - read-write
  - crm
  - custom-objects
featured: false
markdown: |-
  ## Features

  - Full CRUD operations on CRM records.
  - Inherits user's Salesforce permissions.
  - Supports custom objects and all API-accessible editions.

  ## Best For

  Salesforce teams needing AI for analysis and record updates.
