name: Salesforce MCP Connector
description: Third-party MCP server exposing Salesforce data and APIs,
  supporting create, update, delete operations on CRM records including custom
  objects, using user's own Salesforce access rights. Supports Enterprise,
  Unlimited, and Developer editions.
