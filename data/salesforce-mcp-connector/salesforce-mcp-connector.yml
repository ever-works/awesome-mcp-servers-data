name: Salesforce MCP Connector
description: Third-party MCP server exposing Salesforce CRM data and APIs,
  supporting create, update, delete operations based on user's Salesforce access
  rights, including custom objects. Compatible with Salesforce editions
  providing API access.
source_url: https://mcp-connector.salesforce.com
