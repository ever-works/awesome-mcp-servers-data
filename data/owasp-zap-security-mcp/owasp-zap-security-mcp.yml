markdown: >-
  ## Overview


  The OWASP ZAP MCP Server integrates with OWASP ZAP (Zed Attack Proxy) to
  provide comprehensive web application security testing through the Model
  Context Protocol. It enables AI assistants to perform security assessments,
  vulnerability scanning, and penetration testing workflows using natural
  language.


  ## Features


  - **Active Vulnerability Scanning**: Perform comprehensive active scans to
  identify security vulnerabilities

  - **Passive Analysis**: Monitor traffic and identify issues without actively
  attacking the application

  - **Traditional Spidering**: Crawl web applications to discover all accessible
  pages and endpoints

  - **AJAX Crawling**: Advanced crawling for modern JavaScript-heavy
  applications

  - **Configurable Scan Policies**: Customize scan intensity and rules based on
  your requirements

  - **Automated Reporting**: Generate security reports automatically after scans

  - **Context Management**: Save and reuse security testing contexts

  - **Authentication Support**: Test authenticated areas of applications


  ## Security Testing Capabilities


  - SQL Injection detection

  - Cross-Site Scripting (XSS) identification

  - Cross-Site Request Forgery (CSRF) checks

  - Security header validation

  - SSL/TLS configuration analysis

  - Directory traversal detection

  - Command injection testing

  - And more OWASP Top 10 vulnerabilities


  ## Use Cases


  - Automate security testing as part of CI/CD pipelines

  - Perform ad-hoc security assessments through AI conversations

  - Generate security reports for compliance requirements

  - Identify vulnerabilities before deployment

  - Train development teams on security issues with AI guidance


  ## Integration


  Requires OWASP ZAP installation (available as desktop application or Docker
  container). The MCP server connects to ZAP's API to perform operations.


  ## Pricing


  Free and open-source. OWASP ZAP is also free and open-source.
