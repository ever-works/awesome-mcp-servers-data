markdown: >-
  ## Overview


  A PocketMine plugin that bridges Minecraft PE server activity to Discord,
  sending player chat, commands, and console output for unified server
  management.


  ## Features


  - Player chat forwarding to Discord

  - Command relay

  - Server console output

  - MCPE server integration

  - Discord channel bridging
