name: PocketMine Discord Chat MCP
description: "MCP server for PocketMine (Minecraft PE) bridging chat, commands,
  and console to Discord for remote game server management. Features real-time
  player chat relay, command execution, and monitoring. Use cases: AI-assisted
  server admin via Discord, community management; vs raw RCON, adds Discord-MCP
  standardization for LLMs."
source_url: https://github.com/nomadjimbob/pocketmine-discord-chat
category: Gaming & Entertainment MCP Servers
tags:
  - Minecraft
  - RCON
  - Game AI
markdown: |-
  ## Overview

  PocketMine plugin as MCP for Discord integration in Minecraft PE servers.

  ## Features

  - Chat forwarding to Discord
  - Command and console relay
  - Real-time monitoring

  ## Use Cases

  - Remote server admin
  - AI bot notifications
  - Community tools

  ## Pricing

  Free and open-source.
