markdown: >-
  ## Overview


  Pipedream is an integration platform that allows connecting with 2,500 APIs
  and 8,000+ prebuilt tools. It enables managing MCP servers for users within
  their own apps.


  ## Features


  - Connect to 2,500 APIs

  - 8,000+ prebuilt tools

  - Server management capabilities


