markdown: >-
  ## Overview


  Model Context Protocol server for managing Amazon DynamoDB resources. Enables
  LLMs to interact with AWS DynamoDB tables and data through standardized tools.


  ## Features


  - DynamoDB table management

  - Item CRUD operations

  - Query and scan capabilities

  - AWS integration

  - Standardized MCP tools


  ## Pricing


  Part of AWS services; pay-as-you-go DynamoDB pricing applies.
