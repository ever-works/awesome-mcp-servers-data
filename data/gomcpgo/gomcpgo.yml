markdown: >-
  ## Overview


  gomcpgo/mcp is a Go framework designed for building Model Context Protocol
  servers. It enables secure access to tools and data sources for LLMs,
  providing a complete toolkit for Go-based MCP development.


  ## Features


  - Complete Go framework for MCP servers

  - Secure tool and data source access

  - Built for LLM integration

  - Idiomatic Go development patterns

  - Supports tools, resources, and prompts
