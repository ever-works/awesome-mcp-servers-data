name: Artifacts MMO MCP
description: Artifacts MMO MCP Server is a Model Context Protocol implementation
  for the Artifacts massively multiplayer online action RPG game. It enables AI
  agents to read game state, execute player actions such as movement, combat,
  and inventory management, and subscribe to real-time events. Key use cases
  include building autonomous AI game bots for resource farming, PvP
  engagements, or exploratory gameplay; compared to generic RCON-based servers
  like Minecraft MCP, it offers game-specific tools tailored to Artifacts'
  pixel-art world and mechanics.
