markdown: >-
  ## Overview


  mcp-ortools integrates Google's OR-Tools constraint solving library with the
  Model Context Protocol. It enables AI assistants to formulate and solve
  operations research problems like scheduling, routing, and resource
  optimization.


  ## Features


  - Constraint problem formulation via natural language

  - Supports linear programming, scheduling, and routing

  - Google OR-Tools integration

  - Returns detailed optimization results

  - Operations research problem solving through MCP
