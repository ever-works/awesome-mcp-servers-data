name: Sentry MCP Server
description: Official MCP server providing AI direct access to Sentry error
  monitoring, fetching full issue context, stack traces, breadcrumbs, and
  performance data. Improves debugging accuracy by supplying complete error
  context without manual copying. Correlates errors with releases and
  deployments.
source_url: https://docs.sentry.io/platforms/mcp/
category: monitoring
tags:
  - official
  - error-tracking
  - observability
markdown: |-
  ## Features

  - Fetch full error context, stack traces, breadcrumbs, related events
  - Correlate errors with releases and deployments
  - Search issues by tag, environment, time, message
  - Inspect performance data and traces

  ## Use Cases

  - Pull latest unresolved production issues
  - Fetch context for specific error and suggest fix
  - Check error rate spike post-deploy

  ## Pricing

  Free tier available, paid plans for advanced features.
brand: Sentry
