name: Sentry MCP Server
description: Links AI to Sentry for fetching complete error contexts, stack
  traces, breadcrumbs, related events, and performance traces. Enables accurate
  debugging suggestions from full production data. Critical for efficient error
  triage and monitoring in AI-assisted development.
