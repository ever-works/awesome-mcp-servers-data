markdown: |-
  ## Features

  - Fetch full error context, stack traces, breadcrumbs, and related events
  - Correlate errors with releases and deployments
  - Search issues by tag, environment, time range, or message
  - Inspect performance data and transaction traces

  ## Use Cases

  - Pull latest unresolved production issues tagged 'payment'
  - Fetch context for specific error and suggest fix
  - Check for error rate spike after deploy
