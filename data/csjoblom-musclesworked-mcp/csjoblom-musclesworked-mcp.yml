markdown: |-
  ## Overview

  MCP server for exercise-to-muscle mapping data.

  ## Features

  - Lookup muscles worked by 856 exercises
  - Coverage across 65 muscles and 14 groups
  - Analyze workouts for gaps
  - Find alternative exercises ranked by overlap

  ## Pricing

  Free and open-source.
