name: MongoDB MCP Server
description: MongoDB MCP Server provides official NoSQL integration for MongoDB,
  translating natural language to aggregation pipelines for querying
  unstructured data. Key features include Docker self-hosting and seamless AI
  agent support. Ideal for AI agent access to document databases; unlike rigid
  SQL PostgreSQL MCP, it handles flexible schemas and JSON-like data.
source_url: https://github.com/mongodb-js/mongodb-mcp-server
