markdown: >-
  ## Overview


  MCP Doc Forge provides documentation generation capabilities through the Model
  Context Protocol. It enables AI assistants to automatically create, format,
  and manage technical documentation for code projects.


  ## Features


  - Automated documentation generation

  - Code analysis for doc extraction

  - Multiple documentation format support

  - Project-wide documentation generation

  - AI-powered doc writing
