markdown: >-
  ## Overview


  Scaffold is a Retrieval-Augmented Generation (RAG) system designed for
  structural understanding of large codebases. It transforms source code into a
  living knowledge graph, allowing for precise, context-aware interactions that
  go far beyond simple file retrieval.


  ## Key Capabilities


  - Transforms source code into a structured knowledge graph

  - Provides context-aware code understanding for AI agents

  - Enables precise code navigation and comprehension beyond file-level
  retrieval

  - Designed for large codebase analysis
