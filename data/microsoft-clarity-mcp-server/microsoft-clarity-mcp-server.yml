markdown: |-
  ## Overview

  MCP server for Microsoft Clarity data export API.

  ## Features

  - Fetch session replays and heatmaps
  - Natural language analytics queries
  - Supports MCP clients like Claude Desktop

  ## Use Cases

  - AI agent web performance analysis
  - LLM-powered user behavior insights

  ## Pricing

  Free and open-source.
