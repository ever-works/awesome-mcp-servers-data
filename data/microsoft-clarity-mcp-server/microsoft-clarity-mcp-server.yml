name: Microsoft Clarity MCP Server
description: Microsoft Clarity MCP Server enables AI agents and LLMs to access
  Microsoft Clarity's website analytics data export API through the Model
  Context Protocol. Key features include natural language queries for session
  replays, heatmaps, rage clicks, dead clicks, and user insights. Ideal for
  AI-driven UX analysis and optimization use cases; it provides conversational
  access superior to raw API calls or tools like Google Analytics integrations.
