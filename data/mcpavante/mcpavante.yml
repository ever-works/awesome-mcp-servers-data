markdown: >-
  ## Overview


  A Neovim plugin that provides management capabilities for MCP (Model Context
  Protocol) servers within the Neovim editor environment.


  ## Features


  - Manage MCP server configurations in Neovim

  - Connect to and interact with MCP servers

  - Seamless editor integration

  - Plugin-based architecture
