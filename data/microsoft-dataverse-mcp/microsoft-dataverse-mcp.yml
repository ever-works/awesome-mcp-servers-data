name: Microsoft Dataverse MCP
description: Microsoft Dataverse MCP Server allows LLMs and AI agents to
  interact with business data in Dataverse using natural language via MCP. Key
  features include table discovery, advanced queries, CRUD operations, and
  custom context-grounded prompts. Perfect for enterprise AI assistants in
  CRM/ERP scenarios, offering semantic understanding beyond generic database
  agents like PostgreSQL MCP servers.
