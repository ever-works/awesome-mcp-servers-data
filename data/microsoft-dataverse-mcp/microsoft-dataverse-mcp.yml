markdown: |-
  ## Overview

  Natural language access to Dataverse business data.

  ## Features

  - Table and schema discovery
  - SQL-like queries and CRUD
  - Grounded prompts for business context

  ## Use Cases

  - AI-powered data management
  - LLM integration with Power Platform

  ## Pricing

  Requires Dataverse licensing; MCP server open-source.
