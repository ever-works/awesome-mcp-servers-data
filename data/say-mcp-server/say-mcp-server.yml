markdown: >-
  ## Overview


  Say MCP Server provides text-to-speech functionality for macOS through the
  Model Context Protocol, leveraging macOS's built-in speech synthesis.


  ## Features


  - macOS native text-to-speech

  - Multiple voice options

  - Speech rate and pitch control

  - Simple MCP interface for audio output
