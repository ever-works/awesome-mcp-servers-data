markdown: >-
  ## Overview


  Local MCP server aiding Canva app development by providing AI access to docs
  and SDK.


  ## Features


  - Runs locally on device for secure doc fetching from canva.dev.

  - Agent mode tools auto-triggered in relevant contexts.

  - Easy .cursor/mcp.json setup or quick links.

  - Compatible with Cursor, Claude Desktop, VS Code.

  - Private: data stays within MCP client.
