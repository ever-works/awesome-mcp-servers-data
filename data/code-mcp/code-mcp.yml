name: code-mcp
description: "Code MCP Server enables AI agents to interact with development
  environments for terminal commands and file operations. Features: shell
  execution, read/write files via MCP protocol. Use cases: Autonomous coding
  agents, debugging workflows. Better than basic file MCPs with integrated
  terminal access."
