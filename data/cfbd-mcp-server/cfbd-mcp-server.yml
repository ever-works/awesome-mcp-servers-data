markdown: >-
  ## Overview


  CFBD MCP Server enables AI assistants to query the College Football Data API
  through the Model Context Protocol. It provides access to comprehensive
  college football statistics, scores, rankings, and team information.


  ## Features


  - Query college football statistics

  - Access team and player data

  - Retrieve scores and rankings

  - Historical data access

  - Integration with CFBD API
