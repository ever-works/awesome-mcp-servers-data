name: K8s MCP Server Toolkit
description: K8s MCP Server Toolkit offers comprehensive IaC and operational
  management via MCP, integrating kubectl, Helm, Istio, and ArgoCD for
  Kubernetes clusters across EKS, GKE, AKS. Includes cloud-native
  authentication, multi-cluster switching, sandboxed execution, and audit
  logging for safe ops. Enables agentic DevOps for deployments, troubleshooting,
  and GitOps workflows through natural language, reducing CLI tool complexity
  and manual context switching.
