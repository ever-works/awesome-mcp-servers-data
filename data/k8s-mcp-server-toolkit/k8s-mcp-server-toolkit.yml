markdown: >-
  ## Overview


  K8s MCP Server Toolkit is a comprehensive Model Context Protocol server that
  provides AI assistants with secure access to essential Kubernetes CLI tools
  including kubectl, helm, istioctl, and argocd. It serves as a bridge between
  language models and Kubernetes cluster management, enabling natural language
  operations.


  ## Included Tools


  - **kubectl**: Complete Kubernetes command-line interface

  - **Helm**: Kubernetes package manager for application deployment

  - **istioctl**: Service mesh management with Istio

  - **argocd**: GitOps continuous delivery for Kubernetes


  ## Features


  - **Unified Interface**: Access multiple Kubernetes tools through a single MCP
  server

  - **Cloud Provider Support**: Native integration with AWS EKS, Google GKE, and
  Azure AKS

  - **Secure Execution**: Sandboxed command execution with audit logging

  - **Multi-Cluster Management**: Switch between clusters seamlessly

  - Authentication integration for cloud providers


  ## Use Cases


  - Kubernetes cluster management through AI

  - Application deployment with Helm charts

  - Service mesh configuration and troubleshooting

  - GitOps workflow automation with ArgoCD


  ## Pricing


  Open-source and free.
