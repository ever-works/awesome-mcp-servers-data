markdown: >-
  ## Overview


  Sanity MCP Server provides Model Context Protocol integration for Sanity's
  headless CMS, enabling AI assistants to perform CRUD operations on content,
  query GROQ, and manage content schemas through natural language.


  ## Features


  - CRUD operations for Sanity content

  - GROQ query execution

  - Content schema management

  - Dataset management capabilities

  - Natural language content operations
