name: Model Context Protocol Server Filesystem
description: "Official Model Context Protocol Filesystem server enables AI
  agents to interact with local/remote filesystems securely. Supports
  read/write/list operations with permissions; features: path traversal
  protection, streaming for large files; use cases: agent data persistence, code
  editing; vs alternatives like folder-mcp which adds multi-root support."
source_url: https://github.com/modelcontextprotocol/servers/tree/main/src/filesystem
