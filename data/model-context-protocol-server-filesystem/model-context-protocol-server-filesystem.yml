featured: false
markdown: |-
  ## Features

  - Read/write files
  - Create/list/delete directories
  - Move files/directories
  - Search files
  - Get file metadata

  ## Use Cases

  - Work with local files in AI chats

  ## Pricing

  Free and open-source.
