markdown: >-
  ## Overview


  Enables natural language control over Cloudflare’s global network.


  ## Features


  - DNS configuration

  - Edge deployments

  - Workers management

  - Observability tools

  - Radar insights


  ## Installation


  Use mcp-remote with SSE endpoints like
  https://observability.mcp.cloudflare.com/sse


  ## Pricing


  Free tier available.
