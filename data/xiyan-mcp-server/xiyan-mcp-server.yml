markdown: >-
  ## Overview


  A Model Context Protocol (MCP) server that enables natural language queries to
  databases, built on Text2SQL research from XGenerationLab.


  ## Features


  - Natural language to SQL translation

  - Database query execution

  - Schema-aware query generation

  - Research-backed Text2SQL model

  - Standardized MCP tools


  ## Pricing


  Academic project, available for research use.
