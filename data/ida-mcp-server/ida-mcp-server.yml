  ## Overview


  MxIris IDA is a Model Context Protocol server for the Interactive Disassembler
  (IDA), providing AI models with access to reverse engineering capabilities.


  ## Features


  - Interact with IDA disassembler

  - Binary analysis assistance

  - Reverse engineering tool integration

  - AI-assisted malware analysis
