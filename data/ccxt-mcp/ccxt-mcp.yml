markdown: >-
  ## Overview


  CCXT MCP bridges the gap between AI models and cryptocurrency trading through
  MCP allowing AI assistants to directly interact with over 100 cryptocurrency
  exchanges.


  ## Features


  - Real-time tickers, OHLCV

  - Order management

  - Multi-exchange support


  ## Use Cases


  - Trading bots

  - Arbitrage agents


  ## Comparisons


  MCP interface enhances CCXT for LLMs.


  ## Pricing


  Free; requires exchange API keys.
