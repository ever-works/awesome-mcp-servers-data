name: CCXT MCP
description: "MCP server bridging AI models to 100+ crypto exchanges via CCXT
  for on-chain data querying, real-time prices, trades, and order execution. Key
  features: wallet balances, DEX support, multi-exchange aggregation. Use cases:
  AI trading bots, DeFi portfolio analysis; MCP adds LLM natural language
  compatibility over raw CCXT."
