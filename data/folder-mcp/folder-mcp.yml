name: folder-mcp
description: "Folder-MCP is a Model Context Protocol (MCP) server providing
  secure filesystem access for AI agents. It enables listing directories,
  reading/writing files, and managing local storage with sandboxing and path
  validation to prevent unauthorized access. Key features: supports large files,
  streaming reads/writes, MIME type detection; use cases: code generation,
  document editing, data persistence in agent workflows. Alternatives: standard
  filesystem MCP servers like modelcontextprotocol/filesystem, but Folder-MCP
  adds configurable root paths and better error handling."
