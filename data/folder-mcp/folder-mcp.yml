name: folder-mcp
description: "Provides MCP access to local folders for secure filesystem
  operations including listing, reading/writing files with sandboxing and path
  validation. Key features include recursive listing, glob search, MIME
  detection, configurable roots, and exclusion patterns for .git/node_modules.
  Use cases: AI agents persisting data autonomously, local RAG pipelines, code
  generation/editing; vs direct FS libraries: MCP enables agentic workflows with
  standardized tools."
