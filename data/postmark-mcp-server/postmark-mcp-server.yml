markdown: >-
  ## Overview


  Postmark Labs has released an experimental MCP server that gives AI assistants
  like Claude direct access to email infrastructure. The MCP server is
  completely free and open-source (MIT licensed) and requires only an active
  Postmark account.


  ## Features


  - **Send Emails**: Send test emails and transactional messages through natural
  language

  - **Templated Emails**: Send emails using Postmark templates

  - **Template Management**: List and retrieve email templates

  - **Delivery Statistics**: Check email delivery stats and performance metrics

  - **Natural Language Interface**: Have conversations with AI assistants about
  email tasks


  ## Use Cases


  - Testing email delivery without writing code

  - Automating email workflows through AI assistants

  - Debugging email issues with conversational queries

  - Managing email templates programmatically


  ## Availability


  This is a Labs release designed for tinkering and testing, shared early to
  gather user input. The server is available on GitHub at
  https://github.com/ActiveCampaign/postmark-mcp.
