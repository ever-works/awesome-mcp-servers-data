markdown: >-
  ## Overview


  Langfuse Prompt Management is an open-source tool designed for managing the
  full prompt lifecycle in AI applications.


  ## Features


  - Collaborative prompt editing

  - Prompt versioning and history

  - Prompt evaluation tools

  - Structured prompt release workflows

  - Team collaboration support

  - Open-source under a permissive license
