name: Kubernetes MCP Server
description: MCP wrapper for kubectl integrating directly with Kubernetes
  clusters for safe resource management, deployments, scaling, and
  troubleshooting. Features pod/service operations, failure diagnosis, and
  restarts in controlled environments. Suited for agentic infrastructure
  management; enables LLM-driven cluster interactions beyond Terraform's IaC
  provisioning.
source_url: https://github.com/containers/kubernetes-mcp-server
category: Cloud Native & DevOps MCP Servers
tags:
  - Kubernetes
  - IaC
  - Cloud Provider
featured: false
markdown: |-
  ## Overview

  MCP wrapper around kubectl for safe Kubernetes interactions.

  ## Features

  - List and describe pods/services
  - Diagnose failures
  - Restart services (Dev/Staging only)

  ## Deployment

  Docker-deployable for self-hosting.

  ## Pricing

  Open-source and free.
