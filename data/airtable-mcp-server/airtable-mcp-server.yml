name: Airtable MCP Server
description: Airtable MCP Server enables AI agents to access and query Airtable
  databases through the Model Context Protocol (MCP). It supports CRUD
  operations, schema inspection for NoSQL spreadsheet data. Ideal for agent data
  retrieval use cases, providing a standardized MCP interface versus direct
  Airtable SDKs requiring custom implementation.
