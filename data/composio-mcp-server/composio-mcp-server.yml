name: Composio MCP Server
description: Unified MCP server exposing tools for over 250 platforms including
  GitHub, Slack, Gmail, Notion, Jira, and more through a single endpoint.
  Handles OAuth, API key management, and token refresh automatically. Enables AI
  to interact with multiple services without individual server setups.
