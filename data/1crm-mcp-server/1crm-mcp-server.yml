markdown: >-
  ## Overview


  1CRM MCP Server integrates the 1CRM all-in-one CRM platform with the Model
  Context Protocol (MCP), allowing AI agents to perform CRM and ERP functions
  like customer management, lead tracking, and workflow automation.


  ## Features


  - Access to customer records, deals, and activities via MCP

  - Workflow automation and task management

  - Sales pipeline monitoring and updates


  ## Use Cases


  - **Agent sales automation**: AI agents can qualify leads, update deal stages,
  send follow-ups, and close sales autonomously using natural language commands.


  ## Comparisons


  | Feature | 1CRM MCP | Traditional API |

  |---------|----------|-----------------|

  | Access Method | Conversational via AI | REST calls |

  | Integration | Seamless with AI tools | Custom code required |

  | Automation | Agent-driven | Script-based |


  ## Pricing


  Free and open-source under the Apache 2.0 license.
