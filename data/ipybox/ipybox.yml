markdown: >-
  ## Overview


  ipybox is a Python code execution sandbox built on IPython and Docker,
  designed for secure and stateful code execution.


  ## Features


  - Stateful code execution across multiple calls

  - File transfer between host and container

  - Configurable network access

  - Docker-based isolation for security

  - IPython-enhanced execution environment
