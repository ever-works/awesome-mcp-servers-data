name: Alpha Vantage MCP Server
description: MCP server providing AI agents access to financial market data and
  trading APIs via Alpha Vantage, including real-time and historical quotes for
  stocks, ETFs, forex, cryptocurrencies. Features technical indicators,
  fundamentals, and transaction data retrieval for comprehensive market
  analysis. Ideal for agent trading bots, portfolio management; unlike CCXT
  which specializes in crypto exchanges, it covers traditional finance markets
  broadly.
