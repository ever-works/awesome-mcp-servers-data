markdown: >-
  ## Overview


  Kuzu MCP server enables LLMs to interact with Kuzu graph databases for schema
  inspection and query execution.


  ## Features


  - Database schema inspection

  - Graph query execution

  - Data exploration support

  - Debugging use case support

  - Natural language to query translation
