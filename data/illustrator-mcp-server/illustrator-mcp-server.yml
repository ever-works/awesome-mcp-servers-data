  ## Overview


  Illustrator MCP Server allows AI assistants to execute scripts on Adobe
  Illustrator, automating design workflows through the Model Context Protocol.


  ## Features


  - Execute scripts within Adobe Illustrator

  - Automate vector graphic design tasks

  - AI-driven illustration workflows

  - Programmatic control of Illustrator features
