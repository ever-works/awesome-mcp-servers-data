  - rag
  - project-memory
markdown: |-
  ## Overview

  Memory bank database system for project-specific knowledge graphs.

  ## Features

  - Captures decisions, progress, and architecture
  - Entity relationship mapping
  - RAG backend support
  - Precise project information access
  - Up-to-date knowledge retrieval
