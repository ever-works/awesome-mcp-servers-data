markdown: >-
  ## Overview


  Prisma is a next-generation ORM for Node.js and TypeScript, compatible with
  multiple databases including PostgreSQL, MySQL, MariaDB, SQL Server, SQLite,
  MongoDB, and CockroachDB.


  ## Features


  - Type-safe database access

  - Local deployment for MCP


  ## Pricing


  Open-source core; paid cloud features available.
