name: Vercel MCP Server
description: Official MCP server for direct AI access to Vercel projects,
  allowing monitoring of deployments, management of environment variables,
  checking build logs, and triggering deployments. Streamlines deployment cycles
  for Next.js and full-stack teams without leaving the editor. Helps diagnose
  'works locally but not on Vercel' issues by pulling actual logs.
source_url: https://vercel.com/docs/mcp
category: cloud-devops-mcp-servers
tags:
  - official
  - deployment
  - ci-cd
markdown: |-
  ## Features

  - List and inspect current deployments (production and preview)
  - Fetch build logs for failed deployments
  - Create and update environment variables
  - Trigger new deployments
  - Manage domain configuration

  ## Use Cases

  - Fetch build logs from failed production deployment
  - Add environment variables to staging
  - List preview deployments for branches

  ## Pricing

  Free with Vercel account.
