markdown: >-
  ## Overview


  MCP Toolbox for Databases is an open source server providing unified database
  tool access across multiple database platforms.


  ## Features


  - Support for AlloyDB, BigQuery, Bigtable

  - Cloud SQL, Dgraph, Looker integration

  - MySQL, Neo4j, Postgres, Spanner support

  - Fast and secure database operations

  - Easy integration with AI agents

  - Google Cloud Platform backed
