markdown: |-
  ## Overview

  FrontMCP: TS-first framework for MCP servers.

  ## Features

  - Decorators for tools/resources
  - Dependency injection
  - Modular plugins

  ## Use Cases

  - Complex agent toolsets
  - Scalable server builds

  ## Comparisons

  More feature-rich than simple-mcp.

  ## Pricing

  Free and open-source.
