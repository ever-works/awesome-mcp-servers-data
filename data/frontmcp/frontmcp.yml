name: FrontMCP
description: "TypeScript framework for extensible MCP servers using decorators,
  DI, and modular design. Facilitates building complex, maintainable MCP
  services. Compared to simple-mcp, adds structure for larger apps; akin to
  NestJS for MCP. Use cases: enterprise MCP servers with interdependent tools
  and scalable architectures."
source_url: https://github.com/front-mcp/frontmcp
