markdown: >-
  ## Overview


  mcp-pdf-tools provides Model Context Protocol integration for PDF file
  operations. It enables AI assistants to read, extract text, and work with PDF
  documents as MCP tools.


  ## Features


  - PDF reading and text extraction

  - Document manipulation tools

  - PDF metadata access

  - Works with various PDF formats

  - Integration with MCP-compatible AI clients
