markdown: >-
  ## Overview


  PM Copilot triangulates support tickets and feature requests for product
  planning.


  ## Features


  - Triangulates HelpScout tickets and ProductLift requests

  - Scores themes by convergence (2x boost for matching signals)

  - Scrubs PII

  - Accepts kpi_context from other MCP servers


  ## Pricing


  Not specified.
