markdown: >-
  ## Overview


  An MCP server that connects to Obsidian via the Local REST API community
  plugin, allowing AI models to interact with Obsidian vaults.


  ## Features


  - Read and search notes in Obsidian vaults

  - Create and update notes

  - Access tags and metadata

  - Integration via Obsidian REST API community plugin
