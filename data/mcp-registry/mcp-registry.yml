markdown: >-
  ## Overview


  The MCP Registry is the central index for discovering MCP servers. It launched
  in September 2025 and grew to nearly 2,000 server entries within months.


  ## Purpose


  - Centralized discovery of MCP servers

  - Index of both official and community-maintained servers

  - Enables browsing and searching for available integrations


  ## Roadmap


  The 2026 roadmap includes work on **MCP Server Cards**, a proposed standard
  for exposing server metadata via `.well-known` URLs so browsers, crawlers, and
  registries can discover server capabilities without establishing a connection.


  ## Governance


  The Registry is governed through the Agentic AI Foundation under the Linux
  Foundation, with changes proposed through Specification Enhancement Proposals
  (SEPs).


  ## Pricing


  Free and open.
