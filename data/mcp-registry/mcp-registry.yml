name: MCP Registry
description: Official registry service for Model Context Protocol (MCP) servers,
  offering API base URLs for production (registry.modelcontextprotocol.io),
  staging (staging.registry.modelcontextprotocol.io), local development
  (localhost:8080), and custom configurations. Acts as a central discovery hub
  for MCP servers, tools, and implementations in the ecosystem.
source_url: https://registry.modelcontextprotocol.io/
