name: MCP Registry
description: The official MCP Registry is a central directory service for Model
  Context Protocol servers, providing standardized API base URLs for production,
  staging, local development, and custom environments. Key features include
  reliable discovery endpoints and ecosystem hub functionality without search
  but with authoritative listings. Essential for discovering official MCP
  servers and tools; it outperforms community awesome lists as the canonical,
  protocol-governed registry.
source_url: https://registry.modelcontextprotocol.io/
