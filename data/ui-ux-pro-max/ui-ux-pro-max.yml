markdown: >-
  ## Overview


  UI/UX design intelligence with 50 styles, 21 palettes, 50 font pairings, 20
  charts, 8 stacks (React, Next.js, Vue, Svelte, SwiftUI, React Native, Flutter,
  Tailwind).


  ## Actions


  - Plan, build, create, design, implement, review, fix, improve, optimize,
  enhance, refactor, check UI/UX code.


  ## Projects


  - Website, landing page, dashboard, admin panel, e-commerce, SaaS, portfolio,
  blog, mobile app, .html, .tsx, .vue, .svelte.


  ## Elements


  - Button, modal, navbar, sidebar, card, table, form, chart.


  ## Styles


  - Glassmorphism, claymorphism, minimalism, brutalism, neumorphism, bento grid,
  dark mode, responsive, skeuomorphism, flat design.


  ## Topics


  - Color palette, accessibility, animation, layout, typography, font pairing,
  spacing, hover, shadow, gradient.
