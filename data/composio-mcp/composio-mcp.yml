markdown: >-
  ## Overview


  Composio MCP server exposes tools for 250+ apps through one endpoint, managing
  auth centrally.


  ## Features


  - Tools for GitHub, Slack, Gmail, Notion, Jira, Salesforce, HubSpot, etc.

  - Automatic OAuth, API key storage, token refresh

  - Select specific apps and actions

  - Remote server, no local process needed


  ## Use Cases


  Multi-platform automations like checking tickets, updating docs, posting
  notifications.
