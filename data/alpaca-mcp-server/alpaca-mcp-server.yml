name: Alpaca MCP Server
description: MCP server for Alpaca Broker API enabling AI agents to access US
  stock market data and execute trades with real-time quotes, historical bars,
  and order management. Supports commission-free trading, paper trading
  environments for testing. Use cases include algorithmic agent trading;
  compared to CCXT, focuses specifically on US equities and brokerage functions.
source_url: https://github.com/tedlikeskix/alpaca-mcp-server
category: Finance & Blockchain MCP Servers
tags:
  - trading
  - crypto
  - stocks
markdown: |-
  ## Overview

  Integrates Alpaca trading API via MCP for stock trading.

  ## Features

  - Real-time market data
  - Order placement and management
  - Account positions and balances
  - Paper trading support

  ## Use Cases

  - AI trading bots
  - Strategy backtesting

  ## Comparisons

  US stocks-focused vs CCXT's multi-crypto exchange support.

  ## Pricing

  Free API access; live trading requires approval.
