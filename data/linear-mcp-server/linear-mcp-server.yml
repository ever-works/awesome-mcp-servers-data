name: Linear MCP Server
description: MCP server connecting AI to Linear issue tracker for reading,
  creating, updating issues, managing labels, priorities, assignees, and
  searching projects. Reduces context switching by allowing prompt-based issue
  management. Essential for engineering teams using Linear.
source_url: https://linear.app/docs/mcp
category: project-management-mcp-servers
tags:
  - issue-tracking
  - official
  - agile
markdown: |-
  ## Features

  - Read, create, and update issues and sub-issues
  - Manage labels, priorities, assignees, and statuses
  - Search across projects and teams
  - Check cycle (sprint) status and progress

  ## Use Cases

  - Create bug report in Backend project
  - List assigned tickets in sprint
  - Update ticket status and add comment

  ## Pricing

  Included with Linear subscription.
