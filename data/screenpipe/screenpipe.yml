markdown: >-
  ## Overview


  Screenpipe is a local-first system that captures screen and audio activities
  with timestamped indexing, stores data in SQL with embeddings, supports
  semantic search, and integrates with LLMs.


  ## Features


  - Screen and audio recording

  - Timestamped indexing

  - SQL and embedding-based storage

  - Semantic search capabilities

  - LLM integration for analysis


  ## Pricing


  Open-source, unlicensed.
