name: Java Decompiler MCP
description: MCP server that decompiles Java bytecode into readable source code
  from .class files, package names, or JAR archives using the CFR decompiler.
source_url: https://github.com/modelcontextprotocol/servers/tree/main/src/java-decompiler
category: Development Tools Mcp Servers
tags:
