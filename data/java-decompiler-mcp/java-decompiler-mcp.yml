markdown: >-
  ## Overview


  The Java Decompiler MCP server enables decompilation of Java bytecode back
  into readable source code.


  ## Features


  - Decompile .class files to source code

  - Support for package names

  - JAR archive decompilation

  - Uses CFR decompiler engine

  - Natural language based decompilation requests
