markdown: >-
  ## Overview


  MCP Google Calendar provides Model Context Protocol integration for Google
  Calendar, enabling AI assistants to manage events, check availability, and
  schedule meetings through natural language.


  ## Features


  - Create, update, and delete calendar events

  - Check availability and find meeting times

  - Query calendar events and schedules

  - Integration with Google Calendar API

  - AI-powered calendar management
