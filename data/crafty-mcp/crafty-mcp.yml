name: Crafty MCP
description: "Crafty MCP implements MCP for Minecraft server management via
  Crafty Controller 4 API, supporting start/stop, backups, command execution,
  file handling, scheduling, webhooks, and user control. It enables automation
  and AI-driven server operations. Use cases: remote hosting management,
  automated maintenance, AI-integrated admin tasks; vs vanilla Minecraft, offers
  API-based external control over server functions."
